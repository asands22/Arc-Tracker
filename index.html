<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Arc Tracker — Steady Hand</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0e;--card:#1a1a18;--card2:#222220;--border:#2e2e2a;--olive:#6F745C;--cream:#F6F4F1;--gold:#c8a96e;--muted:#8a8a7a;--red:#c25c3a;--green:#7aaa72;--text:#e8e4dc;--fd:'Cinzel',serif;--fb:'Raleway',sans-serif;--fm:'JetBrains Mono',monospace;}
html,body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;font-size:14px;-webkit-text-size-adjust:100%}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
input,textarea,select{background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:9px 12px;font-family:var(--fb);font-size:14px;outline:none;width:100%;display:block;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,169,110,.1)}
select option{background:var(--card)}textarea{resize:vertical;min-height:70px}
button{cursor:pointer;font-family:var(--fb);border:none;outline:none;font-size:14px;background:none;-webkit-tap-highlight-color:transparent}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{left:-80%}100%{left:120%}}
.fu{animation:fadeUp .25s cubic-bezier(.2,.8,.3,1) both}.fi{animation:fadeIn .2s ease both}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:14px 16px;position:relative;overflow:hidden}
.card.glow{border-color:var(--gold)!important;box-shadow:0 0 20px rgba(200,169,110,.1)}
.card::after{content:'';position:absolute;top:0;left:-80%;width:30%;height:100%;background:linear-gradient(105deg,transparent 35%,rgba(200,169,110,.04) 50%,transparent 65%);animation:shimmer 7s ease-in-out infinite;pointer-events:none}
.st{font-family:var(--fd);font-size:11px;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;margin-bottom:12px}
.lbl{font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 16px;border-radius:4px;font-size:13px;font-weight:500;letter-spacing:.04em;transition:all .18s;cursor:pointer;border:1px solid var(--border);color:var(--text);background:var(--border)}
.btn-gold{background:var(--gold);color:var(--bg);border-color:var(--gold)}.btn-olive{background:var(--olive);color:var(--cream);border-color:var(--olive)}.btn-ghost{background:transparent;color:var(--muted);border-color:var(--border)}.btn-danger{background:transparent;color:var(--red);border-color:var(--red)}.btn-sm{padding:5px 11px;font-size:12px}
.pill{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border);color:var(--muted);background:transparent}
.pill.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.acc-card{background:var(--card);border:1px solid var(--border);border-radius:6px;margin-bottom:10px;overflow:hidden;transition:border-color .25s,box-shadow .25s}
.acc-card.open{border-color:var(--gold);box-shadow:0 0 20px rgba(200,169,110,.08)}
.acc-header{cursor:pointer;user-select:none;padding:14px 16px;-webkit-tap-highlight-color:transparent}
.acc-chev{display:inline-block;transition:transform .35s cubic-bezier(.4,0,.2,1);color:var(--muted);font-size:12px;margin-left:6px;vertical-align:middle}
.acc-body{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1)}.acc-body.open{max-height:9999px}
.tab-bar{display:flex;border-top:1px solid var(--border);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:1;min-width:0;padding:10px 6px;font-size:12px;letter-spacing:.03em;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;font-family:var(--fb);text-align:center;background:none}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-pane{display:none;padding:16px 16px 20px;animation:fadeIn .2s ease}.tab-pane.active{display:block}
.star{font-size:20px;cursor:pointer;color:var(--border);transition:color .12s}.star.on{color:var(--gold)}
input[type=range]{padding:0;border:none;background:none;width:100%;accent-color:var(--gold);cursor:pointer;height:20px}
#nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;padding:11px 0 9px;color:var(--muted);border-top:2px solid transparent;transition:all .2s;text-align:center;background:none;border-left:none;border-right:none;border-bottom:none}
.nb.active{color:var(--gold);border-top-color:var(--gold)}.nb-icon{font-size:17px}.nb-label{font-size:10px;font-family:var(--fm);letter-spacing:.08em;margin-top:2px}
#toast{position:fixed;bottom:80px;right:14px;background:var(--olive);color:var(--cream);font-size:12px;padding:5px 13px;border-radius:20px;pointer-events:none;z-index:200;opacity:0;transition:opacity .3s}
#toast.show{opacity:1}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.row{display:flex;align-items:center}.jb{justify-content:space-between}.wrap{flex-wrap:wrap}
.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}
.mt6{margin-top:6px}.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}
.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}
.badge{font-size:11px;padding:2px 7px;border-radius:8px;background:var(--border);color:var(--muted);margin-left:4px}
.pbar{height:3px;background:var(--border);border-radius:2px}.pbar-fill{height:100%;border-radius:2px;transition:width .4s}
.stat-card{text-align:center;padding:11px 8px;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.stat-card.active{border-color:var(--gold)!important;box-shadow:0 0 14px rgba(200,169,110,.12)}
.state-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.eval-q{font-size:13px;line-height:1.65;color:var(--text);margin-bottom:10px}
.eval-opt{padding:9px 13px;border-radius:4px;border:1px solid var(--border);font-size:13px;cursor:pointer;transition:all .15s;text-align:left;color:var(--muted);background:transparent;width:100%;display:block;margin-bottom:6px;font-family:var(--fb)}
.eval-opt.sel{border-color:var(--gold);color:var(--gold);background:rgba(200,169,110,.08)}
.eval-result{border-left:3px solid var(--gold);padding:12px 14px;background:rgba(200,169,110,.06);border-radius:0 4px 4px 0}
</style>
</head>
<body>
<div style="background:var(--card);border-bottom:1px solid var(--border);padding:13px 16px 11px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50">
  <div><div style="font-family:var(--fd);font-size:16px;color:var(--cream);letter-spacing:.12em">STEADY HAND</div><div style="font-family:var(--fm);font-size:10px;color:var(--gold);letter-spacing:.18em;margin-top:1px">HANDLER INDEX ARC TRACKER™</div></div>
  <div class="row gap8">
    <button class="btn btn-ghost btn-sm" onclick="exportData()">↓ Export</button>
    <label style="display:inline-flex;cursor:pointer"><button class="btn btn-ghost btn-sm" type="button" onclick="this.closest('label').querySelector('input').click()">↑ Import</button><input type="file" accept=".json" onchange="importData(event)" style="display:none;width:1px;opacity:0"></label>
  </div>
</div>
<div id="toast">Saved ✓</div>
<div id="page-clients" class="page" style="padding:14px 14px 90px;max-width:640px;margin:0 auto">
  <div class="row gap8 mb12"><input id="search" placeholder="Search handlers or dogs…" oninput="renderClients()" style="flex:1"><button class="btn btn-gold" onclick="addClient()">+ New</button></div>
  <div id="stats-strip" class="g3 mb12" style="display:none"></div>
  <div id="client-list"></div>
</div>
<div id="page-eval" class="page" style="display:none;padding:14px 14px 90px;max-width:640px;margin:0 auto"></div>
<div id="page-diagnose" class="page" style="display:none;padding:14px 14px 90px;max-width:640px;margin:0 auto"></div>
<div id="page-reference" class="page" style="display:none;padding:14px 14px 90px;max-width:640px;margin:0 auto"></div>
<div id="nav">
  <button class="nb active" onclick="showPage('clients',this)"><div class="nb-icon">⬡</div><div class="nb-label">Clients</div></button>
  <button class="nb" onclick="showPage('eval',this)"><div class="nb-icon">◈</div><div class="nb-label">Eval</div></button>
  <button class="nb" onclick="showPage('diagnose',this)"><div class="nb-icon">◎</div><div class="nb-label">Diagnose</div></button>
  <button class="nb" onclick="showPage('reference',this)"><div class="nb-icon">≡</div><div class="nb-label">Reference</div></button>
</div>
<script>
const CH=["Spatial","Verbal","Environmental","Internal"];
const COMPASS=[{key:"ER",label:"Emotional Regulation",low:"Frustration leaking",high:"Neutral regardless"},{key:"T",label:"Timing & Pacing",low:"Late or early",high:"Pre-decision tension"},{key:"CC",label:"Correction Confidence",low:"Hesitating/apologizing",high:"Clean, proportionate"},{key:"CO",label:"Consistency",low:"Rules shift with state",high:"Same boundary, every time"},{key:"IN",label:"Intentionality",low:"Going through motions",high:"Every action has purpose"}];
const CMAX=COMPASS.length*5;
const CHECKPOINTS=["Intake","Day 25","Day 60","Day 84"];
const PROFILES=["Reactive","Rigid","Avoidant","Passive","Imp. Reactive","Imp. Rigid","Imp. Avoidant","Imp. Passive","Attuned"];
const PNOTES={"Reactive":"High ER volatility. Lead with Spatial channel stability before verbal work.","Rigid":"Low CO flexibility. Introduce Environmental variation carefully. Don't disrupt the structure — redirect it.","Avoidant":"Ghost channel dominant in self-awareness. Introduce vocabulary before reps.","Passive":"Low IN and CC. Accountability framing required. The dog is doing all the work.","Imp. Reactive":"Reactive profile with Attuned flashes. Protect the glimpses.","Imp. Rigid":"Rigid profile with emerging flexibility. Don't over-praise the bend.","Imp. Avoidant":"Avoidant profile with growing vocabulary. Ghost channel named but not yet integrated.","Imp. Passive":"Passive profile activating. Watch for CC jumps — they can overcorrect.","Attuned":"All channels load-bearing. Compass scores consistent across states. The dog confirms it."};
const EXERCISES=[{id:"e1",name:"Attention Threshold Walk",ch:"Spatial",desc:"Handler maintains spatial position while dog self-regulates to threshold distance. No verbal cues."},{id:"e2",name:"One-Word Rule",ch:"Verbal",desc:"Handler allowed one word per 30 seconds. Tracks verbal load vs dog compliance rate."},{id:"e3",name:"Environmental Exposure Set",ch:"Environmental",desc:"Controlled introduction to novel stimuli. Handler reads dog state before advancing."},{id:"e4",name:"Silent Correction Drill",ch:"Internal",desc:"Handler corrects without verbal or spatial escalation. Internal regulation only."},{id:"e5",name:"Boundary Hold",ch:"Spatial",desc:"Static boundary drill. Handler holds position regardless of dog pressure. Measures ER under load."},{id:"e6",name:"Recovery Window Tracking",ch:"Internal",desc:"Track time from peak arousal to baseline. Handler role: stabilize, not escalate."},{id:"e7",name:"Parallel Walk",ch:"Spatial",desc:"Side-by-side movement drill. Handler reads dog proximity tension without verbal interference."},{id:"e8",name:"Threshold Decision Point",ch:"Environmental",desc:"Handler identifies and names the environmental trigger before the dog hits threshold. Pre-decision awareness."}];
const FIVE_STATES=[{s:"1 — Baseline",c:"#6F745C",d:"Dog is calm, collected, responsive. Handler is the anchor."},{s:"2 — Alert",c:"#c8a96e",d:"Heightened attention. Orienting response. Not yet overloaded."},{s:"3 — Engaged",c:"#d4894a",d:"Active arousal. Dog is in the work or in the distraction."},{s:"4 — Threshold",c:"#c25c3a",d:"Tipping point. Handler decisions here determine the next 10 minutes."},{s:"5 — Over Threshold",c:"#8b2020",d:"Cortisol load is running the show. Management only. No training."}];
const AXIOMS=["The dog was always the mirror.","You are adding to the pressure load or stabilizing it. There is no neutral.","Pressure is constant. Pressure is not correction. Pressure is not force.","The Signature is the map. The Compass is the proof of movement.","Blind = friction when named. Ghost = blankness when named. The reaction is the diagnostic.","Do not introduce the ghost channel by correcting it. Introduce it. They need vocabulary before reps.","Handler profiles are diagnostic snapshots, not permanent labels.","The Four Pressure Channels™ are NOT a reframe of the four quadrants. Never conflate them."];
const CH_DESC={Spatial:"Physical position, proximity, and movement. Dominant = uses body as primary tool. Blind = moves unconsciously, doesn't read the dog's spatial response. Ghost = can't feel how their position is loading pressure.",Verbal:"Word choice, tone, frequency, and timing of verbal output. Dominant = narrates constantly, praise-heavy. Blind = keeps talking through escalation. Ghost = unaware that their voice is a pressure channel at all.",Environmental:"Awareness and use of the training environment — distractions, surfaces, thresholds, setup. Dominant = reads context before entering. Blind = environment keeps hijacking the session. Ghost = the dog's environment is invisible to them.",Internal:"The handler's internal state — regulation, intention, presence. Dominant = internal state drives every rep. Blind = dysregulation leaks without awareness. Ghost = no concept that their internal state affects the dog."};
const EVAL_Q=[{id:"q1",phase:1,q:"When your dog pulls toward something, your first instinct is to:",opts:["Say 'no' or their name","Tighten the leash / step in front","Redirect with food or toy","Take a breath and wait"],ch:["Verbal","Spatial","Environmental","Internal"]},{id:"q2",phase:1,q:"When you enter a new environment with your dog, you:",opts:["Start talking to them immediately","Scan the space and adjust your position","Watch what your dog is watching","Focus on keeping your own breathing steady"],ch:["Verbal","Environmental","Environmental","Internal"]},{id:"q3",phase:1,q:"After a correction, you typically:",opts:["Explain what you wanted verbally","Move away or change direction","Look for environmental reasons","Check your own emotional state first"],ch:["Verbal","Spatial","Environmental","Internal"]},{id:"q4",phase:1,q:"Your dog is distracted. You:",opts:["Call their name or use a cue","Step closer or use your body","Remove the distraction or increase distance","Wait until you're regulated before asking"],ch:["Verbal","Spatial","Environmental","Internal"]},{id:"q5",phase:2,q:"How aware are you of how much you talk during training?",opts:["Very aware — I consciously limit it","Somewhat — I notice after the fact","Not very — I don't track it","I hadn't thought about it"],ch:["Verbal","Verbal","Verbal","Verbal"],blind:[false,true,false,true]},{id:"q6",phase:2,q:"If someone pointed out that your body position is adding pressure to your dog, you'd:",opts:["Feel frustrated — I'm doing my best","Immediately want to understand how","Dismiss it — I can't see that","Feel curious but uncertain what to change"],ch:["Spatial","Spatial","Spatial","Spatial"],blind:[true,false,true,false]},{id:"q7",phase:2,q:"When your dog is at threshold, your awareness of the environment is:",opts:["High — I read it before we enter","Medium — I notice mid-session","Low — I'm focused on the dog not the space","I focus inward on staying calm"],ch:["Environmental","Environmental","Environmental","Internal"],blind:[false,false,true,false]},{id:"q8",phase:2,q:"When you're frustrated during training, your dog:",opts:["Usually gets more reactive","Usually shuts down","Seems unaffected — or I haven't noticed","I manage my state before it gets there"],ch:["Internal","Internal","Internal","Internal"],blind:[false,false,true,false]}];

// ── DUAL-MODE STORAGE: window.storage (Claude) + localStorage (browser) ──────
const SK=“shdt-arc-v8”;
let DB={clients:[]};
let saveTimer=null;
function hasWS(){try{return typeof window!==“undefined”&&window.storage&&typeof window.storage.get===“function”;}catch(e){return false;}}
async function loadDB(){
try{
if(hasWS()){const r=await window.storage.get(SK);if(r&&r.value)DB=JSON.parse(r.value);}
else{const raw=localStorage.getItem(SK);if(raw)DB=JSON.parse(raw);}
}catch(e){DB={clients:[]};}
renderClients();
}
function scheduleSave(){
clearTimeout(saveTimer);
saveTimer=setTimeout(async()=>{
try{
if(hasWS())await window.storage.set(SK,JSON.stringify(DB));
else localStorage.setItem(SK,JSON.stringify(DB));
}catch(e){}
const t=document.getElementById(“toast”);if(t){t.classList.add(“show”);setTimeout(()=>t.classList.remove(“show”),1500);}
},600);
}

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const now=()=>new Date().toISOString().slice(0,10);
const ct=c=>COMPASS.reduce((a,{key})=>a+(c[key]||0),0);
const esc=s=>(s||””).replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”).replace(/”/g,”"”);
const pcol=p=>p>=70?“var(–green)”:p>=40?“var(–gold)”:“var(–red)”;
function ring(score,max,sz){const r=sz/2-4,cx=sz/2,circ=2*Math.PI*r,p=score/max,fill=p*circ,cl=pcol(Math.round(p*100));return`<svg width="${sz}" height="${sz}" style="flex-shrink:0"><circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="var(--border)" stroke-width="3"/><circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${cl}" stroke-width="3" stroke-dasharray="${fill.toFixed(1)} ${circ.toFixed(1)}" stroke-dashoffset="${(circ/4).toFixed(1)}" stroke-linecap="round"/><text x="${cx}" y="${cx+4}" text-anchor="middle" style="fill:${cl};font-size:${sz>40?12:10}px;font-family:var(--fm)">${score}</text></svg>`;}
function spark(scores){if(scores.length<2)return””;const W=110,H=30,pd=4,totals=scores.map(ct),mn=Math.min(…totals),mx=Math.max(…totals,mn+1);const pts=totals.map((v,i)=>`${pd+(i/(totals.length-1))*(W-pd*2)},${H-pd-((v-mn)/(mx-mn))*(H-pd*2)}`).join(” “);return`<svg width="${W}" height="${H}"><polyline points="${pts}" fill="none" stroke="var(--gold)" stroke-width="1.5" stroke-linejoin="round"/>${totals.map((v,i)=>{const x=pd+(i/(totals.length-1))*(W-pd*2),y=H-pd-((v-mn)/(mx-mn))*(H-pd*2);return`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="var(--gold)"/>`;}).join("")}</svg>`;}
function newClient(){return{id:uid(),created:now(),name:””,dog:””,breed:””,age:””,signature:{dominant:””,blind:””,ghost:””},profile:””,compass:[],sessions:[],issues:[],notes:””};}
const gc=id=>DB.clients.find(c=>c.id===id);
function sc(c){const i=DB.clients.findIndex(x=>x.id===c.id);if(i>=0)DB.clients[i]=c;else DB.clients.push(c);scheduleSave();}
function showPage(name,btn){document.querySelectorAll(”.page”).forEach(p=>p.style.display=“none”);document.querySelectorAll(”.nb”).forEach(b=>b.classList.remove(“active”));document.getElementById(“page-”+name).style.display=“block”;if(btn)btn.classList.add(“active”);if(name===“eval”)buildEvalPage();if(name===“diagnose”)buildDiagnosePage();if(name===“reference”)buildReferencePage();}
const openCards=new Set();const activeTab={};let activeFilter=“all”;
function addClient(){const c=newClient();DB.clients.push(c);scheduleSave();renderClients();}
function deleteClient(id){if(!confirm(“Delete this client?”))return;DB.clients=DB.clients.filter(c=>c.id!==id);openCards.delete(id);delete activeTab[id];scheduleSave();renderClients();}
function setFilter(key){activeFilter=activeFilter===key?“all”:key;renderClients();}
function renderClients(){
const q=(document.getElementById(“search”)||{value:””}).value.toLowerCase();
const attuned=DB.clients.filter(c=>c.profile===“Attuned”).length;
const flagged=DB.clients.filter(c=>!c.signature.dominant||!c.signature.blind||!c.signature.ghost||c.compass.length===0);
const strip=document.getElementById(“stats-strip”);
if(DB.clients.length>0){strip.style.display=“grid”;strip.innerHTML=[{key:“all”,label:“Clients”,val:DB.clients.length,color:“var(–gold)”},{key:“attuned”,label:“Attuned”,val:attuned,color:“var(–green)”},{key:“flags”,label:“Flags”,val:flagged.length,color:flagged.length>0?“var(–red)”:“var(–muted)”}].map(s=>`<div class="card stat-card${activeFilter===s.key?" active":""}" onclick="setFilter('${s.key}')"><div style="font-family:var(--fm);font-size:22px;color:${s.color}">${s.val}</div><div class="lbl" style="margin:3px 0 0">${s.label}</div>${activeFilter===s.key?`<div style="width:16px;height:2px;background:var(--gold);border-radius:2px;margin:5px auto 0"></div>`:""}</div>`).join(””);}else strip.style.display=“none”;
let pool=DB.clients;if(activeFilter===“attuned”)pool=DB.clients.filter(c=>c.profile===“Attuned”);if(activeFilter===“flags”)pool=flagged;
const filtered=pool.filter(c=>!q||c.name.toLowerCase().includes(q)||c.dog.toLowerCase().includes(q));
const list=document.getElementById(“client-list”);
if(filtered.length===0){list.innerHTML=`<div style="text-align:center;color:var(--muted);padding:50px 0;font-size:13px">${DB.clients.length===0?"No clients yet. Add your first handler.":activeFilter!=="all"?"No clients match this filter.":"No results."}</div>`;return;}
list.innerHTML=filtered.map(c=>buildAccCard(c)).join(””);
filtered.forEach(c=>{if(openCards.has(c.id)){const body=document.getElementById(“body-”+c.id),chev=document.getElementById(“chev-”+c.id),card=document.getElementById(“acc-”+c.id);if(body)body.classList.add(“open”);if(chev)chev.style.transform=“rotate(180deg)”;if(card)card.classList.add(“open”);renderTab(c.id,activeTab[c.id]||“overview”);}});
}
function toggleAcc(id,el){const body=document.getElementById(“body-”+id),chev=document.getElementById(“chev-”+id);if(!body||!chev)return;if(body.classList.contains(“open”)){body.classList.remove(“open”);chev.style.transform=””;el.classList.remove(“open”);openCards.delete(id);}else{body.classList.add(“open”);chev.style.transform=“rotate(180deg)”;el.classList.add(“open”);openCards.add(id);if(!activeTab[id])activeTab[id]=“overview”;renderTab(id,activeTab[id]);}}
function switchTab(id,tab){activeTab[id]=tab;document.querySelectorAll(`[data-tg="${id}"]`).forEach(b=>b.classList.toggle(“active”,b.dataset.tab===tab));document.querySelectorAll(`[data-pg="${id}"]`).forEach(p=>p.classList.toggle(“active”,p.dataset.pane===tab));renderTab(id,tab);}
function renderTab(id,tab){const pane=document.querySelector(`[data-pg="${id}"][data-pane="${tab}"]`);if(!pane)return;const c=gc(id);if(!c)return;if(tab===“overview”)pane.innerHTML=tOverview(c);if(tab===“compass”)pane.innerHTML=tCompass(c);if(tab===“sessions”)pane.innerHTML=tSessions(c);if(tab===“issues”)pane.innerHTML=tIssues(c);if(tab===“dossier”)pane.innerHTML=tDossier(c);}
function buildAccCard(c){const sig=c.signature,latest=c.compass[c.compass.length-1],total=latest?ct(latest):null,p=total!==null?total/CMAX:null,bc=p===null?“var(–border)”:pcol(Math.round(p*100));const sigP=[[“D”,sig.dominant,“var(–gold)”],[“B”,sig.blind,“var(–red)”],[“G”,sig.ghost,“var(–muted)”]].map(([a,ch,c2])=>ch?`<span style="font-size:11px;padding:2px 8px;border-radius:8px;border:1px solid ${c2}33;color:${c2};background:${c2}11">${a}:${ch}</span>`:””).join(””);const cbar=total!==null?`<div class="row jb mb6" style="font-size:11px"><span style="color:var(--muted)">Compass · ${latest.checkpoint}</span><span style="font-family:var(--fm);color:${bc}">${total}/${CMAX}</span></div><div class="pbar"><div class="pbar-fill" style="width:${p*100}%;background:${bc}"></div></div>`:`<div style="font-size:11px;color:var(--border);font-style:italic">No compass scored yet</div>`;const profBadge=c.profile?`<span style="font-size:11px;background:var(--olive);color:var(--cream);padding:2px 9px;border-radius:10px">${c.profile}</span>`:””;const sessLine=c.sessions.length>0?`<div class="mt6" style="font-size:11px;color:var(--muted)">${c.sessions.length} session${c.sessions.length!==1?"s":""} · Last: ${c.sessions[c.sessions.length-1]?.date||"—"}</div>`:””;const TABS=[{k:“overview”,l:“Overview”},{k:“compass”,l:“Compass”},{k:“sessions”,l:“Sessions”},{k:“issues”,l:“Issues”},{k:“dossier”,l:“Dossier”}];return`<div class="acc-card fu" id="acc-${c.id}"><div class="acc-header" onclick="toggleAcc('${c.id}',document.getElementById('acc-${c.id}'))"><div class="row jb mb8"><div style="flex:1;min-width:0"><div class="row" style="gap:6px"><span style="font-family:var(--fd);font-size:15px;color:var(--cream);letter-spacing:.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.name)||"Unnamed Handler"}</span><span id="chev-${c.id}" class="acc-chev">▾</span></div><div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(c.dog)||"No dog"}${c.breed?" · "+esc(c.breed):""}</div></div><div class="row gap8" style="flex-shrink:0;margin-left:10px">${profBadge}<button onclick="event.stopPropagation();deleteClient('${c.id}')" style="color:var(--border);font-size:18px;line-height:1;padding:0 4px">×</button></div></div>${sigP?`<div class="row gap6 wrap mb8">${sigP}</div>`:""}${cbar}${sessLine}</div><div class="acc-body" id="body-${c.id}"><div class="tab-bar">${TABS.map(t=>`<button class=“tab-btn${t.k===“overview”?” active”:””}” data-tg=”${c.id}” data-tab=”${t.k}” onclick=“switchTab(’${c.id}’,’${t.k}’)”>${t.l}${t.k===“sessions”&&c.sessions.length>0?`<span class="badge">${c.sessions.length}</span>`:””}</button>`).join("")}</div>${TABS.map(t=>`<div class=“tab-pane${t.k===“overview”?” active”:””}” data-pg=”${c.id}” data-pane=”${t.k}”></div>`).join("")}</div></div>`;}
function tOverview(c){const profOpts=PROFILES.map(p=>`<option value="${p}"${c.profile===p?" selected":""}>${p}</option>`).join(””);const latest=c.compass[c.compass.length-1];let snap=””;if(latest){const tot=ct(latest),p=tot/CMAX,cl=pcol(Math.round(p*100));snap=`<div class="card mt10"><div class="st">Latest Compass — ${latest.checkpoint}</div><div class="row gap10 mb10">${ring(tot,CMAX,54)}<div><div class="lbl">Score</div><div style="font-family:var(--fm);font-size:19px;color:var(--gold)">${tot}<span style="font-size:11px;color:var(--muted)">/${CMAX}</span></div></div>${c.compass.length>1?`<div style="margin-left:auto">${spark(c.compass)}</div>`:""}</div>${COMPASS.map(({key,label})=>`<div class="mb8"><div class="row jb"><span style="font-family:var(--fm);font-size:10px;color:var(--gold);width:24px">${key}</span><span style="font-size:11px;color:var(--muted);flex:1;padding:0 8px">${label}</span><span style="font-family:var(--fm);font-size:10px;color:var(--muted)">${latest[key]}</span></div><div class="pbar mt6"><div class="pbar-fill" style="width:${latest[key]/5*100}%;background:var(--olive)"></div></div></div>`).join("")}</div>`;}return`<div class="card mb10"><div class="st">Handler & Dog</div><div class="g2"><div><div class="lbl">Handler Name</div><input value="${esc(c.name)}" oninput="pf('${c.id}','name',this.value)"></div><div><div class="lbl">Dog Name</div><input value="${esc(c.dog)}" oninput="pf('${c.id}','dog',this.value)"></div><div><div class="lbl">Breed</div><input value="${esc(c.breed)}" oninput="pf('${c.id}','breed',this.value)"></div><div><div class="lbl">Handler Age</div><input value="${esc(c.age)}" oninput="pf('${c.id}','age',this.value)"></div></div></div><div class="card mb10 mt10"><div class="st">Handler Signature™</div>${chPills(c.id,"dominant",c.signature.dominant,"Dominant")}${chPills(c.id,"blind",c.signature.blind,"Blind")}${chPills(c.id,"ghost",c.signature.ghost,"Ghost")}</div><div class="card mb10"><div class="st">Handler Profile</div><div class="lbl">Profile Assignment</div><select onchange="pf('${c.id}','profile',this.value)" style="margin-bottom:${c.profile?10:0}px"><option value="">— Unassigned —</option>${profOpts}</select>${c.profile?`<div style="font-size:12px;color:var(--muted);font-style:italic;line-height:1.65;border-top:1px solid var(--border);padding-top:10px;margin-top:2px">${PNOTES[c.profile]}</div>`:""}</div>${snap}<div class="card mt10"><div class="st">Field Notes</div><textarea oninput="pf('${c.id}','notes',this.value)" placeholder="Observations, patterns, context…" rows="4">${esc(c.notes)}</textarea></div>`;}
function chPills(id,field,val,label){return`<div class="mb10"><div class="lbl">${label}</div><div class="row gap6 wrap">${["","Spatial","Verbal","Environmental","Internal"].map(ch=>`<button class=“pill${val===ch?” active”:””}” onclick=“pSig(’${id}’,’${field}’,’${ch}’)”>${ch||”—”}</button>`).join("")}</div></div>`;}
function pf(id,field,value){const c=gc(id);if(!c)return;c[field]=value;sc(c);refreshHdr(c);}
function pSig(id,field,value){const c=gc(id);if(!c)return;c.signature[field]=value;sc(c);renderTab(id,“overview”);refreshHdr(c);}
function refreshHdr(c){const card=document.getElementById(“acc-”+c.id);if(!card)return;const sig=c.signature,latest=c.compass[c.compass.length-1],total=latest?ct(latest):null,p=total!==null?total/CMAX:null,bc=p===null?“var(–border)”:pcol(Math.round(p*100));const sigP=[[“D”,sig.dominant,“var(–gold)”],[“B”,sig.blind,“var(–red)”],[“G”,sig.ghost,“var(–muted)”]].map(([a,ch,c2])=>ch?`<span style="font-size:11px;padding:2px 8px;border-radius:8px;border:1px solid ${c2}33;color:${c2};background:${c2}11">${a}:${ch}</span>`:””).join(””);const cbar=total!==null?`<div class="row jb mb6" style="font-size:11px"><span style="color:var(--muted)">Compass · ${latest.checkpoint}</span><span style="font-family:var(--fm);color:${bc}">${total}/${CMAX}</span></div><div class="pbar"><div class="pbar-fill" style="width:${p*100}%;background:${bc}"></div></div>`:`<div style="font-size:11px;color:var(--border);font-style:italic">No compass scored yet</div>`;const profBadge=c.profile?`<span style="font-size:11px;background:var(--olive);color:var(--cream);padding:2px 9px;border-radius:10px">${c.profile}</span>`:””;const sessLine=c.sessions.length>0?`<div class="mt6" style="font-size:11px;color:var(--muted)">${c.sessions.length} session${c.sessions.length!==1?"s":""} · Last: ${c.sessions[c.sessions.length-1]?.date||"—"}</div>`:””;const isOpen=document.getElementById(“body-”+c.id)?.classList.contains(“open”);const h=card.querySelector(”.acc-header”);if(!h)return;h.innerHTML=`<div class="row jb mb8"><div style="flex:1;min-width:0"><div class="row" style="gap:6px"><span style="font-family:var(--fd);font-size:15px;color:var(--cream);letter-spacing:.04em">${esc(c.name)||"Unnamed Handler"}</span><span id="chev-${c.id}" class="acc-chev" style="transform:${isOpen?"rotate(180deg)":""}">▾</span></div><div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(c.dog)||"No dog"}${c.breed?" · "+esc(c.breed):""}</div></div><div class="row gap8" style="flex-shrink:0;margin-left:10px">${profBadge}<button onclick="event.stopPropagation();deleteClient('${c.id}')" style="color:var(--border);font-size:18px;line-height:1;padding:0 4px">×</button></div></div>${sigP?`<div class="row gap6 wrap mb8">${sigP}</div>`:""}${cbar}${sessLine}`;}
function tCompass(c){const hist=[…c.compass].reverse().map(e=>{const tot=ct(e),p=tot/CMAX,cl=pcol(Math.round(p*100));return`<div class="row gap10" style="padding:10px 0;border-bottom:1px solid var(--border)">${ring(tot,CMAX,44)}<div style="flex:1"><div style="font-family:var(--fd);font-size:12px;color:var(--gold)">${e.checkpoint}</div><div style="font-size:10px;color:var(--muted)">${e.date}</div></div><div class="row gap8">${COMPASS.map(({key})=>`<div style="text-align:center"><div style="font-size:8px;color:var(--muted)">${key}</div><div style=“font-family:var(–fm);font-size:11px;color:${e[key]>=4?“var(–green)”:e[key]>=2?“var(–gold)”:“var(–red)”}”>${e[key]}</div></div>`).join("")}</div><button class="btn btn-danger btn-sm" onclick="delCompass('${c.id}','${e.id}')">×</button></div>`;}).join(””);return`<div class="card mb10"><div class="st">New Entry</div><div class="row gap6 wrap">${CHECKPOINTS.map(cp=>`<button class="btn btn-ghost btn-sm" onclick="openCF('${c.id}','${cp}')">${cp}</button>`).join("")}</div></div><div id="cf-${c.id}"></div>${c.compass.length>0?`<div class="card">${c.compass.length>1?`<div class="row jb mb10"><div class="st" style="margin:0">Arc</div>${spark(c.compass)}</div>`:`<div class="st">History</div>`}${hist}</div>`:""}`;};
function openCF(cid,cp){document.getElementById(“cf-”+cid).innerHTML=`<div class="card glow mb10 fi"><div class="st">Scoring — ${cp}</div><div class="mb10"><div class="lbl">Date</div><input type="date" id="cfd-${cid}" value="${now()}"></div>${COMPASS.map(({key,label,low,high})=>`<div class="mb12"><div class="row jb"><span class="lbl" style="margin:0">${label}</span><span style="font-family:var(--fm);font-size:11px;color:var(--gold)" id="cfv-${cid}-${key}">1/5</span></div><input type="range" min="1" max="5" value="1" oninput="cfU('${cid}');document.getElementById('cfv-${cid}-${key}').textContent=this.value+'/5'" id="cf-${cid}-${key}"><div class="row jb mt6" style="font-size:10px;color:var(--muted)"><span>${low}</span><span>${high}</span></div></div>`).join("")}<div class="row jb mt8"><span style="font-family:var(--fm);font-size:12px;color:var(--muted)">Total: <span style="color:var(--gold)" id="cft-${cid}">${COMPASS.length}/${CMAX}</span></span><div class="row gap8"><button class="btn btn-ghost btn-sm" onclick="document.getElementById('cf-${cid}').innerHTML=''">Cancel</button><button class="btn btn-gold btn-sm" onclick="saveCF('${cid}','${cp}')">Save</button></div></div></div>`;}
function cfU(cid){const tot=COMPASS.reduce((a,{key})=>a+parseInt(document.getElementById(“cf-”+cid+”-”+key).value||1),0);document.getElementById(“cft-”+cid).textContent=tot+”/”+CMAX;}
function saveCF(cid,cp){const c=gc(cid);const e={id:uid(),checkpoint:cp,date:document.getElementById(“cfd-”+cid).value};COMPASS.forEach(({key})=>{e[key]=parseInt(document.getElementById(“cf-”+cid+”-”+key).value||1);});c.compass.push(e);sc(c);renderTab(cid,“compass”);refreshHdr(c);}
function delCompass(cid,eid){if(!confirm(“Delete?”))return;const c=gc(cid);c.compass=c.compass.filter(e=>e.id!==eid);sc(c);renderTab(cid,“compass”);}
function tSessions(c){const rows=[…c.sessions].reverse().map(s=>{const stars=[1,2,3,4,5].map(n=>`<span style="color:${n<=s.quality?"var(--gold)":"var(--border)"}">★</span>`).join(””);return`<div class="card mb10 fi"><div class="row jb mb8"><div class="row wrap gap6"><span style="font-family:var(--fd);font-size:12px;color:var(--gold)">Session #${s.num}</span><span style="font-size:10px;color:var(--muted)">${s.date}</span>${s.channel?`<span style="font-size:10px;background:var(--border);color:var(--olive);padding:2px 7px;border-radius:10px">${s.channel}</span>`:""}</div><div class="row gap6"><span style="font-size:14px">${stars}</span><button class="btn btn-danger btn-sm" onclick="delSess('${c.id}','${s.id}')">×</button></div></div>${s.focus?`<div style="font-size:13px;margin-bottom:8px">${esc(s.focus)}</div>`:""}${s.notes?`<div class="lbl">Notes</div><div style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:8px">${esc(s.notes)}</div>`:""}${s.homework?`<div style="background:var(--bg);border-radius:4px;padding:8px 12px;border-left:2px solid var(--gold)"><div class="lbl">Homework</div><div style="font-size:12px;line-height:1.7">${esc(s.homework)}</div></div>`:""}</div>`;}).join(””);return`<div class="row jb mb10"><div class="st" style="margin:0">Session Log</div><button class="btn btn-gold btn-sm" onclick="openSF('${c.id}')">+ New Session</button></div><div id="sf-${c.id}"></div>${rows||`<div style="text-align:center;color:var(--muted);font-size:12px;padding:30px 0">No sessions logged yet.</div>`}`;}
function openSF(cid){const c=gc(cid);const num=c.sessions.length+1;document.getElementById(“sf-”+cid).innerHTML=`<div class="card glow mb10 fi"><div class="st">Session #${num}</div><div class="g2 mb10"><div><div class="lbl">Date</div><input type="date" id="sfd-${cid}" value="${now()}"></div><div><div class="lbl">Quality</div><div class="row gap4 mt8" id="sfst-${cid}">${[1,2,3,4,5].map(n=>`<span class=“star${n<=3?” on”:””}” data-n=”${n}” onclick=“rateSess(${n},’${cid}’)”>★</span>`).join("")}</div></div></div><div class="mb10"><div class="lbl">Focus</div><input id="sff-${cid}" placeholder="What was the primary focus?"></div><div class="mb10"><div class="lbl">Channel This Session</div><div class="row gap6 wrap" id="sfch-${cid}">${["","Spatial","Verbal","Environmental","Internal"].map(ch=>`<button class="pill" data-ch="${ch}" onclick="selCh(this,'${cid}')">${ch||”—”}</button>`).join("")}</div></div><div class="mb10"><div class="lbl">Session Notes</div><textarea id="sfn-${cid}" placeholder="What did you see? What fired first?"></textarea></div><div class="mb10"><div class="lbl">Homework Assigned</div><textarea id="sfh-${cid}" rows="2" placeholder="What are they doing before next session?"></textarea></div><div class="row gap8" style="justify-content:flex-end"><button class="btn btn-ghost btn-sm" onclick="document.getElementById('sf-${cid}').innerHTML=''">Cancel</button><button class="btn btn-gold btn-sm" onclick="saveSess('${cid}',${num})">Save Session</button></div></div>`;}
function rateSess(n,cid){document.querySelectorAll(`#sfst-${cid} .star`).forEach(s=>s.classList.toggle(“on”,+s.dataset.n<=n));}
function selCh(btn,cid){document.querySelectorAll(`#sfch-${cid} .pill`).forEach(p=>p.classList.remove(“active”));btn.classList.add(“active”);}
function saveSess(cid,num){const c=gc(cid);const q=[…document.querySelectorAll(`#sfst-${cid} .star.on`)].length||3;const ch=(document.querySelector(`#sfch-${cid} .pill.active`)||{dataset:{ch:””}}).dataset.ch;c.sessions.push({id:uid(),date:document.getElementById(“sfd-”+cid).value,num,focus:document.getElementById(“sff-”+cid).value,quality:q,channel:ch,notes:document.getElementById(“sfn-”+cid).value,homework:document.getElementById(“sfh-”+cid).value});sc(c);renderTab(cid,“sessions”);refreshHdr(c);}
function delSess(cid,sid){if(!confirm(“Delete?”))return;const c=gc(cid);c.sessions=c.sessions.filter(s=>s.id!==sid);sc(c);renderTab(cid,“sessions”);refreshHdr(c);}
function tIssues(c){const rows=[…c.issues].reverse().map(i=>`<div class="card mb10"><div class="row jb gap10" style="align-items:flex-start"><div><div style="font-size:10px;color:var(--muted);margin-bottom:4px">${i.date}</div><div style="font-size:13px;line-height:1.65">${esc(i.text)}</div></div><button class="btn btn-danger btn-sm" onclick="delIssue('${c.id}','${i.id}')">×</button></div></div>`).join(””);return`<div class="card mb10"><div class="st">Log Recurring Issue</div><textarea id="ii-${c.id}" placeholder="Pattern you're tracking…" rows="2" style="margin-bottom:10px"></textarea><button class="btn btn-olive btn-sm" onclick="addIssue('${c.id}')">Add Issue</button></div>${rows||`<div style="text-align:center;color:var(--muted);font-size:12px;padding:20px 0">No issues logged yet.</div>`}`;}
function addIssue(cid){const inp=document.getElementById(“ii-”+cid);const text=inp.value.trim();if(!text)return;const c=gc(cid);c.issues.push({id:uid(),date:now(),text});sc(c);renderTab(cid,“issues”);}
function delIssue(cid,iid){if(!confirm(“Delete?”))return;const c=gc(cid);c.issues=c.issues.filter(i=>i.id!==iid);sc(c);renderTab(cid,“issues”);}
function tDossier(c){const sig=c.signature,latest=c.compass[c.compass.length-1],lastS=c.sessions[c.sessions.length-1];const flags=[];if(!sig.dominant)flags.push(“Dominant channel unset”);if(!sig.blind)flags.push(“Blind channel unset”);if(!sig.ghost)flags.push(“Ghost channel unset”);if(c.compass.length===0)flags.push(“No compass scored”);if(!c.profile)flags.push(“Profile unassigned”);return`<div class="card mb10"><div class="st">Client Dossier</div><div class="row jb mb12"><div><div style="font-family:var(--fd);font-size:18px;color:var(--cream)">${esc(c.name)||"Unnamed Handler"}</div><div style="font-size:12px;color:var(--muted);margin-top:3px">${esc(c.dog)||"—"}${c.breed?" · "+esc(c.breed):""}${c.age?" · Age "+esc(c.age):""}</div></div>${c.profile?`<span style="font-size:12px;background:var(--olive);color:var(--cream);padding:4px 12px;border-radius:12px;align-self:flex-start">${c.profile}</span>`:""}</div>${latest?`<div class="row gap10 mb12">${ring(ct(latest),CMAX,50)}<div><div class="lbl">Compass · ${latest.checkpoint}</div><div style="font-family:var(--fm);font-size:18px;color:var(--gold)">${ct(latest)}<span style="font-size:11px;color:var(--muted)">/${CMAX}</span></div></div>${c.compass.length>1?spark(c.compass):””}</div>`:""}</div><div class="card mb10"><div class="st">Signature</div>${[["Dominant",sig.dominant,"var(--gold)"],["Blind",sig.blind,"var(--red)"],["Ghost",sig.ghost,"var(--muted)"]].map(([l,v,c2])=>`<div class="row jb mb8"><span class="lbl" style="margin:0;width:80px">${l}</span><span style=“font-size:13px;color:${v?c2:“var(–border)”};”>${v||“Not set”}</span></div>`).join("")}</div>${c.sessions.length>0?`<div class="card mb10"><div class="st">Session History</div><div class="row jb mb10"><span style="font-size:12px;color:var(--muted)">${c.sessions.length} sessions total</span>${lastS?`<span style="font-size:12px;color:var(--muted)">Last: ${lastS.date}</span>`:””}</div>${[…c.sessions].reverse().slice(0,5).map(s=>`<div style="padding:7px 0;border-bottom:1px solid var(--border);font-size:12px"><div class="row jb"><span style="color:var(--gold);font-family:var(--fd);font-size:11px">Session #${s.num}</span><span style="color:var(--muted)">${s.date}</span></div>${s.focus?`<div style="color:var(--muted);margin-top:3px">${esc(s.focus)}</div>`:""}</div>`).join(””)}</div>`:""}${flags.length>0?`<div class="card mb10" style="border-color:rgba(194,92,58,.3)"><div class="st" style="color:var(--red)">Attention Flags</div>${flags.map(f=>`<div style="font-size:12px;color:var(--red);margin-bottom:5px">· ${f}</div>`).join(””)}</div>`:`<div class="card mb10" style="border-color:rgba(122,170,114,.3)"><div style="font-size:12px;color:var(--green)">✓ Client fully assessed.</div></div>`}${c.notes?`<div class="card"><div class="st">Field Notes</div><div style="font-size:13px;color:var(--muted);line-height:1.7">${esc(c.notes)}</div></div>`:""}`;}
let evalAns={},evalCid=””;
function buildEvalPage(){const p=document.getElementById(“page-eval”);const opts=DB.clients.map(c=>`<option value="${c.id}">${esc(c.name)||"Unnamed"} / ${esc(c.dog)||"No dog"}</option>`).join(””);p.innerHTML=`<div style="font-family:var(--fd);font-size:13px;color:var(--gold);letter-spacing:.16em;text-transform:uppercase;padding:16px 0 14px">Handler Index™ Eval</div>${DB.clients.length>0?`<div class="card mb12"><div class="lbl">Attach to Client (optional)</div><select id="eval-sel" onchange="evalCid=this.value"><option value="">— Standalone eval —</option>${opts}</select></div>`:""}<div id="eval-body"></div>`;resetEval();}
function resetEval(){evalAns={};document.getElementById(“eval-body”).innerHTML=buildEvalBody();}
function buildEvalBody(){const p1=EVAL_Q.filter(q=>q.phase===1),p2=EVAL_Q.filter(q=>q.phase===2);return`<div class="card mb10"><div class="st">Phase 1 — Channel Identification</div><div style="font-size:12px;color:var(--muted);line-height:1.65;margin-bottom:14px">Select the response that most accurately reflects your first instinct. Not what you know you should do — what you actually do.</div>${p1.map(bEvalQ).join("")}</div><div class="card mb10"><div class="st">Phase 2 — Blind & Ghost Detection</div><div style="font-size:12px;color:var(--muted);line-height:1.65;margin-bottom:14px">These questions reveal which channels operate below your awareness threshold.</div>${p2.map(bEvalQ).join("")}</div><div class="row gap8" style="justify-content:flex-end"><button class="btn btn-ghost btn-sm" onclick="resetEval()">Reset</button><button class="btn btn-gold" onclick="scoreEval()">Score Eval</button></div><div id="eval-result" class="mt12"></div>`;}
function bEvalQ(q){return`<div class="mb14"><div class="eval-q"><span style="font-family:var(--fm);font-size:10px;color:var(--gold)">Q${q.id.slice(1)}</span> ${q.q}</div>${q.opts.map((opt,i)=>`<button class="eval-opt" id="eo-${q.id}-${i}" onclick="selEval('${q.id}',${i})">${opt}</button>`).join("")}</div>`;}
function selEval(qid,idx){document.querySelectorAll(`[id^="eo-${qid}-"]`).forEach(b=>b.classList.remove(“sel”));document.getElementById(`eo-${qid}-${idx}`).classList.add(“sel”);evalAns[qid]=idx;}
function scoreEval(){if(Object.keys(evalAns).length<EVAL_Q.length){alert(`Please answer all ${EVAL_Q.length} questions.`);return;}const chC={Spatial:0,Verbal:0,Environmental:0,Internal:0},bF={Spatial:0,Verbal:0,Environmental:0,Internal:0};EVAL_Q.forEach(q=>{const idx=evalAns[q.id],ch=q.ch[idx];if(ch)chC[ch]=(chC[ch]||0)+1;if(q.blind&&q.blind[idx])bF[ch]=(bF[ch]||0)+1;});const sorted=Object.entries(chC).sort((a,b)=>b[1]-a[1]);const dominant=sorted[0][0];const blindEntry=Object.entries(bF).sort((a,b)=>b[1]-a[1])[0];const blind=blindEntry&&blindEntry[1]>0?blindEntry[0]:sorted[sorted.length-1][0];const ghost=sorted.map(([c])=>c).filter(c=>c!==dominant&&c!==blind).pop()||sorted[sorted.length-1][0];document.getElementById(“eval-result”).innerHTML=`<div class="eval-result fi"><div class="st">Eval Result</div><div class="row gap10 wrap mb12">${[["Dominant",dominant,"var(--gold)"],["Blind",blind,"var(--red)"],["Ghost",ghost,"var(--muted)"]].map(([l,v,c2])=>`<div style="flex:1;min-width:80px"><div class="lbl">${l}</div><div style="font-size:15px;font-family:var(--fd);color:${c2}">${v}</div></div>`).join("")}</div><div style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:14px"><strong style="color:var(--text)">Dominant — ${dominant}:</strong> Your strongest channel. Load-bearing whether you intend it or not.<br><br><strong style="color:var(--text)">Blind — ${blind}:</strong> Active but outside your awareness. The dog is responding to it. You're not reading that response yet.<br><br><strong style="color:var(--text)">Ghost — ${ghost}:</strong> Present in the environment but invisible to you. Introduce vocabulary before reps.</div>${evalCid?`<button class="btn btn-gold btn-sm" onclick="applyEval('${dominant}','${blind}','${ghost}')">Apply to Client</button>`:""}</div>`;}
function applyEval(d,b,g){const sel=document.getElementById(“eval-sel”);const cid=sel?sel.value:evalCid;if(!cid){alert(“Select a client first.”);return;}const c=gc(cid);if(!c)return;c.signature={dominant:d,blind:b,ghost:g};sc(c);renderClients();alert(`Signature applied to ${c.name||"client"}.`);}
function buildDiagnosePage(){const p=document.getElementById(“page-diagnose”);const flagged=DB.clients.filter(c=>!c.signature.dominant||!c.signature.blind||!c.signature.ghost||c.compass.length===0||!c.profile);const byP={};PROFILES.forEach(pr=>byP[pr]=DB.clients.filter(c=>c.profile===pr).length);const totalS=DB.clients.reduce((a,c)=>a+c.sessions.length,0);const scores=DB.clients.filter(c=>c.compass.length>0).map(c=>ct(c.compass[c.compass.length-1]));const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;p.innerHTML=`<div style="font-family:var(--fd);font-size:13px;color:var(--gold);letter-spacing:.16em;text-transform:uppercase;padding:16px 0 14px">Diagnostics</div><div class="g3 mb12">${[["Sessions",totalS,"var(--gold)"],["Avg Score",avg!==null?avg:"—","var(--olive)"],["Flags",flagged.length,flagged.length>0?"var(--red)":"var(--green)"]].map(([l,v,c])=>`<div class="card" style="text-align:center;padding:11px 8px"><div style="font-family:var(--fm);font-size:20px;color:${c}">${v}</div><div class="lbl" style="margin:3px 0 0">${l}</div></div>`).join("")}</div><div class="card mb12"><div class="st">Profile Distribution</div>${PROFILES.map(pr=>{const n=byP[pr];if(!n)return"";const pt=n/Math.max(DB.clients.length,1);return`<div class="mb10"><div class="row jb mb6" style="font-size:12px"><span style=“color:${pr===“Attuned”?“var(–green)”:“var(–gold)”}”>${pr}</span><span style="font-family:var(--fm);color:var(--muted)">${n}</span></div><div class="pbar"><div class=“pbar-fill” style=“width:${pt*100}%;background:${pr===“Attuned”?“var(–green)”:“var(–olive)”}”></div></div></div>`;}).join("")||`<div style="font-size:12px;color:var(--muted)">No profiles assigned yet.</div>`}</div><div class="card mb12"><div class="st">Five-State Map™</div>${FIVE_STATES.map(({s,c:color,d})=>`<div class="row gap10 mb10"><div class="state-dot" style="background:${color};margin-top:3px"></div><div><div style="font-family:var(--fd);font-size:12px;color:var(--cream);margin-bottom:3px">${s}</div><div style="font-size:12px;color:var(--muted);line-height:1.6">${d}</div></div></div>`).join("")}</div>${flagged.length>0?`<div class="card"><div class="st">Attention Flags</div>${flagged.map(c=>{const miss=[];if(!c.signature.dominant)miss.push(“Dominant”);if(!c.signature.blind)miss.push(“Blind”);if(!c.signature.ghost)miss.push(“Ghost”);if(c.compass.length===0)miss.push(“No compass”);if(!c.profile)miss.push(“No profile”);return`<div class="card mb10" style="background:var(--bg)"><div class="row jb mb6"><span style="font-family:var(--fd);font-size:13px;color:var(--cream)">${esc(c.name)||"Unnamed"}</span><span style="font-size:11px;color:var(--muted)">${esc(c.dog)||"—"}</span></div><div style="font-size:11px;color:var(--red)">${miss.join(" · ")}</div></div>`;}).join(””)}</div>`:`<div class="card" style="border-color:rgba(122,170,114,.3)"><div style="font-size:13px;color:var(--green)">✓ All clients fully assessed.</div></div>`}`;}
let refSec=“channels”;
function buildReferencePage(){const p=document.getElementById(“page-reference”);const secs=[“channels”,“compass”,“profiles”,“exercises”,“states”,“axioms”];p.innerHTML=`<div style="font-family:var(--fd);font-size:13px;color:var(--gold);letter-spacing:.16em;text-transform:uppercase;padding:16px 0 14px">Reference</div><div class="row gap6 wrap mb12" id="ref-nav">${secs.map(s=>`<button class=“pill${s===refSec?” active”:””}” onclick=“switchRef(’${s}’,this)”>${s.charAt(0).toUpperCase()+s.slice(1)}</button>`).join("")}</div><div id="ref-body"></div>`;buildRef(refSec);}
function switchRef(key,btn){refSec=key;document.querySelectorAll(”#ref-nav .pill”).forEach(p=>p.classList.remove(“active”));btn.classList.add(“active”);buildRef(key);}
function buildRef(key){const b=document.getElementById(“ref-body”);if(!b)return;if(key===“channels”)b.innerHTML=CH.map(ch=>`<div class="card mb10"><div style="font-family:var(--fd);font-size:13px;color:var(--gold);margin-bottom:8px">${ch}</div><div style="font-size:12px;color:var(--muted);line-height:1.7">${CH_DESC[ch]}</div></div>`).join(””);if(key===“compass”)b.innerHTML=COMPASS.map(({key:k,label,low,high})=>`<div class="card mb10"><div class="row gap8 mb8"><span style="font-family:var(--fm);color:var(--gold);width:26px">${k}</span><span style="font-family:var(--fd);font-size:13px;color:var(--cream)">${label}</span></div><div class="row jb" style="font-size:11px;color:var(--muted)"><span>1 → ${low}</span><span>${high} ← 5</span></div></div>`).join(””);if(key===“profiles”)b.innerHTML=PROFILES.map(pr=>`<div class="card mb10"><div style="font-family:var(--fd);font-size:13px;color:${pr==="Attuned"?"var(--green)":"var(--gold)"};margin-bottom:7px">${pr}</div><div style="font-size:12px;color:var(--muted);line-height:1.7">${PNOTES[pr]}</div></div>`).join(””);if(key===“exercises”)b.innerHTML=EXERCISES.map(e=>`<div class="card mb10"><div class="row jb mb8"><span style="font-family:var(--fd);font-size:13px;color:var(--cream)">${e.name}</span><span style="font-size:11px;background:rgba(111,116,92,.2);color:var(--olive);padding:2px 8px;border-radius:10px">${e.ch}</span></div><div style="font-size:12px;color:var(--muted);line-height:1.7">${e.desc}</div></div>`).join(””);if(key===“states”)b.innerHTML=FIVE_STATES.map(({s,c:color,d})=>`<div class="card mb10"><div class="row gap10 mb6"><div class="state-dot" style="background:${color};margin-top:2px"></div><span style="font-family:var(--fd);font-size:13px;color:var(--cream)">${s}</span></div><div style="font-size:12px;color:var(--muted);line-height:1.7">${d}</div></div>`).join(””);if(key===“axioms”)b.innerHTML=AXIOMS.map(a=>`<div class="card mb10"><div style="font-size:12px;color:var(--text);line-height:1.85;font-style:italic">"${a}"</div></div>`).join(””);}
function exportData(){const a=document.createElement(“a”);a.setAttribute(“href”,“data:application/json;charset=utf-8,”+encodeURIComponent(JSON.stringify(DB,null,2)));a.setAttribute(“download”,“shdt-arc-”+now()+”.json”);document.body.appendChild(a);a.click();document.body.removeChild(a);}
function importData(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{DB=JSON.parse(ev.target.result);scheduleSave();renderClients();alert(“Import successful.”);}catch{alert(“Invalid file.”);}};r.readAsText(file);e.target.value=””;}

// BOOT
loadDB();
</script>

</body>
