<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ═══ SUPABASE ═══
const sb = window.supabase.createClient(
  "https://fvqagipaowlkfknfwnxi.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2cWFnaXBhb3dsa2ZrbmZ3bnhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTQwNDMsImV4cCI6MjA5MTU5MDA0M30.udB0p_ibNKNNcdc1QNcHWluElRJIYNBvk1AvnIlWZH4"
);

// DB operations
const DB = {
  async getClients() { const {data,error} = await sb.from("clients").select("*").order("updated_at",{ascending:false}); if(error)throw error; return data; },
  async getClient(id) { const {data,error} = await sb.from("clients").select("*").eq("id",id).single(); if(error)throw error; return data; },
  async saveClient(c) { const {data,error} = await sb.from("clients").upsert(c,{onConflict:"id"}).select().single(); if(error)throw error; return data; },
  async deleteClient(id) { const {error} = await sb.from("clients").delete().eq("id",id); if(error)throw error; },
  async getCompass(cid) { const {data,error} = await sb.from("compass_scores").select("*").eq("client_id",cid).order("date"); if(error)throw error; return data; },
  async addCompass(s) { const {data,error} = await sb.from("compass_scores").insert(s).select().single(); if(error)throw error; return data; },
  async delCompass(id) { await sb.from("compass_scores").delete().eq("id",id); },
  async getArc(cid) { const {data,error} = await sb.from("arc_sessions").select("*").eq("client_id",cid).order("session_num"); if(error)throw error; return data; },
  async saveArc(s) { const {data,error} = await sb.from("arc_sessions").upsert(s,{onConflict:"client_id,session_num"}).select().single(); if(error)throw error; return data; },
  async getTu(cid) { const {data,error} = await sb.from("tune_ups").select("*").eq("client_id",cid).order("date",{ascending:false}); if(error)throw error; return data; },
  async addTu(t) { const {data,error} = await sb.from("tune_ups").insert(t).select().single(); if(error)throw error; return data; },
  async delTu(id) { await sb.from("tune_ups").delete().eq("id",id); },
  async getResets(cid) { const {data,error} = await sb.from("resets").select("*").eq("client_id",cid).order("date",{ascending:false}); if(error)throw error; return data; },
  async addReset(r) { const {data,error} = await sb.from("resets").insert(r).select().single(); if(error)throw error; return data; },
  async delReset(id) { await sb.from("resets").delete().eq("id",id); },
};

// ═══ CONSTANTS ═══
const CH=["Spatial","Verbal","Environmental","Internal"];
const CMP=[{k:"er",l:"ER"},{k:"t",l:"T"},{k:"cc",l:"CC"},{k:"co",l:"CO"},{k:"in",l:"IN"}];
const SPROF={P:"Passive",R:"Reactive",Ri:"Rigid",A:"Avoidant"};
const ALLP=["Reactive","Rigid","Avoidant","Passive","Imp. Reactive","Imp. Rigid","Imp. Avoidant","Imp. Passive","Attuned"];
const ST=[{n:1,nm:"Compliant Calm",c:"#6F745C"},{n:2,nm:"Alert Neutral",c:"#8A8E72"},{n:3,nm:"Pre-Decision Tension",c:"#C4A55A"},{n:4,nm:"Committed Action",c:"#B8704A"},{n:5,nm:"Emotional Override",c:"#A34040"}];
const BLK=[{l:"Foundation",r:"1–4"},{l:"Expansion",r:"5–8"},{l:"Plateau",r:"9–12"},{l:"Autonomy",r:"13–16"}];
const DQ={Spatial:{ask:"Show me what you do when your dog pulls.",listen:"Move first or talk first?"},Verbal:{ask:"When your dog doesn't listen, what do you do?",listen:"Commands before consequence?"},Environmental:{ask:"Walk me through how you set up for training.",listen:"Environment mentioned at all?"},Internal:{ask:"Before you walk out the door, what are you thinking?",listen:"Logistics only = Ghost."}};
const PW={Reactive:{w:"Fast corrections, tight grip, stacking",c:"Count to three. One correction per rep."},Rigid:{w:"Overcorrection, missing shutdown, no praise",c:"Watch the ears, not the sit."},Avoidant:{w:"Soft corrections, hesitation, apology behavior",c:"Clarity is kindness. Don't take it back."},Passive:{w:"Dead grip, no eye contact, missing state changes",c:"Tell me what your dog just did."}};

// ═══ COLORS ═══
const X={bg:"#1E1E1E",card:"#2A2926",border:"#3D3B38",gold:"#C4A55A",text:"#F6F4F1",dim:"#9B9890",dimmer:"#6A6762",green:"#6F745C",orange:"#B8704A",red:"#A34040",blue:"#5E84A3"};
const sc=(v,m)=>{const p=v/m;return p<=.25?X.red:p<=.5?X.orange:p<=.7?X.gold:p<=.85?"#8A8E72":X.green};
const td=()=>new Date().toISOString().split("T")[0];

// ═══ UI ═══
const Btn=({children,accent,danger,full,onClick,style:s})=>(<button onClick={onClick} style={{padding:"12px 18px",borderRadius:5,border:accent||danger?"none":`1px solid ${X.border}`,background:accent?X.gold:danger?X.red+"22":"transparent",color:accent?X.bg:danger?X.red:X.dim,cursor:"pointer",fontSize:14,fontWeight:700,letterSpacing:1.2,textTransform:"uppercase",width:full?"100%":"auto",...s}}>{children}</button>);
const Chip=({children,active,color:c,onClick})=>(<button onClick={onClick} style={{padding:"8px 14px",borderRadius:4,border:`1px solid ${active?(c||X.gold):X.border}`,background:active?(c||X.gold)+"15":"transparent",color:active?(c||X.gold):X.dim,cursor:"pointer",fontSize:14,whiteSpace:"nowrap"}}>{children}</button>);
const Inp=({label,value,onChange,placeholder,type="text",style:s})=>(<div style={{display:"flex",flexDirection:"column",gap:4,...s}}>{label&&<label style={{fontSize:12,letterSpacing:2,textTransform:"uppercase",color:X.dim}}>{label}</label>}<input type={type} value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{background:X.card,border:`1px solid ${X.border}`,borderRadius:5,padding:"11px 12px",color:X.text,fontSize:16,width:"100%",boxSizing:"border-box"}}/></div>);
const Txt=({label,value,onChange,placeholder,rows=3})=>(<div style={{display:"flex",flexDirection:"column",gap:4}}>{label&&<label style={{fontSize:12,letterSpacing:2,textTransform:"uppercase",color:X.dim}}>{label}</label>}<textarea value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{background:X.card,border:`1px solid ${X.border}`,borderRadius:5,padding:"11px 12px",color:X.text,fontSize:15,resize:"vertical",width:"100%",boxSizing:"border-box"}}/></div>);
const Lb=({children,color:c})=>(<span style={{fontSize:12,letterSpacing:2.5,textTransform:"uppercase",color:c||X.dim}}>{children}</span>);
const Sec=({title,accent:a,children})=>(<div style={{borderLeft:`3px solid ${a||X.gold}`,paddingLeft:14,marginBottom:24}}><Lb color={a||X.gold}>{title}</Lb><div style={{marginTop:10}}>{children}</div></div>);
const SBar=({label,value,onChange,max=5})=>(<div style={{marginBottom:12,display:"flex",alignItems:"center",gap:10}}><span style={{width:28,fontSize:14,color:X.dim,textAlign:"right"}}>{label}</span><div style={{flex:1,display:"flex",gap:4}}>{Array.from({length:max},(_,i)=>i+1).map(n=>(<button key={n} onClick={()=>onChange(n)} style={{flex:1,height:36,borderRadius:4,border:"none",cursor:"pointer",background:n<=value?sc(value,max):"#282624",color:n<=value?X.bg:X.dimmer,fontSize:14,fontWeight:700}}>{n}</button>))}</div><span style={{width:22,fontSize:18,fontWeight:700,color:sc(value,max)}}>{value}</span></div>);
const Back=({onClick,label})=>(<button onClick={onClick} style={{background:"none",border:"none",color:X.dim,cursor:"pointer",fontSize:15,padding:"14px 0"}}>← {label||"Back"}</button>);
const Del=({children,onDel})=>(<div style={{display:"flex",alignItems:"center",gap:6}}><div style={{flex:1}}>{children}</div><button onClick={e=>{e.stopPropagation();onDel()}} style={{background:"none",border:"none",color:X.red+"66",cursor:"pointer",fontSize:20,padding:"0 6px"}}>×</button></div>);
const Radar=({sig,size=100})=>{const r=size*.36,cx=size/2,cy=size/2,a=[0,1,2,3].map(i=>(i*Math.PI*2)/4-Math.PI/2),gv=ch=>ch===sig.dominant?1:ch===sig.blind?.55:ch===sig.ghost?.2:.5,v=CH.map(gv),pts=v.map((val,i)=>({x:cx+Math.cos(a[i])*r*val,y:cy+Math.sin(a[i])*r*val})),gc=ch=>ch===sig.dominant?X.gold:ch===sig.blind?X.orange:ch===sig.ghost?X.red:X.dimmer;return(<svg width={size} height={size}>{[.25,.5,.75,1].map(s=><polygon key={s} points={a.map(an=>`${cx+Math.cos(an)*r*s},${cy+Math.sin(an)*r*s}`).join(" ")} fill="none" stroke={X.border}/>)}<polygon points={pts.map(p=>`${p.x},${p.y}`).join(" ")} fill={X.gold+"12"} stroke={X.gold} strokeWidth={1.5}/>{a.map((an,i)=><text key={i} x={cx+Math.cos(an)*(r+12)} y={cy+Math.sin(an)*(r+12)} textAnchor="middle" dominantBaseline="central" fill={gc(CH[i])} fontSize={11} fontWeight={700}>{"SVEI"[i]}</text>)}</svg>)};
const Spark=({data,w=240,h=55})=>{if(!data||data.length<2)return null;const pad=12,mx=Math.max(...data),mn=Math.min(...data),rng=mx-mn||1,pts=data.map((v,i)=>({x:pad+(i/(data.length-1))*(w-pad*2),y:pad+(1-(v-mn)/rng)*(h-pad*2)}));return(<svg width={w} height={h}><path d={pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ")} fill="none" stroke={X.gold} strokeWidth={2}/>{pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={3.5} fill={X.bg} stroke={X.gold} strokeWidth={2}/>)}</svg>)};

// ═══ APP ═══
function App() {
  const [clients,setClients]=useState([]);
  const [cl,setCl]=useState(null);
  const [compass,setCompass]=useState([]);
  const [arc,setArc]=useState([]);
  const [tus,setTus]=useState([]);
  const [resets,setResets]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState(null);
  const [tab,setTab]=useState("clients");
  const [editCl,setEditCl]=useState(null);
  const [sLog,setSLog]=useState(null);
  const [arcI,setArcI]=useState(null);
  const [tuNew,setTuNew]=useState(null);
  const [rstNew,setRstNew]=useState(null);
  const [search,setSearch]=useState("");
  const sr=useRef(null);

  useEffect(()=>{loadClients()},[]);
  useEffect(()=>{sr.current?.scrollTo(0,0)},[tab]);

  async function loadClients(){try{setClients(await DB.getClients());setErr(null)}catch(e){setErr(e.message)}finally{setLoading(false)}}

  async function openCl(id){
    try{setLoading(true);
      const[c,ch,a,t,r]=await Promise.all([DB.getClient(id),DB.getCompass(id),DB.getArc(id),DB.getTu(id),DB.getResets(id)]);
      setCl(c);setCompass(ch);setArc(a);setTus(t);setResets(r);setTab("detail");
    }catch(e){setErr(e.message)}finally{setLoading(false)}
  }

  async function saveCl(c){
    setSaving(true);try{
      const saved=await DB.saveClient({name:c.name||"",dog:c.dog||"",breed:c.breed||"",age:c.age||"",sig_dominant:c.sig_dominant||"",sig_blind:c.sig_blind||"",sig_ghost:c.sig_ghost||"",profile:c.profile||"",notes:c.notes||"",...(c.id?{id:c.id}:{})});
      setCl(saved);await loadClients();setTab("detail");return saved;
    }catch(e){setErr(e.message)}finally{setSaving(false)}
  }

  async function logSession(s){
    setSaving(true);try{
      const ct=s.ER+s.T+s.CC+s.CO+s.IN;
      await DB.addCompass({client_id:cl.id,date:s.date,er:s.ER,t:s.T,cc:s.CC,co:s.CO,in:s.IN,source:"session"});
      await DB.saveArc({client_id:cl.id,session_num:s.sn,date:s.date,recovery:s.rec,checkins:s.chk,compass_total:ct,high_state:s.hs,profile:s.prof,trend:s.trend,focus:s.focus,notes:s.notes});
      await openCl(cl.id);setSLog(null);
    }catch(e){setErr(e.message)}finally{setSaving(false)}
  }

  async function saveTuneUp(t){
    setSaving(true);try{
      await DB.addTu({client_id:cl.id,date:t.date,compass_before:t.cb,compass_after:t.ca,issue_1:t.i1,issue_2:t.i2,issue_3:t.i3,win:t.win});
      await openCl(cl.id);setTuNew(null);
    }catch(e){setErr(e.message)}finally{setSaving(false)}
  }

  async function saveReset(r){
    setSaving(true);try{
      await DB.addReset({client_id:cl.id,date:r.date,resolved:r.ok,notes:r.notes});
      await openCl(cl.id);setRstNew(null);
    }catch(e){setErr(e.message)}finally{setSaving(false)}
  }

  if(loading)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100dvh"}}><span style={{color:X.dim,fontSize:14}}>Loading…</span></div>);

  const sh={minHeight:"100dvh",display:"flex",flexDirection:"column"};
  const ct={flex:1,overflowY:"auto",padding:"0 16px 100px",WebkitOverflowScrolling:"touch"};

  const Nav=()=>(<div style={{position:"fixed",bottom:0,left:0,right:0,background:"#1E1E1E",borderTop:`1px solid ${X.border}`,display:"flex",justifyContent:"center",zIndex:100}}><div style={{display:"flex",maxWidth:480,width:"100%"}}>{["Clients","Diagnose","States","Ref"].map(l=>(<button key={l} onClick={()=>setTab(l.toLowerCase())} style={{flex:1,background:"none",border:"none",padding:"12px 0 14px",cursor:"pointer"}}><span style={{fontSize:12,letterSpacing:1.5,color:tab===l.toLowerCase()?X.gold:X.dimmer,textTransform:"uppercase"}}>{l}</span></button>))}</div></div>);

  const Header=()=>(<div style={{padding:"20px 16px 14px",textAlign:"center",borderBottom:`1px solid ${X.border}`}}><div style={{fontSize:10,letterSpacing:4,color:X.dimmer}}>STEADY HAND RaD™</div><div style={{fontSize:20,fontWeight:700,letterSpacing:2,color:X.gold,marginTop:2}}>ARC TRACKER</div>{saving&&<div style={{fontSize:12,color:X.green,marginTop:4}}>Saving…</div>}{err&&<div style={{fontSize:12,color:X.red,marginTop:4}}>{err} <button onClick={()=>setErr(null)} style={{background:"none",border:"none",color:X.dim,cursor:"pointer"}}>dismiss</button></div>}</div>);

  // ═══ CLIENTS ═══
  if(tab==="clients"){
    const filtered=search?clients.filter(c=>(c.name+c.dog).toLowerCase().includes(search.toLowerCase())):clients;
    return(<div style={sh}><Header/><div ref={sr} style={ct}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search clients…" style={{width:"100%",background:X.card,border:`1px solid ${X.border}`,borderRadius:5,padding:"11px 12px",color:X.text,fontSize:15,boxSizing:"border-box",marginTop:12,marginBottom:8}}/>
      {filtered.length===0&&<div style={{textAlign:"center",color:X.dimmer,padding:"30px 0",fontSize:14}}>{clients.length===0?"No clients yet.":"No matches."}</div>}
      {filtered.map(c=>(<button key={c.id} onClick={()=>openCl(c.id)} style={{display:"flex",alignItems:"center",gap:14,width:"100%",padding:"14px 12px",background:X.card,border:`1px solid ${X.border}`,borderRadius:6,marginTop:8,cursor:"pointer",textAlign:"left"}}><div style={{width:42,height:42,borderRadius:"50%",background:X.bg,border:`1px solid ${X.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:X.gold,fontWeight:700,flexShrink:0}}>{(c.name||"?")[0]?.toUpperCase()}</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:16,fontWeight:600,color:X.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name||"Unnamed"}</div><div style={{fontSize:13,color:X.dim}}>{c.dog||"—"} · {c.profile||"—"}</div></div></button>))}
      <div style={{textAlign:"center",marginTop:20}}><Btn accent onClick={()=>{setEditCl({name:"",dog:"",breed:"",age:"",sig_dominant:"",sig_blind:"",sig_ghost:"",profile:"",notes:""});setTab("edit")}}>+ New Client</Btn></div>
    </div><Nav/></div>);
  }

  // ═══ EDIT ═══
  if(tab==="edit"&&editCl){
    const set=(k,v)=>setEditCl({...editCl,[k]:v});
    return(<div style={sh}><div ref={sr} style={ct}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0"}}><Back onClick={()=>{setEditCl(null);setTab(cl?"detail":"clients")}}/><Btn accent onClick={async()=>{const saved=await saveCl(editCl);if(saved){setEditCl(null);await openCl(saved.id)}}}>Save</Btn></div>
      <Sec title="Client Info"><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Inp label="Handler" value={editCl.name} onChange={v=>set("name",v)} placeholder="Name"/><Inp label="Dog" value={editCl.dog} onChange={v=>set("dog",v)} placeholder="Dog name"/><Inp label="Breed" value={editCl.breed} onChange={v=>set("breed",v)} placeholder="Breed"/><Inp label="Age" value={editCl.age} onChange={v=>set("age",v)} placeholder="Age"/></div></Sec>
      <Sec title="Handler Signature™">{["dominant","blind","ghost"].map(role=>(<div key={role} style={{marginBottom:14}}><Lb color={role==="dominant"?X.gold:role==="blind"?X.orange:X.red}>{role}</Lb><div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>{CH.map(ch=><Chip key={ch} active={editCl["sig_"+role]===ch} color={role==="dominant"?X.gold:role==="blind"?X.orange:X.red} onClick={()=>set("sig_"+role,ch)}>{ch}</Chip>)}</div></div>))}</Sec>
      <Sec title="Profile" accent={X.green}><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{ALLP.map(p=><Chip key={p} active={editCl.profile===p} color={X.green} onClick={()=>set("profile",p)}>{p}</Chip>)}</div></Sec>
      <Sec title="Notes" accent={X.dim}><Txt value={editCl.notes} onChange={v=>set("notes",v)} placeholder="Notes…"/></Sec>
      {editCl.id&&<div style={{textAlign:"center",marginTop:16}}><Btn danger onClick={async()=>{if(confirm("Delete this client?")){await DB.deleteClient(editCl.id);setEditCl(null);setCl(null);await loadClients();setTab("clients")}}}>Delete</Btn></div>}
    </div><Nav/></div>);
  }

  // ═══ DETAIL ═══
  if(tab==="detail"&&cl){
    const sig={dominant:cl.sig_dominant,blind:cl.sig_blind,ghost:cl.sig_ghost};
    const hasSig=sig.dominant||sig.blind||sig.ghost;
    const lc=compass[compass.length-1];
    const total=lc?lc.er+lc.t+lc.cc+lc.co+lc.in:null;
    const cTotals=compass.map(c=>c.er+c.t+c.cc+c.co+c.in);
    const logged=arc.filter(s=>s.date).length;
    const nextS=16-logged>0?logged+1:16;
    const bp=["Reactive","Rigid","Avoidant","Passive"].find(p=>cl.profile?.includes(p))||"";

    return(<div style={sh}><div ref={sr} style={ct}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><Back onClick={()=>{setCl(null);setTab("clients")}} label="All"/><Btn onClick={()=>{setEditCl({...cl});setTab("edit")}}>Edit</Btn></div>
      <div style={{textAlign:"center",marginBottom:24}}><div style={{fontSize:22,fontWeight:700,color:X.text}}>{cl.name}</div><div style={{fontSize:14,color:X.dim,marginTop:4}}>{cl.dog}{cl.breed?` · ${cl.breed}`:""}{cl.age?` · ${cl.age}`:""}</div>{cl.profile&&<div style={{marginTop:8}}><span style={{fontSize:13,padding:"4px 12px",borderRadius:20,background:X.gold+"12",color:X.gold,border:`1px solid ${X.gold}44`}}>{cl.profile}</span></div>}</div>

      {/* SESSION LOG */}
      <div style={{background:X.gold+"0D",border:`1px solid ${X.gold}44`,borderRadius:6,padding:14,marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><Lb color={X.gold}>Session Log</Lb><div style={{fontSize:13,color:X.dim,marginTop:3}}>Feeds Arc + Compass</div></div>
        <Btn accent onClick={()=>{const b=BLK[Math.floor((nextS-1)/4)];setSLog({sn:nextS,block:b?.l||"Autonomy",date:td(),rec:null,chk:null,hs:null,prof:"",trend:"",ER:3,T:3,CC:3,CO:3,IN:3,focus:"",notes:""});setTab("sLog")}}>+ Log</Btn></div>
      </div>

      {hasSig&&<Sec title="Signature"><div style={{display:"flex",gap:14,alignItems:"center"}}><Radar sig={sig}/><div style={{display:"flex",flexDirection:"column",gap:8}}>{[["dominant",X.gold],["blind",X.orange],["ghost",X.red]].map(([r,c])=>sig[r]?<div key={r} style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:8,height:8,borderRadius:"50%",background:c}}/><span style={{fontSize:12,color:X.dim,textTransform:"uppercase",width:60}}>{r}</span><span style={{fontSize:15,color:c,fontWeight:600}}>{sig[r]}</span></div>:null)}</div></div></Sec>}

      <Sec title="Compass" accent={total?sc(total,25):X.gold}>
        {lc?(<><div style={{display:"flex",alignItems:"baseline",gap:14,marginBottom:10}}><span style={{fontSize:34,fontWeight:700,color:sc(total,25)}}>{total}</span><span style={{fontSize:14,color:X.dimmer}}>/25</span><span style={{fontSize:13,color:X.dim,marginLeft:"auto"}}>{lc.date}</span></div><div style={{display:"flex",gap:8,marginBottom:10}}>{CMP.map(cat=><div key={cat.k} style={{flex:1,background:X.bg,borderRadius:4,padding:"6px 0",textAlign:"center"}}><div style={{fontSize:11,color:X.dim}}>{cat.l}</div><div style={{fontSize:18,fontWeight:700,color:sc(lc[cat.k],5)}}>{lc[cat.k]}</div></div>)}</div>{cTotals.length>1&&<Spark data={cTotals}/>}</>):<div style={{fontSize:14,color:X.dimmer}}>No compass scores yet.</div>}
        {compass.map(c=>{const t=c.er+c.t+c.cc+c.co+c.in;return(<Del key={c.id} onDel={async()=>{await DB.delCompass(c.id);setCompass(compass.filter(x=>x.id!==c.id))}}><div style={{fontSize:13,color:X.dim,padding:"5px 0"}}><span style={{fontWeight:700,color:sc(t,25)}}>{t}/25</span> · {c.date}</div></Del>)})}
      </Sec>

      <Sec title={`Arc · ${logged}/16`} accent={X.blue}>
        {logged>0?arc.filter(s=>s.date).slice(-4).reverse().map(s=>(<button key={s.session_num} onClick={()=>{setArcI(s.session_num);setTab("arcEdit")}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"8px 0",background:"none",border:"none",borderBottom:`1px solid ${X.bg}`,cursor:"pointer",textAlign:"left"}}><span style={{width:24,fontSize:14,fontWeight:700,color:X.blue}}>#{s.session_num}</span><span style={{flex:1,fontSize:13,color:X.dim}}>{s.date}</span>{s.recovery!==null&&<span style={{fontSize:12,padding:"2px 6px",borderRadius:3,background:sc(s.recovery,3)+"18",color:sc(s.recovery,3)}}>R{s.recovery}</span>}{s.compass_total!==null&&<span style={{fontSize:12,padding:"2px 6px",borderRadius:3,background:sc(s.compass_total,25)+"18",color:sc(s.compass_total,25)}}>C{s.compass_total}</span>}{s.trend&&<span style={{fontSize:14}}>{s.trend}</span>}</button>)):<div style={{fontSize:14,color:X.dimmer}}>No sessions yet.</div>}
        <Btn full onClick={()=>setTab("arc")} style={{marginTop:10}}>View Full Arc</Btn>
      </Sec>

      <Sec title={`Tune-Ups · ${tus.length}`} accent={X.orange}>
        {tus.slice(0,3).map(t=>(<Del key={t.id} onDel={async()=>{await DB.delTu(t.id);setTus(tus.filter(x=>x.id!==t.id))}}><div style={{fontSize:13,color:X.dim,padding:"5px 0"}}>{t.date} · <span style={{color:X.orange}}>{t.compass_before}→{t.compass_after}/25</span></div></Del>))}
        <Btn full onClick={()=>{setTuNew({date:td(),cb:null,ca:null,i1:"",i2:"",i3:"",win:""});setTab("tuNew")}} style={{marginTop:10}}>+ Tune-Up</Btn>
      </Sec>

      <Sec title={`Resets · ${resets.length}`} accent={X.red}>
        {resets.slice(0,3).map(r=>(<Del key={r.id} onDel={async()=>{await DB.delReset(r.id);setResets(resets.filter(x=>x.id!==r.id))}}><div style={{fontSize:13,color:X.dim,padding:"5px 0"}}>{r.date} · <span style={{color:r.resolved?X.green:X.red}}>{r.resolved?"Resolved":"Pending"}</span></div></Del>))}
        <Btn full onClick={()=>{setRstNew({date:td(),ok:false,notes:""});setTab("rstNew")}} style={{marginTop:10}}>+ Reset</Btn>
      </Sec>

      {bp&&PW[bp]&&<Sec title={bp} accent={X.orange}><div style={{fontSize:14,color:X.dim}}>{PW[bp].w}</div><div style={{fontSize:14,color:X.orange,fontStyle:"italic",marginTop:6}}>"{PW[bp].c}"</div></Sec>}
    </div><Nav/></div>);
  }

  // ═══ SESSION LOG ═══
  if(tab==="sLog"&&sLog&&cl){
    const s=sLog,set=(k,v)=>setSLog({...s,[k]:v}),cT=s.ER+s.T+s.CC+s.CO+s.IN;
    return(<div style={sh}><div ref={sr} style={ct}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><Back onClick={()=>{setSLog(null);setTab("detail")}}/><Btn accent onClick={()=>logSession(s)}>Save</Btn></div>
      <div style={{textAlign:"center",marginBottom:18}}><Lb color={X.gold}>SESSION #{s.sn} · {s.block}</Lb><div style={{fontSize:13,color:X.dim,marginTop:6}}>Saves to Arc + Compass</div></div>
      <Inp label="Date" value={s.date} onChange={v=>set("date",v)} type="date" style={{marginBottom:14}}/>
      <Inp label="Focus" value={s.focus} onChange={v=>set("focus",v)} placeholder="What did you work on?" style={{marginBottom:18}}/>
      <Sec title="Dog" accent={X.blue}>
        <Lb>Recovery (0–3)</Lb><div style={{display:"flex",gap:8,margin:"8px 0 14px"}}>{[0,1,2,3].map(n=><Chip key={n} active={s.rec===n} color={sc(Math.max(n,.5),3)} onClick={()=>set("rec",n)}>{n}</Chip>)}</div>
        <Lb>Check-ins (per 10m)</Lb><Inp value={s.chk} onChange={v=>set("chk",v===""?null:parseInt(v)||0)} type="number" placeholder="0" style={{marginTop:6,marginBottom:14}}/>
        <Lb>High State</Lb><div style={{display:"flex",gap:6,margin:"6px 0"}}>{ST.map(st=><Chip key={st.n} active={s.hs===st.n} color={st.c} onClick={()=>set("hs",st.n)}>{st.n}</Chip>)}</div>{s.hs&&<div style={{fontSize:13,color:ST[s.hs-1]?.c}}>{ST[s.hs-1]?.nm}</div>}
      </Sec>
      <Sec title={`Compass · ${cT}/25`} accent={sc(cT,25)}>{CMP.map(cat=><SBar key={cat.k} label={cat.l} value={s[cat.l]} onChange={v=>set(cat.l,v)}/>)}</Sec>
      <Sec title="Handler" accent={X.dim}>
        <Lb>Profile</Lb><div style={{display:"flex",gap:6,margin:"6px 0 14px"}}>{Object.entries(SPROF).map(([k,v])=><Chip key={k} active={s.prof===k} onClick={()=>set("prof",k)}>{v}</Chip>)}</div>
        <Lb>Trend</Lb><div style={{display:"flex",gap:8,marginTop:6}}>{["↑","→","↓"].map(t=><Chip key={t} active={s.trend===t} color={t==="↑"?X.green:t==="→"?X.gold:X.red} onClick={()=>set("trend",t)}>{t}</Chip>)}</div>
      </Sec>
      <Txt label="Notes" value={s.notes} onChange={v=>set("notes",v)}/>
    </div><Nav/></div>);
  }

  // ═══ ARC FULL ═══
  if(tab==="arc"&&cl){
    const allSessions=Array.from({length:16},(_,i)=>{const s=arc.find(a=>a.session_num===i+1);return s||{session_num:i+1,date:null}});
    return(<div style={sh}><div ref={sr} style={ct}>
      <Back onClick={()=>setTab("detail")} label={cl.name}/>
      <Lb color={X.blue}>90-DAY ARC · {arc.filter(s=>s.date).length}/16</Lb>
      <div style={{marginTop:14}}>{allSessions.map((s,i)=>(<button key={i} onClick={()=>{setArcI(s.session_num);setTab("arcEdit")}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"10px 8px",background:s.date?X.card:"transparent",border:`1px solid ${s.date?X.border:X.border+"44"}`,borderRadius:5,marginBottom:5,cursor:"pointer",textAlign:"left",opacity:s.date?1:.5}}><span style={{width:26,fontSize:14,fontWeight:700,color:X.blue}}>#{s.session_num}</span><span style={{flex:1,fontSize:13,color:X.dim}}>{s.date||"—"}</span>{s.recovery!==null&&s.recovery!==undefined&&<span style={{fontSize:12,color:sc(s.recovery,3)}}>R{s.recovery}</span>}{s.compass_total&&<span style={{fontSize:12,color:sc(s.compass_total,25)}}>C{s.compass_total}</span>}{s.trend&&<span style={{fontSize:14}}>{s.trend}</span>}</button>))}</div>
    </div><Nav/></div>);
  }

  // ═══ ARC EDIT ═══
  if(tab==="arcEdit"&&cl&&arcI){
    const existing=arc.find(a=>a.session_num===arcI)||{session_num:arcI,date:"",recovery:null,checkins:null,compass_total:null,high_state:null,profile:"",trend:"",focus:"",notes:""};
    const[s,setS]=useState(existing);
    const set=(k,v)=>setS({...s,[k]:v});
    return(<div style={sh}><div ref={sr} style={ct}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><Back onClick={()=>{setArcI(null);setTab("arc")}}/><Btn accent onClick={async()=>{setSaving(true);try{await DB.saveArc({client_id:cl.id,...s});await openCl(cl.id);setArcI(null)}catch(e){setErr(e.message)}finally{setSaving(false)}}}>Save</Btn></div>
      <Lb color={X.blue}>SESSION #{s.session_num}</Lb>
      <Inp label="Date" value={s.date} onChange={v=>set("date",v)} type="date" style={{marginTop:10,marginBottom:14}}/>
      <Sec title="Recovery"><div style={{display:"flex",gap:8}}>{[0,1,2,3].map(n=><Chip key={n} active={s.recovery===n} color={sc(Math.max(n,.5),3)} onClick={()=>set("recovery",n)}>{n}</Chip>)}</div></Sec>
      <Sec title="Check-ins" accent={X.green}><Inp value={s.checkins} onChange={v=>set("checkins",v===""?null:parseInt(v)||0)} type="number" placeholder="per 10m"/></Sec>
      <Sec title="Compass"><Inp value={s.compass_total} onChange={v=>set("compass_total",v===""?null:parseInt(v)||0)} type="number" placeholder="/25"/></Sec>
      <Sec title="High State"><div style={{display:"flex",gap:6}}>{ST.map(st=><Chip key={st.n} active={s.high_state===st.n} color={st.c} onClick={()=>set("high_state",st.n)}>{st.n}</Chip>)}</div></Sec>
      <Sec title="Profile"><div style={{display:"flex",gap:6}}>{Object.entries(SPROF).map(([k,v])=><Chip key={k} active={s.profile===k} onClick={()=>set("profile",k)}>{v}</Chip>)}</div></Sec>
      <Sec title="Trend"><div style={{display:"flex",gap:8}}>{["↑","→","↓"].map(t=><Chip key={t} active={s.trend===t} color={t==="↑"?X.green:t==="→"?X.gold:X.red} onClick={()=>set("trend",t)}>{t}</Chip>)}</div></Sec>
      <Txt label="Notes" value={s.notes} onChange={v=>set("notes",v)}/>
    </div><Nav/></div>);
  }

  // ═══ TUNE-UP ═══
  if(tab==="tuNew"&&tuNew&&cl){
    const t=tuNew,set=(k,v)=>setTuNew({...t,[k]:v});
    return(<div style={sh}><div ref={sr} style={ct}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><Back onClick={()=>{setTuNew(null);setTab("detail")}}/><Btn accent onClick={()=>saveTuneUp(t)}>Save</Btn></div>
      <Lb color={X.orange}>TUNE-UP</Lb>
      <Inp label="Date" value={t.date} onChange={v=>set("date",v)} type="date" style={{marginTop:10,marginBottom:14}}/>
      <Sec title="Compass" accent={X.orange}><div style={{display:"flex",gap:10}}><Inp label="Before" value={t.cb} onChange={v=>set("cb",v===""?null:parseInt(v)||0)} type="number" style={{flex:1}}/><Inp label="After" value={t.ca} onChange={v=>set("ca",v===""?null:parseInt(v)||0)} type="number" style={{flex:1}}/></div></Sec>
      <Sec title="Issues"><Inp label="#1" value={t.i1} onChange={v=>set("i1",v)} style={{marginBottom:8}}/><Inp label="#2" value={t.i2} onChange={v=>set("i2",v)} style={{marginBottom:8}}/><Inp label="#3" value={t.i3} onChange={v=>set("i3",v)}/></Sec>
      <Inp label="The Win" value={t.win} onChange={v=>set("win",v)} placeholder="One clear win."/>
    </div><Nav/></div>);
  }

  // ═══ RESET ═══
  if(tab==="rstNew"&&rstNew&&cl){
    const r=rstNew,set=(k,v)=>setRstNew({...r,[k]:v});
    return(<div style={sh}><div ref={sr} style={ct}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><Back onClick={()=>{setRstNew(null);setTab("detail")}}/><Btn accent onClick={()=>saveReset(r)}>Save</Btn></div>
      <Lb color={X.red}>RESET PROTOCOL</Lb>
      <div style={{fontSize:14,color:X.dim,marginTop:6,marginBottom:16,fontStyle:"italic"}}>Regression isn't failure. It's a boundary test you haven't answered yet.</div>
      <Inp label="Date" value={r.date} onChange={v=>set("date",v)} type="date" style={{marginBottom:14}}/>
      <div style={{display:"flex",gap:8,marginBottom:14}}><Chip active={r.ok} color={X.green} onClick={()=>set("ok",true)}>Resolved</Chip><Chip active={!r.ok} color={X.red} onClick={()=>set("ok",false)}>Book Tune-Up</Chip></div>
      <Txt label="Notes" value={r.notes} onChange={v=>set("notes",v)}/>
    </div><Nav/></div>);
  }

  // ═══ DIAGNOSE ═══
  if(tab==="diagnose"){return(<div style={sh}><div ref={sr} style={ct}><div style={{padding:"18px 0 10px"}}><Lb color={X.gold}>DIAGNOSTIC CARD</Lb></div>{[{t:"1. Dominant",d:"What fires FIRST. They defend it.",c:X.gold},{t:"2. Blind",d:"Surprise. Friction when named.",c:X.orange},{t:"3. Ghost",d:"Ask for deliberate example. Blankness.",c:X.red}].map((st,i)=>(<div key={i} style={{marginBottom:14,padding:14,background:X.card,border:`1px solid ${st.c}33`,borderRadius:5}}><div style={{fontSize:16,fontWeight:700,color:st.c}}>{st.t}</div><div style={{fontSize:14,color:X.dim,marginTop:6}}>{st.d}</div></div>))}<Sec title="Channel Questions" accent={X.blue}>{CH.map(ch=>(<div key={ch} style={{marginBottom:14}}><div style={{fontSize:15,fontWeight:700,color:X.text}}>{ch}</div><div style={{fontSize:14,color:X.gold,fontStyle:"italic",marginTop:4}}>"{DQ[ch].ask}"</div><div style={{fontSize:13,color:X.dim,marginTop:3}}>{DQ[ch].listen}</div></div>))}</Sec><Sec title="Blind vs Ghost" accent={X.orange}><div style={{display:"flex",gap:10}}><div style={{flex:1,padding:12,background:X.bg,borderRadius:5,borderTop:`3px solid ${X.orange}`}}><div style={{fontSize:15,fontWeight:700,color:X.orange}}>BLIND</div><div style={{fontSize:14,color:X.orange,marginTop:6}}>FRICTION</div><div style={{fontSize:13,color:X.dimmer,marginTop:4}}>Correct the channel.</div></div><div style={{flex:1,padding:12,background:X.bg,borderRadius:5,borderTop:`3px solid ${X.red}`}}><div style={{fontSize:15,fontWeight:700,color:X.red}}>GHOST</div><div style={{fontSize:14,color:X.red,marginTop:6}}>BLANKNESS</div><div style={{fontSize:13,color:X.dimmer,marginTop:4}}>Introduce the channel.</div></div></div></Sec></div><Nav/></div>)}

  // ═══ STATES ═══
  if(tab==="states"){return(<div style={sh}><div ref={sr} style={ct}><div style={{padding:"18px 0 10px"}}><Lb color={X.gold}>FIVE-STATE AWARENESS MAP™</Lb></div>{ST.map(s=>(<div key={s.n} style={{marginBottom:14,padding:14,background:X.card,border:`1px solid ${s.n===3?s.c+"44":X.border}`,borderRadius:5,borderLeft:`4px solid ${s.c}`}}><span style={{fontSize:20,fontWeight:700,color:s.c}}>{s.n}</span>{" "}<span style={{fontSize:16,fontWeight:600,color:X.text}}>{s.nm}</span>{s.n===3&&<div style={{fontSize:14,color:s.c,marginTop:8,fontWeight:600}}>State 3 is the fulcrum.</div>}</div>))}<div style={{padding:14,borderRadius:5,border:`1px solid ${X.gold}22`}}><div style={{fontSize:14,color:X.dim}}>The dog doesn't need you to be perfect. They need you to be present at State 3.</div></div></div><Nav/></div>)}

  // ═══ REF ═══
  if(tab==="ref"){return(<div style={sh}><div ref={sr} style={ct}><div style={{padding:"18px 0 14px"}}><Lb color={X.gold}>REFERENCE</Lb></div><Sec title="Profiles" accent={X.green}>{Object.entries(PW).map(([p,d])=>(<div key={p} style={{marginBottom:12,padding:12,background:X.bg,borderRadius:5}}><div style={{fontSize:15,fontWeight:700,color:X.green}}>{p}</div><div style={{fontSize:14,color:X.dim,marginTop:4}}>{d.w}</div><div style={{fontSize:14,color:X.orange,marginTop:4,fontStyle:"italic"}}>"{d.c}"</div></div>))}</Sec><Sec title="Channels™" accent={X.blue}>{CH.map(ch=>(<div key={ch} style={{marginBottom:12,padding:12,background:X.bg,borderRadius:5}}><div style={{fontSize:15,fontWeight:700,color:X.blue}}>{ch}</div><div style={{fontSize:14,color:X.gold,marginTop:4,fontStyle:"italic"}}>"{DQ[ch].ask}"</div><div style={{fontSize:13,color:X.dim,marginTop:3}}>{DQ[ch].listen}</div></div>))}<div style={{fontSize:14,color:X.dim,padding:12,background:X.bg,borderRadius:5,borderLeft:`3px solid ${X.gold}`}}>You are adding to the pressure load or stabilizing it. There is no neutral.</div></Sec><Sec title="Compass" accent={X.gold}>{CMP.map(cat=>(<div key={cat.k} style={{marginBottom:8,padding:"8px 12px",background:X.bg,borderRadius:5}}><span style={{fontSize:14,fontWeight:700,color:X.gold}}>{cat.l}</span></div>))}</Sec><div style={{textAlign:"center",padding:"24px 0",color:X.dimmer,fontSize:11,letterSpacing:2}}>STEADY HAND DOG TRAINING<br/>THE SIGNATURE IS THE MAP.<br/>THE COMPASS IS THE PROOF OF MOVEMENT.</div></div><Nav/></div>)}

  return(<div style={sh}><div style={ct}><Btn onClick={()=>setTab("clients")}>← Back</Btn></div><Nav/></div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
