<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Arc Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0e0c;--cd:#1a1814;--cb:#2e2b24;--ac:#8a8050;--ad:#5a5535;--ab:#b0a860;--tx:#c8c0b0;--td:#706858;--tm:#4a4438;--bl:#5b9bd5;--gn:#5a8a50;--rd:#a04040;--am:#a08840;--sf:#141210}
body{background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',monospace;max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:70px;-webkit-tap-highlight-color:transparent}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}
.top{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--cb)}
.hdr{padding:24px 16px 8px;text-align:center}
.hdr .sub{font-size:9px;letter-spacing:4px;color:var(--td)}
.hdr .ttl{font-size:17px;font-weight:700;letter-spacing:3px;color:var(--ac);margin-top:4px}
.hdr .sync{font-size:9px;color:var(--gn);margin-top:4px}
.sec{border-left:3px solid var(--ac);padding-left:14px;margin:0 16px 20px}
.sec-t{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--ac);margin-bottom:8px}
.card{background:var(--cd);border:1px solid var(--cb);border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;width:100%;text-align:left;border-left:1px solid var(--cb)}
.card:active{border-color:var(--ac)}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--sf);border:1px solid var(--cb);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ac);font-weight:700;flex-shrink:0}
.badge{display:inline-block;padding:5px 10px;border-radius:4px;border:1px solid var(--cb);color:var(--td);font-size:11px;cursor:pointer;white-space:nowrap;transition:all .12s}
.badge.on{border-color:var(--ac);background:rgba(138,128,80,.12);color:var(--ac)}
.btn{padding:6px 12px;border-radius:4px;border:1px solid var(--cb);background:transparent;color:var(--td);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.btn-f{border:none;background:var(--ac);color:var(--bg)}
.btn-bl{border:none;background:var(--bl);color:var(--bg)}
.inp{background:var(--sf);border:1px solid var(--cb);border-radius:4px;padding:8px 10px;color:var(--tx);font-size:13px;outline:none;width:100%;box-sizing:border-box}
.lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--td);display:block;margin-bottom:4px}
.ta{background:var(--sf);border:1px solid var(--cb);border-radius:4px;padding:8px;color:var(--tx);font-size:12px;outline:none;width:100%;box-sizing:border-box;resize:vertical;min-height:60px}
.row{display:flex;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid var(--sf)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.x-btn{background:none;border:none;color:var(--tm);font-size:13px;cursor:pointer}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--cb);display:flex;justify-content:center;z-index:100}
.nav-inner{display:flex;max-width:520px;width:100%;justify-content:space-around;padding:8px 0 12px}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;color:var(--td);font-family:inherit}
.nav-btn.on{color:var(--ac)}
.nav-btn span:first-child{font-size:16px}
.nav-btn span:last-child{font-size:8px;letter-spacing:2px;font-weight:700}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.badges{display:flex;gap:4px;flex-wrap:wrap}
.score-row{display:flex;align-items:center;gap:8px}
.score-row .sl{width:28px;font-size:10px;color:var(--td);text-align:right;flex-shrink:0}
.score-row .dots{flex:1;display:flex;gap:3px}
.score-row .dots button{flex:1;height:26px;border-radius:3px;border:none;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer}
.score-row .sv{width:18px;font-size:13px;font-weight:700}
.action-card{background:var(--cd);border:1px solid var(--cb);border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.hidden{display:none}
</style>
</head>
<body>
<div id="app"></div>
<div class="nav"><div class="nav-inner" id="nav"></div></div>

<script>
// ═══════ DATA ═══════
const CH=["Spatial","Verbal","Environmental","Internal"],CK=["ER","T","CC","CO","IN"],
CL=["Emotional Regulation","Timing & Pacing","Correction Confidence","Consistency","Intentionality"],
PR=["Reactive","Rigid","Avoidant","Passive","Imp. Reactive","Imp. Rigid","Imp. Avoidant","Imp. Passive","Attuned"],
CPT=["Intake","Day 25","Day 60","Day 84"],JS=["Immersion","Recall","Undercurrent","Other"],
QL=[{v:1,l:"Rough",c:"#a04040"},{v:2,l:"Okay",c:"#a08840"},{v:3,l:"Locked In",c:"#5a8a50"}];

const STATES=[
{n:1,nm:"Compliant Calm",sh:"The goal.",c:"#5a8a50",mk:"Body: Soft · Eyes: Relaxed · Breathing: Even · Weight: Centered",desc:"Loose muscles, soft eyes, regulated breathing, relaxed posture. Present, settled, at ease. Not scanning, not bracing, not waiting. Calm that isn't forced. Stillness that isn't frozen."},
{n:2,nm:"Alert Neutral",sh:"Awareness without commitment.",c:"#7a9a50",mk:"Ears: Rotating · Eyes: Tracking · Body: Oriented but still · Connection: Intact",desc:"Notices something — a sound, a movement, another dog. Ears rotate, eyes shift, body may orient slightly. But they haven't moved. Haven't committed. Still with you. Healthy state."},
{n:3,nm:"Pre-Decision Tension",sh:"Where the real work happens.",c:"#a08840",mk:"Weight: Forward · Ears: Locked · Breathing: Changed · Eye contact: Breaking",desc:"No longer just noticing — weighing a decision. Weight shifts forward. Breathing changes. Ears lock. Body stiffens. Eye contact breaks. Between two pulls — your influence and the environment's. Catch it here and they come back."},
{n:4,nm:"Committed Action",sh:"The decision has been made.",c:"#a06030",mk:"Body: Committed · Focus: Environment · Recovery: Slow · Baseline: Elevated",desc:"Lunge. Break. Bark. Ignore. Committed to the environment over you. Not a bad dog — intervention came too late or influence wasn't deep enough. Corrections require more intensity, recovery takes longer."},
{n:5,nm:"Emotional Override",sh:"Loss of cognitive access.",c:"#a04040",mk:"Eyes: Wide/fixed · Body: Rigid or thrashing · Cognition: Offline · Corrections: Ineffective",desc:"No longer making decisions. Reacting. Adrenaline running. Breathing rapid or held. Eyes wide and fixed. Body rigid or thrashing. Cannot process information. Our job is not to correct. Remove, reduce, wait for downregulation."}
];

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const tdy=()=>new Date().toISOString().split("T")[0];
const sc=(v,m=5)=>(v/m<=.3?"#a04040":v/m<=.5?"#a08840":v/m<=.7?"#8a8050":"#5a8a50");
const cTotal=c=>c.ER+c.T+c.CC+c.CO+c.IN;
const SK="shdt-v5";

const mkClient=()=>({id:uid(),name:"",dog:"",breed:"",age:"",ctx:"",sig:{d:"",b:"",g:""},prof:"",comp:[],sess:[],hw:[],issues:[],notes:""});
const mkComp=cp=>({id:uid(),cp,dt:tdy(),ER:1,T:1,CC:1,CO:1,IN:1});
const mkSess=()=>({id:uid(),dt:tdy(),prof:"",ch:"",focus:"",q:2,stage:"",notes:""});
const mkEval=()=>({id:uid(),dt:tdy(),p1:{feet:"",mouth:"",leash:"",face:"",brk:"",bodyFirst:"",arousal:1,hyp:""},p2:{dir:"",notes:""},sig:{d:"",b:"",g:""},comp:{ER:1,T:1,CC:1,CO:1,IN:1},prof:""});

// ═══════ STATE ═══════
let DATA={c:[]},TAB="clients",AID=null,VW="list",ED=null;

async function load(){
  // Try current key first, then fall back to previous keys
  const keys=["shdt-v5","shdt-arc-v2","shdt-arc-v3","shdt-v4"];
  for(const k of keys){
    try{
      const r=await window.storage.get(k);
      if(r){
        const parsed=JSON.parse(r.value);
        if(parsed&&parsed.c&&parsed.c.length>0){DATA=parsed;break}
        // Check for old React schema (clients instead of c)
        if(parsed&&parsed.clients&&parsed.clients.length>0){
          // Migrate from React schema
          DATA={c:parsed.clients.map(cl=>({
            id:cl.id,name:cl.name||"",dog:cl.dog||"",breed:cl.breed||"",age:cl.age||"",ctx:cl.context||"",
            sig:{d:(cl.signature&&cl.signature.dominant)||"",b:(cl.signature&&cl.signature.blind)||"",g:(cl.signature&&cl.signature.ghost)||""},
            prof:cl.profile||"",comp:(cl.compassHistory||[]).map(ch=>({id:ch.id,cp:ch.checkpoint||"Intake",dt:ch.date||tdy(),ER:ch.ER||1,T:ch.T||1,CC:ch.CC||1,CO:ch.CO||1,IN:ch.IN||1})),
            sess:(cl.sessions||[]).map(s=>({id:s.id,dt:s.date||tdy(),prof:s.profile||"",ch:s.dominantChannel||"",focus:s.focus||"",q:s.quality||2,stage:s.journeyStage||"",notes:s.notes||""})),
            hw:(cl.homework||[]),issues:(cl.recurringIssues||[]),notes:cl.notes||""
          }))};
          // Save migrated data to current key
          await save();break;
        }
      }
    }catch{}
  }
  // Ensure all clients have required arrays
  DATA.c.forEach(c=>{if(!c.comp)c.comp=[];if(!c.sess)c.sess=[];if(!c.hw)c.hw=[];if(!c.issues)c.issues=[];if(!c.sig)c.sig={d:"",b:"",g:""}});
  render();
}
async function save(){try{await window.storage.set(SK,JSON.stringify(DATA))}catch{}}
function getCl(){return DATA.c.find(x=>x.id===AID)}
function updCl(c){const i=DATA.c.findIndex(x=>x.id===c.id);if(i>=0)DATA.c[i]=c;else DATA.c.push(c);save()}
function delCl(id){DATA.c=DATA.c.filter(x=>x.id!==id);save()}

// ═══════ HELPERS ═══════
const h=(tag,attrs,ch)=>{const e=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==="style"&&typeof v==="object")Object.assign(e.style,v);else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="className")e.className=v;else if(k==="innerHTML")e.innerHTML=v;else e.setAttribute(k,v)});if(ch!==undefined){if(Array.isArray(ch))ch.forEach(c=>{if(c)e.appendChild(typeof c==="string"?document.createTextNode(c):c)});else if(typeof ch==="string")e.textContent=ch;else if(ch)e.appendChild(ch)}return e};

function badges(items,active,onSelect,color){
  const d=h("div",{className:"badges"});
  items.forEach(it=>{const b=h("button",{className:"badge"+(active===it?" on":""),onClick:()=>onSelect(it)},it);if(active===it&&color){b.style.borderColor=color;b.style.background=color+"20";b.style.color=color}d.appendChild(b)});
  return d;
}
function scoreRow(label,val,onChange,max=5){
  const r=h("div",{className:"score-row"});
  r.appendChild(h("span",{className:"sl"},label));
  const dots=h("div",{className:"dots"});
  for(let i=1;i<=max;i++){const b=h("button",{onClick:()=>onChange(i)},String(i));b.style.background=i<=val?sc(val,max):"#141210";b.style.color=i<=val?"#000":"#4a4438";dots.appendChild(b)}
  r.appendChild(dots);
  const sv=h("span",{className:"sv"},String(val));sv.style.color=sc(val,max);r.appendChild(sv);
  return r;
}
function field(label,val,onChange,opts={}){
  const d=h("div",{style:{display:"flex",flexDirection:"column",gap:"3px",...(opts.style||{})}});
  d.appendChild(h("label",{className:"lbl"},label));
  const inp=h("input",{className:"inp",value:val||"",placeholder:opts.ph||""});
  if(opts.type)inp.type=opts.type;
  inp.addEventListener("input",e=>onChange(e.target.value));
  d.appendChild(inp);return d;
}
function tarea(val,onChange,ph){
  const t=h("textarea",{className:"ta",placeholder:ph||""});t.value=val||"";
  t.addEventListener("input",e=>onChange(e.target.value));return t;
}
function sec(title,color,children){
  const s=h("div",{className:"sec"});if(color)s.style.borderLeftColor=color;
  const t=h("div",{className:"sec-t"},title);if(color)t.style.color=color;
  s.appendChild(t);
  if(Array.isArray(children))children.forEach(c=>{if(c)s.appendChild(c)});else if(children)s.appendChild(children);
  return s;
}
function topBar(leftEl,center,rightEl){
  const t=h("div",{className:"top"});t.appendChild(leftEl);
  if(center){const c=h("span",{style:{fontSize:"9px",letterSpacing:"3px",color:"#8a8050"}},center);t.appendChild(c)}
  t.appendChild(rightEl);return t;
}
function backBtn(label,onClick){return h("button",{style:{background:"none",border:"none",color:"#706858",fontSize:"12px",fontFamily:"inherit"},onClick},label||"← Back")}
function btnEl(text,fill,onClick){const b=h("button",{className:"btn"+(fill?" btn-f":""),onClick},text);return b}

function radarSVG(sig){
  const r=34,cx=48,cy=48,ns="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(ns,"svg");svg.setAttribute("width","96");svg.setAttribute("height","96");
  const angles=[0,1,2,3].map(i=>(i*Math.PI*2)/4-Math.PI/2);
  const gv=ch=>ch===sig.d?1:ch===sig.b?.55:ch===sig.g?.2:.45;
  const gc=ch=>ch===sig.d?"#8a8050":ch===sig.b?"#a08840":ch===sig.g?"#a04040":"#4a4438";
  [.33,.66,1].forEach(s=>{const p=document.createElementNS(ns,"polygon");p.setAttribute("points",angles.map(a=>`${cx+Math.cos(a)*r*s},${cy+Math.sin(a)*r*s}`).join(" "));p.setAttribute("fill","none");p.setAttribute("stroke","#2e2b24");svg.appendChild(p)});
  angles.forEach(a=>{const l=document.createElementNS(ns,"line");l.setAttribute("x1",cx);l.setAttribute("y1",cy);l.setAttribute("x2",cx+Math.cos(a)*r);l.setAttribute("y2",cy+Math.sin(a)*r);l.setAttribute("stroke","#2e2b24");svg.appendChild(l)});
  const vals=CH.map(gv),pts=vals.map((v,i)=>({x:cx+Math.cos(angles[i])*r*v,y:cy+Math.sin(angles[i])*r*v}));
  const poly=document.createElementNS(ns,"polygon");poly.setAttribute("points",pts.map(p=>`${p.x},${p.y}`).join(" "));poly.setAttribute("fill","rgba(138,128,80,.1)");poly.setAttribute("stroke","#8a8050");poly.setAttribute("stroke-width","1.5");svg.appendChild(poly);
  const labels=["S","V","E","I"];
  angles.forEach((a,i)=>{const t=document.createElementNS(ns,"text");t.setAttribute("x",cx+Math.cos(a)*(r+10));t.setAttribute("y",cy+Math.sin(a)*(r+10));t.setAttribute("text-anchor","middle");t.setAttribute("dominant-baseline","central");t.setAttribute("fill",gc(CH[i]));t.setAttribute("font-size","9");t.setAttribute("font-weight","700");t.setAttribute("font-family","'JetBrains Mono',monospace");t.textContent=labels[i];svg.appendChild(t)});
  return svg;
}
function sparkSVG(hist){
  if(!hist||hist.length<2)return null;
  const ns="http://www.w3.org/2000/svg",tots=hist.map(cTotal),w=200,ht=50,pd=8;
  const svg=document.createElementNS(ns,"svg");svg.setAttribute("width",w);svg.setAttribute("height",ht);svg.style.display="block";svg.style.marginTop="6px";
  const pts=tots.map((t,i)=>({x:pd+(i/(tots.length-1))*(w-pd*2),y:pd+(1-t/25)*(ht-pd*2)}));
  const path=document.createElementNS(ns,"path");path.setAttribute("d",pts.map((p,i)=>`${i?"L":"M"}${p.x},${p.y}`).join(" "));path.setAttribute("fill","none");path.setAttribute("stroke","#8a8050");path.setAttribute("stroke-width","2");svg.appendChild(path);
  pts.forEach((p,i)=>{const c=document.createElementNS(ns,"circle");c.setAttribute("cx",p.x);c.setAttribute("cy",p.y);c.setAttribute("r","3");c.setAttribute("fill","#0f0e0c");c.setAttribute("stroke","#8a8050");c.setAttribute("stroke-width","1.5");svg.appendChild(c);
  const t=document.createElementNS(ns,"text");t.setAttribute("x",p.x);t.setAttribute("y",p.y-7);t.setAttribute("text-anchor","middle");t.setAttribute("fill","#8a8050");t.setAttribute("font-size","8");t.setAttribute("font-family","'JetBrains Mono',monospace");t.textContent=tots[i];svg.appendChild(t)});
  return svg;
}

// ═══════ RENDER ═══════
function render(){
  const app=document.getElementById("app");app.innerHTML="";
  renderNav();
  if(TAB==="states")return renderStates(app);
  if(TAB==="reference")return renderReference(app);
  if(TAB==="diagnose")return renderDiagnose(app);
  // clients tab
  if(VW==="clientEdit"&&ED)return renderClientEdit(app);
  if(VW==="sessionEdit"&&ED&&getCl())return renderSessionEdit(app);
  if(VW==="compassEdit"&&ED&&getCl())return renderCompassEdit(app);
  if(VW==="dossier"&&getCl())return renderDossier(app);
  if(VW==="detail"&&getCl())return renderDetail(app);
  renderList(app);
}

function renderNav(){
  const nav=document.getElementById("nav");nav.innerHTML="";
  [["clients","◉","CLIENTS"],["diagnose","⊘","DIAGNOSE"],["states","◆","STATES"],["reference","≡","REFERENCE"]].forEach(([k,ic,lb])=>{
    const b=h("button",{className:"nav-btn"+(TAB===k?" on":""),onClick:()=>{TAB=k;if(k!=="clients"){VW="list";ED=null}render()}});
    b.appendChild(h("span",{},ic));b.appendChild(h("span",{},lb));nav.appendChild(b);
  });
}

// ── LIST ──
function renderList(app){
  const hdr=h("div",{className:"hdr"});
  hdr.appendChild(h("div",{className:"sub"},"STEADY HAND RaD™"));
  hdr.appendChild(h("div",{className:"ttl"},"ARC TRACKER"));
  hdr.appendChild(h("div",{className:"sync"},"✓ CLOUD SYNCED"));
  app.appendChild(hdr);
  const wrap=h("div",{style:{padding:"10px 16px"}});
  if(DATA.c.length===0)wrap.appendChild(h("div",{style:{textAlign:"center",color:"#4a4438",padding:"30px 0",fontSize:"12px"}},"No clients yet."));
  DATA.c.forEach(c=>{
    const card=h("button",{className:"card",onClick:()=>{AID=c.id;VW="detail";render()}});
    const av=h("div",{className:"avatar"},(c.name||"?")[0]?.toUpperCase());
    card.appendChild(av);
    const info=h("div");info.appendChild(h("div",{style:{fontSize:"14px",fontWeight:"600",color:"#c8c0b0"}},c.name||"Unnamed"));
    info.appendChild(h("div",{style:{fontSize:"10px",color:"#706858"}},`${c.dog} · ${c.prof||"No profile"}`));
    card.appendChild(info);wrap.appendChild(card);
  });
  const center=h("div",{style:{textAlign:"center",marginTop:"14px"}});
  center.appendChild(h("button",{className:"btn btn-f",style:{padding:"10px 18px"},onClick:()=>{ED=mkClient();AID=null;VW="clientEdit";render()}},"+ New Client"));
  wrap.appendChild(center);app.appendChild(wrap);
}

// ── CLIENT EDIT ──
function renderClientEdit(app){
  const isNew=!DATA.c.find(x=>x.id===ED.id);
  app.appendChild(topBar(backBtn("← Back",()=>{ED=null;VW=AID?"detail":"list";render()}),isNew?"NEW CLIENT":"EDIT CLIENT",btnEl("Save",true,()=>{updCl(ED);AID=ED.id;ED=null;VW="detail";render()})));
  const wrap=h("div",{style:{padding:"0 16px"}});
  const grid=h("div",{className:"grid2",style:{marginBottom:"12px"}});
  grid.appendChild(field("Handler",ED.name,v=>{ED.name=v},{ph:"Name"}));
  grid.appendChild(field("Dog",ED.dog,v=>{ED.dog=v},{ph:"Dog name"}));
  grid.appendChild(field("Breed",ED.breed,v=>{ED.breed=v},{ph:"Breed"}));
  grid.appendChild(field("Age",ED.age,v=>{ED.age=v},{ph:"Age"}));
  wrap.appendChild(grid);
  wrap.appendChild(field("Context",ED.ctx,v=>{ED.ctx=v},{ph:"Vet Clinic, Board & Train, Private",style:{marginBottom:"14px"}}));
  // Signature
  const sigKids=[];
  [["d","DOMINANT","#8a8050"],["b","BLIND","#a08840"],["g","GHOST","#a04040"]].forEach(([k,label,color])=>{
    const d=h("div",{style:{marginBottom:"8px"}});
    d.appendChild(h("div",{style:{fontSize:"9px",letterSpacing:"2px",color,marginBottom:"4px",textTransform:"uppercase"}},label));
    d.appendChild(badges(CH,ED.sig[k],v=>{ED.sig[k]=v;render()},color));sigKids.push(d);
  });
  wrap.appendChild(sec("HANDLER SIGNATURE","#8a8050",sigKids));
  wrap.appendChild(sec("PROFILE","#5a8a50",[badges(PR,ED.prof,v=>{ED.prof=v;render()},"#5a8a50")]));
  wrap.appendChild(sec("NOTES","#706858",[tarea(ED.notes,v=>{ED.notes=v},"Anything worth remembering...")]));
  if(!isNew){const del=h("div",{style:{textAlign:"center",marginTop:"12px"}});del.appendChild(h("button",{style:{padding:"6px 12px",borderRadius:"4px",border:"1px solid #a0404033",background:"transparent",color:"#a04040",fontSize:"10px",fontWeight:"700",letterSpacing:"1.5px",fontFamily:"inherit",cursor:"pointer"},onClick:()=>{if(confirm("Delete?")){delCl(ED.id);AID=null;ED=null;VW="list";render()}}},"Delete Client"));wrap.appendChild(del)}
  app.appendChild(wrap);
}

// ── DETAIL ──
function renderDetail(app){
  const cl=getCl();
  app.appendChild(topBar(backBtn("← All",()=>{AID=null;VW="list";render()}),"",btnEl("Edit",false,()=>{ED={...cl,sig:{...cl.sig}};VW="clientEdit";render()})));
  // Header
  const hd=h("div",{style:{textAlign:"center",padding:"10px 16px 14px"}});
  hd.appendChild(h("div",{style:{fontSize:"18px",fontWeight:"700"}},cl.name||"Unnamed"));
  hd.appendChild(h("div",{style:{fontSize:"11px",color:"#706858",marginTop:"2px"}},cl.dog));
  if(cl.prof){const pb=h("div",{style:{marginTop:"6px"}});pb.appendChild(h("span",{style:{fontSize:"10px",padding:"3px 10px",borderRadius:"4px",border:"1px solid #2e2b24",color:"#706858"}},cl.prof));hd.appendChild(pb)}
  if(cl.ctx)hd.appendChild(h("div",{style:{fontSize:"10px",color:"#5b9bd5",marginTop:"5px"}},cl.ctx));
  app.appendChild(hd);

  // Action cards
  const acts=h("div",{style:{padding:"0 16px",marginBottom:"14px"}});

  pf.appendChild(h("div",{style:{fontSize:"10px",letterSpacing:"3px",color:"#5b9bd5",fontWeight:"700",marginBottom:"8px"}},"PRE-FLIGHT — OBSERVATION SEQUENCE"));
  ["1. Feet first — do they lead or follow?","2. Mouth second — how many commands before response?","3. Leash third — tight because dog pulled or handler didn't move?","4. Dog's face — where are they looking? Arousal at baseline?","5. What did they do FIRST when the dog broke?"].forEach((step,i)=>{

  wrap.appendChild(pf);

  // ── Clients Needing Attention ──
  const flags=[];
  const now=new Date();
  DATA.c.forEach(c=>{
    const reasons=[];
    // Compass drop 2+
    if(c.comp.length>=2){const last=cTotal(c.comp[c.comp.length-1]),prev=cTotal(c.comp[c.comp.length-2]);if(prev-last>=2)reasons.push("Compass dropped "+(prev-last)+" pts")}
    // No session in 14+ days
    if(c.sess.length>0){const lastDt=new Date([...c.sess].sort((a,b)=>b.dt.localeCompare(a.dt))[0].dt);const days=Math.floor((now-lastDt)/(1000*60*60*24));if(days>=14)reasons.push(days+" days since last session")}
    else if(c.sess.length===0&&c.comp.length>0)reasons.push("No sessions logged yet");
    // Recurring issues stacking
    if(c.issues&&c.issues.length>=3)reasons.push(c.issues.length+" recurring issues");
    if(reasons.length>0)flags.push({client:c,reasons});
  });
  if(flags.length>0){
    const attn=h("div",{style:{background:"#1a1814",border:"1px solid #2e2b24",borderLeft:"3px solid #a04040",borderRadius:"8px",padding:"12px 14px",marginBottom:"14px"}});
    attn.appendChild(h("div",{style:{fontSize:"10px",letterSpacing:"3px",color:"#a04040",fontWeight:"700",marginBottom:"8px"}},"NEEDS ATTENTION · "+flags.length));
    flags.forEach(f=>{
      const row=h("div",{style:{padding:"6px 0",borderBottom:"1px solid #141210"}});

      attn.appendChild(row);
    });
    wrap.appendChild(attn);
  }

  // ── Profile Distribution ──
  if(DATA.c.length>0){
    const dist=h("div",{style:{background:"#1a1814",border:"1px solid #2e2b24",borderLeft:"3px solid #8a8050",borderRadius:"8px",padding:"12px 14px",marginBottom:"14px"}});
    dist.appendChild(h("div",{style:{fontSize:"10px",letterSpacing:"3px",color:"#8a8050",fontWeight:"700",marginBottom:"8px"}},"CASELOAD · "+DATA.c.length));
    const tiers={entry:0,improved:0,attuned:0,unset:0};
    const profCounts={};
    DATA.c.forEach(c=>{
      const p=c.prof||"";
      if(p==="Attuned"){tiers.attuned++}
      else if(p.startsWith("Imp.")){tiers.improved++}
      else if(["Reactive","Rigid","Avoidant","Passive"].includes(p)){tiers.entry++}

  if(cl.comp.length>0){
    const compKids=cl.comp.map(ch=>{
      const t=cTotal(ch);
      const r=h("div",{style:{padding:"6px 0",borderBottom:"1px solid #141210"}});
