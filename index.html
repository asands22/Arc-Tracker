{id:"heel",nm:"Heel Protocol",cat:"progressive",domCh:"Internal (dog)",secCh:"Spatial (dog)",removed:"Verbal \u2014 the leash talks, not you",teach:"This position isn\u2019t just physical \u2014 it\u2019s mental. Feet behind your heel, passive state of mind. The heel is where you negotiate with yourself about whether the standard matters.",steps:[{n:"Step 0: The Stand",d:"Stand still. Pop only if they leave leash end. Light encouragement on return. Shrink distance after 1-2 pops. Watch for rallying. 5-10 min to a sit or down."},{n:"Step 1: 180\u00B0 Turn & Snap",d:"Dog walks ahead \u2014 let them. Stack hands on handle at belt, turn 180\u00B0 right, walk away, light pop at leash end. Up to 3 pops per round. 3 rounds then praise. 3 reps \u00D7 2-3 sets daily."},{n:"Step 2: 180\u00B0 Walk-Through",d:"Dog past toes but not 3ft. Right arm straight, turn 180\u00B0 right, walk into leash. Knee against it. Natural, not aggressive."},{n:"Step 3: 90\u00B0 Right Turn",d:"Dog drifting left or lagging. Swing right foot, sharp 90\u00B0 right, knee against leash. Brings them closer and picks up pace."},{n:"Step 4: 90\u00B0 Left Turn",d:"Only works if steps 1-3 solid. Two-handed grip, hands on left side. Right foot out, sharp 90\u00B0 left pivot, nudge with leg. If no return, leash them back and motivate. Eye contact, sit, praise."}],mech:"Two-handed grip, 180\u00B0 turns, 90\u00B0 turns, knee against leash",fail:"Compromises standard when dog \'has been good.\' Left hand grabs leash to prevent mistake.",grows:"Dog\u2019s internal regulation. Handler\u2019s CO and CC."},

async function syncFromCloud(){
try{const snap=await db.collection("clients").get();if(snap.empty)return LS.gi();

localStorage.setItem("shdt-idx",JSON.stringify(idx));return idx;
}catch(e){console.error("Sync failed:",e);return LS.gi()}
}

<div style={{textAlign:"center",marginBottom:20}}><div style={{fontSize:18,fontWeight:700,color:$.tx}}>{cl.nm||"Unnamed"}</div><div style={{fontSize:11,color:$.dm,marginTop:3}}>{cl.dg}{cl.br?" \u00B7 "+cl.br:""}{cl.ag?" \u00B7 "+cl.ag:""}</div>{cl.pr&&<div style={{marginTop:6}}><span style={{fontSize:10,padding:"3px 10px",borderRadius:20,background:$.gb,color:$.g,border:"1px solid "+$.gd}}>{cl.pr}</span></div>}</div>
{cl.ref&&<div style={{fontSize:10,color:$.bl,marginTop:6,textAlign:"center"}}>{cl.ref}{cl.refSub?" · "+cl.refSub:""}{cl.refDetail?" · "+cl.refDetail:""}</div>}
<div style={{background:$.g+"0D",border:"1px solid "+$.gd,borderRadius:6,padding:12,marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><Lb color={$.g}>Session Log</Lb><div style={{fontSize:10,color:$.dm,marginTop:2}}>Feeds Arc + Compass</div></div><Bt accent onClick={()=>{const i=nextS>=0?nextS:15;const b=BL[Math.floor(i/4)];sSL({ai:i,sn:i+1,block:b?b.l:"Autonomy",blockD:b?b.d:"",date:td(),rec:null,chk:null,hs:null,pf:"",tr:"",ER:3,T:3,CC:3,CO:3,IN:3,focus:"",notes:""});sTab("sLog")}}>+ Log</Bt></div></div>
<div style={{background:$.bl+"0D",border:"1px solid "+$.bl+"44",borderRadius:6,padding:12,marginBottom:20}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><Lb color={$.bl}>Handler Index\u2122 Eval</Lb><div style={{fontSize:10,color:$.dm,marginTop:2}}>Full diagnostic walkthrough</div></div><Bt accent onClick={()=>{sEv(freshEval());sTab("eval")}} style={{background:$.bl}}>+ Eval</Bt></div></div>
{/* Homework */}
<Se title={"Homework \u00B7 "+((cl.hw||[]).filter(h=>h.status!=="done").length)} accent={$.g}>
{(cl.hw||[]).length>0?(cl.hw||[]).filter(h=>h.status!=="done").map(h=>{const ex=EX.find(e=>e.id===h.exId);const isX=hwExp===h.id;return <div key={h.id} style={{marginBottom:4,background:isX?$.cd:"transparent",borderRadius:4,border:isX?"1px solid "+$.bd:"none",padding:isX?8:0}}>
<div style={{display:"flex",gap:8,padding:isX?"0":"5px 0",alignItems:"center",cursor:"pointer"}} onClick={()=>sHwExp(isX?null:h.id)}>
<span style={{fontSize:11,color:$.tx,flex:1,fontWeight:isX?700:400}}>{ex?ex.nm:h.exId}</span>
<div style={{display:"flex",gap:3}}>
{["assigned","active","\u2713","!","\u00D7"].map((lbl,li)=>{const sts=["assigned","in-progress","consistent","struggling","remove"];const st=sts[li];return <button key={st} onClick={ev=>{ev.stopPropagation();const c={...cl};if(st==="remove"){c.hw=c.hw.filter(x=>x.id!==h.id);sHwExp(null)}else{c.hw=c.hw.map(x=>x.id===h.id?{...x,status:st}:x)}saveCl(c)}} style={{fontSize:7,padding:"2px 5px",borderRadius:2,border:"none",cursor:"pointer",background:h.status===st?(st==="struggling"||st==="remove"?$.rd:st==="consistent"?$.gn:$.g)+"33":$.bg,color:h.status===st?(st==="struggling"||st==="remove"?$.rd:st==="consistent"?$.gn:$.g):$.dr}}>{lbl}</button>})}
</div></div>
{isX&&ex&&<div style={{marginTop:8}}>
<div style={{fontSize:10,color:$.dm,marginBottom:8}}>{ex.teach}</div>
{ex.steps.map((step,si)=><div key={si} style={{marginBottom:4,padding:"4px 6px",background:$.bg,borderRadius:3}}><div style={{fontSize:9,fontWeight:700,color:$.g}}>{step.n}</div><div style={{fontSize:9,color:$.dm,marginTop:2}}>{step.d}</div></div>)}
<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8,marginBottom:4,fontSize:8}}>
<span style={{color:$.g}}>Dom: {ex.domCh}</span>

<span style={{color:$.rd}}>Removes: {ex.removed}</span>

<div style={{fontSize:8,color:$.dr,marginTop:4}}>Assigned: {h.date}</div>
</div>}
</div>}):<div style={{fontSize:11,color:$.dr}}>No homework assigned.</div>}

</Se>

{(cl.issues||[]).length>0?(cl.issues||[]).map((iss,i)=><div key={i} style={{display:"flex",gap:8,padding:"4px 0",alignItems:"flex-start"}}><span style={{fontSize:11,color:$.dm,flex:1}}>{iss.text}</span><span style={{fontSize:9,color:$.dr}}>{iss.date}</span><button onClick={()=>{const c={...cl};c.issues=c.issues.filter((_,j)=>j!==i);saveCl(c)}} style={{background:"none",border:"none",color:$.dr,cursor:"pointer",fontSize:14,padding:"0 4px"}}>×</button></div>):<div style={{fontSize:11,color:$.dr}}>None logged.</div>}

<Se title="Compass" accent={total?sc(total,25):$.g}>{lc?<div><div style={{display:"flex",alignItems:"baseline",gap:12,marginBottom:8}}><span style={{fontSize:28,fontWeight:700,color:sc(total,25)}}>{total}</span><span style={{fontSize:12,color:$.dr}}>/25</span><span style={{fontSize:10,color:$.dm,marginLeft:"auto"}}>{lc.date}</span></div><div style={{display:"flex",gap:6,marginBottom:8}}>{COMP.map(cat=><div key={cat.k} style={{flex:1,background:$.bg,borderRadius:3,padding:"4px 0",textAlign:"center"}}><div style={{fontSize:8,color:$.dm}}>{cat.k}</div><div style={{fontSize:14,fontWeight:700,color:sc(lc[cat.k],5)}}>{lc[cat.k]}</div></div>)}</div>{cT.length>1&&<Spk data={cT}/>}</div>:<div style={{fontSize:11,color:$.dr}}>No compass scores yet.</div>}</Se>
<Se title={"90-Day Arc \u00B7 "+logged+"/16"} accent={$.bl}>{logged>0?cl.arc.filter(s=>s.dt).slice(-4).reverse().map(s=><button key={s.s} onClick={()=>{sAI(s.s-1);sTab("arcEdit")}} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"6px 0",background:"none",border:"none",borderBottom:"1px solid "+$.bg,cursor:"pointer",textAlign:"left"}}><span style={{width:22,fontSize:11,fontWeight:700,color:$.bl}}>#{s.s}</span><span style={{flex:1,fontSize:10,color:$.dm}}>{s.dt}</span>{s.rec!==null&&<span style={{fontSize:9,padding:"2px 4px",borderRadius:2,background:sc(s.rec,3)+"18",color:sc(s.rec,3)}}>R{s.rec}</span>}{s.comp!==null&&<span style={{fontSize:9,padding:"2px 4px",borderRadius:2,background:sc(s.comp,25)+"18",color:sc(s.comp,25)}}>C{s.comp}</span>}{s.tr&&<span style={{fontSize:12}}>{s.tr}</span>}</button>):<div style={{fontSize:11,color:$.dr}}>No sessions yet.</div>}<Bt full onClick={()=>sTab("arc")} style={{marginTop:10}}>View Full Arc</Bt></Se>
<Se title={"Tune-Ups \u00B7 "+(cl.tu?cl.tu.length:0)} accent={$.or}><Bt full onClick={()=>{sTu({id:mk(),date:td(),cb:null,ca:null,issues:["","",""],win:"",ph:TP.map(p=>({...p,done:false,notes:""}))});sTab("tuNew")}}>+ Tune-Up</Bt></Se>
<Se title={"Resets \u00B7 "+(cl.rs?cl.rs.length:0)} accent={$.rd}><Bt full onClick={()=>{sRst({id:mk(),date:td(),steps:RS.map(s=>({...s,done:false,ans:""})),ok:false,notes:""});sTab("resetRun")}}>+ Reset Protocol</Bt></Se>
{(cl.evals||[]).length>0&&<Se title={"Evals \u00B7 "+cl.evals.length} accent={$.bl}>{cl.evals.slice(-3).reverse().map(e=>{const t=e.ER+e.T+e.CC+e.CO+e.IN;return <div key={e.id} style={{display:"flex",gap:8,padding:"5px 0"}}><span style={{fontSize:11,color:$.dm,flex:1}}>{e.date}</span><span style={{fontSize:10,color:sc(t,25)}}>{t}/25</span><span style={{fontSize:10,color:$.dm}}>{e.profile||"\u2014"}</span></div>})}</Se>}
{bp&&PW[bp]&&<Se title={bp+" \u2014 Watch For"} accent={$.or}><div style={{fontSize:11,color:$.dm,marginBottom:4}}>{PW[bp].w}</div><div style={{fontSize:11,color:$.or,fontStyle:"italic"}}>"{PW[bp].c}"</div></Se>}

if(tab==="eval"&&ev&&cl){const e=ev,set=(k,v)=>sEv({...e,[k]:v}),step=e.step,total=e.ER+e.T+e.CC+e.CO+e.IN;

return <div style={sh}><div ref={sr} style={ct}>

<div style={{textAlign:"center",marginBottom:12}}><Lb color={$.bl}>HANDLER INDEX\u2122 EVALUATION</Lb><div style={{fontSize:11,color:$.tx,marginTop:4}}>{cl.nm} \u00B7 {cl.dg}</div><In label="Date" value={e.date} onChange={v=>set("date",v)} type="date" style={{marginTop:8}}/></div>
<div style={{display:"flex",gap:2,marginBottom:20}}>{STEPS.map((s,i)=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=step?$.bl:$.bd}}/>)}</div>
<div style={{fontSize:11,fontWeight:700,color:$.bl,marginBottom:4}}>Step {step+1} of 6</div>
<div style={{fontSize:13,fontWeight:700,color:$.tx,marginBottom:16}}>{STEPS[step]}</div>

{step===0&&<div><div style={{fontSize:10,color:$.dm,marginBottom:12,fontStyle:"italic"}}>Watch the handler and dog. For each channel, note what you observe. Don't correct yet.</div>{CH.map(ch=><div key={ch} style={{marginBottom:14}}><div style={{fontSize:11,fontWeight:700,color:$.g,marginBottom:2}}>{ch}</div><div style={{fontSize:9,color:$.dm,marginBottom:4}}>"{DQ[ch].a}"</div><div style={{fontSize:9,color:$.dr,marginBottom:6}}>{DQ[ch].l}</div><Ta value={e.channelObs[ch]} onChange={v=>set("channelObs",{...e.channelObs,[ch]:v})} placeholder={"What did you observe in "+ch+"?"} rows={2}/></div>)}</div>}

{step===1&&<div><div style={{fontSize:10,color:$.dm,marginBottom:12,fontStyle:"italic"}}>Always in this order: Dominant \u2192 Blind \u2192 Ghost. The reaction when you name it is the diagnostic.</div>
{[["Dominant","sigDom","sigDomDemoEv","sigDomConvEv",$.g,"Watch what fires FIRST. They defend it. They lead with it."],["Blind","sigBlind","sigBlindDemoEv","sigBlindConvEv",$.or,"Listen for surprise. Friction when named \u2014 not blank, reactive."],["Ghost","sigGhost","sigGhostDemoEv","sigGhostConvEv",$.rd,"Ask for one deliberate example. Can\u2019t produce any = Ghost. Blankness."]].map(([label,chKey,demoKey,convKey,color,desc])=>
<div key={label} style={{marginBottom:16,padding:10,background:$.cd,borderRadius:4,borderLeft:"3px solid "+color}}>
<div style={{fontSize:12,fontWeight:700,color:color}}>{label}</div>
<div style={{fontSize:9,color:$.dm,marginTop:2,marginBottom:8}}>{desc}</div>
<div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>{CH.map(ch=><Cp key={ch} active={e[chKey]===ch} color={color} onClick={()=>set(chKey,ch)}>{ch}</Cp>)}</div>
<In label="Evidence (demo)" value={e[demoKey]} onChange={v=>set(demoKey,v)} placeholder="What you saw" style={{marginBottom:6}}/>
<In label="Evidence (conversation)" value={e[convKey]} onChange={v=>set(convKey,v)} placeholder="What they said"/>
</div>)}
<Se title="Ghost Confirmation" accent={$.rd}><div style={{fontSize:10,color:$.g,fontStyle:"italic",marginBottom:6}}>"Tell me about a time you used [channel] deliberately to help your dog succeed."</div><Ta value={e.ghostConfirm} onChange={v=>set("ghostConfirm",v)} placeholder="Their response \u2014 or lack of one" rows={2}/></Se>
{(e.sigDom||e.sigBlind||e.sigGhost)&&<div style={{display:"flex",gap:10,alignItems:"center",padding:10,background:$.bg,borderRadius:4}}><Radar sg={{dominant:e.sigDom,blind:e.sigBlind,ghost:e.sigGhost}} size={80}/><div>{e.sigDom&&<div style={{fontSize:11,color:$.g}}>Dom: {e.sigDom}</div>}{e.sigBlind&&<div style={{fontSize:11,color:$.or}}>Blind: {e.sigBlind}</div>}{e.sigGhost&&<div style={{fontSize:11,color:$.rd}}>Ghost: {e.sigGhost}</div>}</div></div>}
</div>}

// DIAGNOSE
if(tab==="diagnose"){const steps=[{t:"1. Find the Dominant",d:"Watch what fires FIRST when the dog breaks.",tl:"They defend it. They lead with it.",c:$.g},{t:"2. Find the Blind",d:"Listen for surprise.",tl:"Friction when named. They push back.",c:$.or},{t:"3. Find the Ghost",d:"Tell me about a time you used [channel] deliberately.",tl:"Blankness. Curious. No shelf for it.",c:$.rd}];
return <div style={sh}><div ref={sr} style={ct}><div style={{padding:"16px 0 8px"}}><Lb color={$.g}>HANDLER INDEX\u2122 DIAGNOSTIC CARD</Lb><div style={{fontSize:10,color:$.dr,marginTop:4,fontStyle:"italic"}}>Dominant \u2192 Blind \u2192 Ghost.</div></div>{steps.map((st,i)=><div key={i} style={{marginBottom:12,padding:10,background:dS===i?$.cd:"transparent",border:"1px solid "+(dS===i?st.c+"33":$.bd),borderRadius:4}}><button onClick={()=>sDS(i)} style={{background:"none",border:"none",cursor:"pointer",width:"100%",textAlign:"left",padding:0}}><div style={{fontSize:12,fontWeight:700,color:st.c}}>{st.t}</div><div style={{fontSize:10,color:$.dm,marginTop:3}}>{st.d}</div><div style={{fontSize:9,color:$.dr,marginTop:3,fontStyle:"italic"}}>{st.tl}</div></button>{dS===i&&<div style={{marginTop:10}}><div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>{CH.map(ch=><Cp key={ch} active={dD[["dominant","blind","ghost"][i]]===ch} color={st.c} onClick={()=>sDD({...dD,[["dominant","blind","ghost"][i]]:ch})}>{ch}</Cp>)}</div></div>}</div>)}<Se title="Channel Questions" accent={$.bl}>{CH.map(ch=><div key={ch} style={{marginBottom:10}}><div style={{fontSize:11,fontWeight:700,color:$.tx}}>{ch}</div><div style={{fontSize:10,color:$.g,fontStyle:"italic",marginTop:2}}>"{DQ[ch].a}"</div><div style={{fontSize:9,color:$.dm,marginTop:2}}>{DQ[ch].l}</div></div>)}</Se><Se title="Blind vs Ghost" accent={$.or}><div style={{display:"flex",gap:8}}><div style={{flex:1,padding:8,background:$.bg,borderRadius:4,borderTop:"2px solid "+$.or}}><div style={{fontSize:10,fontWeight:700,color:$.or}}>BLIND</div><div style={{fontSize:9,color:$.or,marginTop:3}}>FRICTION</div><div style={{fontSize:8,color:$.dr}}>Correct the channel.</div></div><div style={{flex:1,padding:8,background:$.bg,borderRadius:4,borderTop:"2px solid "+$.rd}}><div style={{fontSize:10,fontWeight:700,color:$.rd}}>GHOST</div><div style={{fontSize:9,color:$.rd,marginTop:3}}>BLANKNESS</div><div style={{fontSize:8,color:$.dr}}>Introduce the channel.</div></div></div></Se>{(dD.dominant||dD.blind||dD.ghost)&&<Se title="Current Read"><div style={{display:"flex",gap:10,alignItems:"center"}}><Radar sg={dD} size={80}/><div>{dD.dominant&&<div style={{fontSize:11,color:$.g}}>Dom: {dD.dominant}</div>}{dD.blind&&<div style={{fontSize:11,color:$.or}}>Blind: {dD.blind}</div>}{dD.ghost&&<div style={{fontSize:11,color:$.rd}}>Ghost: {dD.ghost}</div>}</div></div>{cl&&<Bt full onClick={()=>{saveCl({...cl,sg:{dominant:dD.dominant,blind:dD.blind,ghost:dD.ghost}});sTab("detail")}} style={{marginTop:10}}>Apply to {cl.nm}</Bt>}</Se>}</div><Nav/></div>}

// FIVE STATES
if(tab==="fiveState")return <div style={sh}><div ref={sr} style={ct}><div style={{padding:"16px 0 8px"}}><Lb color={$.g}>FIVE-STATE AWARENESS MAP\u2122</Lb></div>{ST.map(s=><div key={s.n} style={{marginBottom:10,padding:10,background:$.cd,border:"1px solid "+(s.n===3?s.c+"44":$.bd),borderRadius:4,borderLeft:"3px solid "+s.c}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{fontSize:16,fontWeight:700,color:s.c}}>{s.n}</span><span style={{fontSize:12,fontWeight:600,color:$.tx}}>{s.nm}</span></div><div style={{fontSize:10,color:$.dm,marginBottom:4}}>{s.d}</div><div style={{fontSize:9,color:$.dr}}>{s.s}</div>{s.n===3&&<div style={{fontSize:9,color:s.c,marginTop:6,fontStyle:"italic",fontWeight:600}}>State 3 is the fulcrum. Everything before it is reading. Everything after it is recovery.</div>}</div>)}<div style={{padding:10,background:$.bg,borderRadius:4,border:"1px solid "+$.g+"18",marginTop:8}}><div style={{fontSize:10,color:$.g,fontWeight:600}}>THE PRINCIPLE</div><div style={{fontSize:10,color:$.dm,marginTop:4}}>The dog doesn't need you to be perfect. They need you to be present at State 3.</div></div></div><Nav/></div>;

// REFERENCE
if(tab==="ref")return <div style={sh}><div ref={sr} style={ct}><div style={{padding:"16px 0 12px"}}><Lb color={$.g}>REFERENCE</Lb></div><Se title="Profiles" accent={$.gn}>{Object.entries(PW).map(([p,d])=><div key={p} style={{marginBottom:8,padding:8,background:$.bg,borderRadius:4}}><div style={{fontSize:11,fontWeight:700,color:$.gn}}>{p}</div><div style={{fontSize:9,color:$.dm,marginTop:2}}>{d.w}</div><div style={{fontSize:9,color:$.or,marginTop:2,fontStyle:"italic"}}>"{d.c}"</div></div>)}</Se><Se title="Channels\u2122" accent={$.bl}>{CH.map(ch=><div key={ch} style={{marginBottom:8,padding:8,background:$.bg,borderRadius:4}}><div style={{fontSize:11,fontWeight:700,color:$.bl}}>{ch}</div><div style={{fontSize:9,color:$.g,fontStyle:"italic",marginTop:2}}>"{DQ[ch].a}"</div><div style={{fontSize:9,color:$.dm,marginTop:2}}>{DQ[ch].l}</div></div>)}<div style={{fontSize:9,color:$.dm,marginTop:8,padding:8,background:$.bg,borderRadius:4,borderLeft:"2px solid "+$.g}}>You are adding to the pressure load or stabilizing it. There is no neutral.</div></Se><Se title="Compass" accent={$.g}>{COMP.map(cat=><div key={cat.k} style={{marginBottom:6,padding:"6px 8px",background:$.bg,borderRadius:4}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:10,fontWeight:700,color:$.g}}>{cat.k}</span><span style={{fontSize:9,color:$.dm}}>{cat.l}</span></div><div style={{fontSize:8,color:$.dr,marginTop:2}}>1: {cat.lo}</div><div style={{fontSize:8,color:$.dr}}>5: {cat.hi}</div></div>)}</Se><Se title="Tune-Up" accent={$.or}>{TP.map((p,i)=><div key={i} style={{marginBottom:6,padding:"6px 8px",background:$.bg,borderRadius:4}}><div style={{display:"flex",gap:8}}><span style={{fontSize:9,color:$.or,fontWeight:700}}>{p.tm}</span><span style={{fontSize:10,fontWeight:600,color:$.tx}}>{p.nm}</span></div><div style={{fontSize:9,color:$.dm,marginTop:2}}>{p.ac}</div></div>)}</Se><Se title="Patterns" accent={$.or}><div style={{fontSize:9,color:$.dm,marginBottom:8}}>3\u20134 sessions minimum. Single sessions lie.</div>{PAT.map((p,i)=><div key={i} style={{marginBottom:6,padding:"6px 8px",background:$.bg,borderRadius:4}}><div style={{fontSize:10,fontWeight:700,color:$.or}}>{p.p}</div><div style={{fontSize:9,color:$.dm,marginTop:2}}>{p.m}</div><div style={{fontSize:9,color:$.tx,marginTop:1}}>{p.a}</div></div>)}</Se><Se title="Future Ideas" accent={$.dm}>
<div style={{fontSize:9,color:$.dm,marginBottom:6}}>Logged ideas for the ecosystem.</div>
<div style={{marginBottom:6,padding:"6px 8px",background:$.bg,borderRadius:4}}><div style={{fontSize:10,fontWeight:700,color:$.dm}}>Blind Spot Workshop</div><div style={{fontSize:9,color:$.dr,marginTop:2}}>Clients wear blindfolds during exercises. Removes visual channel, forces Ghost channel processing. Walk them by hand while dog is on leash.</div></div>
<div style={{marginBottom:6,padding:"6px 8px",background:$.bg,borderRadius:4}}><div style={{fontSize:10,fontWeight:700,color:$.dm}}>AI Training Companion</div><div style={{fontSize:9,color:$.dr,marginTop:2}}>British accent. Jarvis meets Geoffrey. Daily training reminders with humor.</div></div>
</Se>
<div style={{textAlign:"center",padding:"16px 0",color:$.dr,fontSize:8,letterSpacing:2}}>STEADY HAND DOG TRAINING<br/>THE SIGNATURE IS THE MAP. THE COMPASS IS THE PROOF OF MOVEMENT.</div></div><Nav/></div>;

return <div style={sh}><div style={ct}><Bt onClick={()=>sTab("clients")}>{"\u2190"} Back</Bt></div><Nav/></div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
