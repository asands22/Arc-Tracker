<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Arc Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1E1E1E;--cd:#282825;--cb:#3a3a35;--ac:#6F745C;--ad:#555848;--ab:#8a8f74;--tx:#F6F4F1;--td:#a09e96;--tm:#5a5a55;--bl:#7EAEC4;--gn:#6F745C;--rd:#A05050;--am:#A09050;--sf:#232321}
body{color-scheme:dark;background:var(--bg);color:var(--tx);font-family:'Raleway',sans-serif;font-size:16px;max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:70px;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
button{font-family:inherit;cursor:pointer;background:none;border:none;color:inherit;-webkit-appearance:none;appearance:none}
input,textarea,select{font-family:inherit;color-scheme:dark;font-size:16px!important}
.top{display:flex;justify-content:space-between;align-items:center;padding:16px 16px;border-bottom:1px solid var(--cb)}
.hdr{padding:28px 16px 12px;text-align:center}
.hdr .sub{font-size:15px;letter-spacing:4px;color:var(--td);font-family:'Cinzel',serif}
.hdr .ttl{font-size:30px;font-weight:700;letter-spacing:3px;color:var(--ac);margin-top:4px;font-family:'Cinzel',serif}
.hdr .sync{font-size:15px;color:var(--gn);margin-top:4px}
.sec{border-left:3px solid var(--ac);padding-left:16px;margin:0 16px 32px;transition:border-color .3s ease}
.sec-t{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--ac);margin-bottom:14px;font-family:'Cinzel',serif}
.card{background:var(--cd);border:1px solid var(--cb);border-radius:8px;padding:14px 16px;margin-bottom:12px;cursor:pointer;display:flex;align-items:center;gap:12px;width:100%;text-align:left;border-left:1px solid var(--cb);transition:border-color .2s ease,transform .15s ease,box-shadow .2s ease}
.card:active{border-color:var(--ac);transform:scale(.98);box-shadow:0 0 12px rgba(111,116,92,.15)}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--sf);border:1px solid var(--cb);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ac);font-weight:700;flex-shrink:0}
;cursor:pointer;white-space:nowrap;transition:all .12s}
.badge.on{border-color:var(--ac);background:rgba(111,116,92,.2);color:var(--ab);box-shadow:0 0 8px rgba(111,116,92,.15)}
;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.btn-f{border:none;background:var(--ac);color:var(--bg);font-size:17px;box-shadow:0 2px 8px rgba(111,116,92,.2)}
.btn-bl{border:none;background:var(--bl);color:var(--bg)}
;outline:none;width:100%;box-sizing:border-box}
.lbl{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--td);display:block;margin-bottom:8px;font-family:'Cinzel',serif}
;outline:none;width:100%;box-sizing:border-box;resize:vertical;min-height:60px}
.row{display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--sf)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.x-btn{background:none;border:none;color:var(--tm);font-size:15px;cursor:pointer}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--cb);display:flex;justify-content:center;z-index:100}
.nav-inner{display:flex;max-width:520px;width:100%;justify-content:space-around;padding:8px 0 12px}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;color:var(--td);font-family:inherit;transition:color .2s ease,filter .3s ease}
.nav-btn.on{color:var(--tx);filter:drop-shadow(0 0 12px rgba(246,244,241,.6));animation:navGlow 2.5s ease-in-out infinite}
.nav-btn span:first-child{font-size:18px}
.nav-btn span:last-child{font-size:10px;letter-spacing:2px;font-weight:600;font-family:'Cinzel',serif}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.score-row{display:flex;align-items:center;gap:12px}
.score-row .sl{width:28px;font-size:12px;color:var(--td);text-align:right;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.score-row .dots{flex:1;display:flex;gap:3px}
.score-row .dots button{flex:1;height:32px;border-radius:3px;border:none;font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;cursor:pointer}
.score-row .sv{width:18px;font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace}
.action-card{background:var(--cd);border:1px solid var(--cb);border-radius:8px;padding:18px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;transition:border-color .2s ease,box-shadow .2s ease}
.hidden{display:none}

.select-wrap{position:relative;width:100%}
.select-btn{width:100%;padding:14px 16px;background:var(--sf);border:1px solid var(--cb);border-radius:6px;color:var(--tx);font-size:16px;font-family:'Raleway',sans-serif;text-align:left;display:flex;justify-content:space-between;align-items:center;transition:border-color .2s ease,box-shadow .2s ease}
.select-btn .arrow{color:var(--td);font-size:10px;transition:transform .2s}
.select-btn .arrow.open{transform:rotate(180deg)}
.select-menu{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--cd);border:1px solid var(--cb);border-radius:6px;z-index:50;max-height:280px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.select-menu.show{display:block;animation:fadeIn .15s ease-out}
.select-opt{padding:12px 14px;color:var(--td);font-size:13px;font-family:'Raleway',sans-serif;border-bottom:1px solid var(--sf);cursor:pointer;transition:background .2s ease,color .2s ease}
.select-opt:last-child{border-bottom:none}
.select-opt:active{background:var(--sf)}
.select-opt.active{color:var(--ac);background:rgba(111,116,92,.12)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInSoft{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowPulse{0%{filter:drop-shadow(0 0 4px rgba(111,116,92,.4))}50%{filter:drop-shadow(0 0 8px rgba(111,116,92,.7))}100%{filter:drop-shadow(0 0 4px rgba(111,116,92,.4))}}
@keyframes navGlow{0%{filter:drop-shadow(0 0 8px rgba(246,244,241,.45))}50%{filter:drop-shadow(0 0 18px rgba(246,244,241,.75))}100%{filter:drop-shadow(0 0 8px rgba(246,244,241,.45))}}
#app>*{animation:fadeIn .3s ease-out}

.backup-panel{background:var(--cd);border:1px solid var(--cb);border-radius:8px;padding:16px;margin:0 16px 20px;animation:fadeIn .2s ease-out}
.backup-btn{width:100%;padding:12px 14px;border-radius:6px;border:1px solid var(--cb);background:var(--sf);color:var(--td);font-size:14px;font-family:'Raleway',sans-serif;margin-bottom:8px;text-align:left;display:flex;align-items:center;gap:10px;transition:border-color .2s ease}
.backup-btn:active{border-color:var(--ac)}
.backup-btn .ico{font-size:16px}
.backup-btn .lbl2{flex:1}
.backup-btn .sub2{font-size:11px;color:var(--tm);margin-top:2px}
</style>
</head>
<body>
<div id="app"></div>
<div class="nav"><div class="nav-inner" id="nav"></div></div>

<script>
// ═══════ DATA ═══════
const CH=["Spatial","Verbal","Environmental","Internal"],CK=["ER","T","CC","CO","IN"],
CL=["Emotional Regulation","Timing & Pacing","Correction Confidence","Consistency","Intentionality"],
PR=["Reactive","Rigid","Avoidant","Passive","Imp. Reactive","Imp. Rigid","Imp. Avoidant","Imp. Passive","Attuned"],
CPT=["Intake","Day 25","Day 60","Day 84"],JS=["Immersion","Recall","Undercurrent","Other"],
QL=[{v:1,l:"Rough",c:"#A05050"},{v:2,l:"Okay",c:"#A09050"},{v:3,l:"Locked In",c:"#6F745C"}];

const STATES=[
{n:1,nm:"Compliant Calm",sh:"The goal.",c:"#6F745C",mk:"Body: Soft · Eyes: Relaxed · Breathing: Even · Weight: Centered",desc:"Loose muscles, soft eyes, regulated breathing, relaxed posture. Present, settled, at ease. Not scanning, not bracing, not waiting. Calm that isn't forced. Stillness that isn't frozen."},
{n:2,nm:"Alert Neutral",sh:"Awareness without commitment.",c:"#7a8068",mk:"Ears: Rotating · Eyes: Tracking · Body: Oriented but still · Connection: Intact",desc:"Notices something — a sound, a movement, another dog. Ears rotate, eyes shift, body may orient slightly. But they haven't moved. Haven't committed. Still with you. Healthy state."},
{n:3,nm:"Pre-Decision Tension",sh:"Where the real work happens.",c:"#A09050",mk:"Weight: Forward · Ears: Locked · Breathing: Changed · Eye contact: Breaking",desc:"No longer just noticing — weighing a decision. Weight shifts forward. Breathing changes. Ears lock. Body stiffens. Eye contact breaks. Between two pulls — your influence and the environment's. Catch it here and they come back."},
{n:4,nm:"Committed Action",sh:"The decision has been made.",c:"#8a7050",mk:"Body: Committed · Focus: Environment · Recovery: Slow · Baseline: Elevated",desc:"Lunge. Break. Bark. Ignore. Committed to the environment over you. Not a bad dog — intervention came too late or influence wasn't deep enough. Corrections require more intensity, recovery takes longer."},
{n:5,nm:"Emotional Override",sh:"Loss of cognitive access.",c:"#A05050",mk:"Eyes: Wide/fixed · Body: Rigid or thrashing · Cognition: Offline · Corrections: Ineffective",desc:"No longer making decisions. Reacting. Adrenaline running. Breathing rapid or held. Eyes wide and fixed. Body rigid or thrashing. Cannot process information. Our job is not to correct. Remove, reduce, wait for downregulation."}
];

const EXERCISES=[
{id:"kennel",name:"Kennel Boundary",cat:"Single-Channel",dom:"Internal (handler) / Spatial (dog)",removed:"Verbal",compass:"ER · IN",
mechanic:"Stand still, block exit, leash pop + \"In,\" shrink distance gradually, introduce ambiguity tugs.",
failure:"Handler rushes it. Fills the silence with commands. Moves to the next shoe-length before the dog has actually settled — not just paused.",
grows:"Handler's Internal regulation (stillness, breathing, patience). Dog's impulse control at the simplest threshold.",
teach:"The kennel has only one exit — the simplest boundary. Position yourself in front of the open door. Gentle leash guidance — tug, then release. Watch for signs: ears turning outward, softer eyes, yawning. As soon as they settle, release pressure and praise. Increase distance one shoe-length at a time."},
{id:"doorway",name:"Doorway Boundary",cat:"Single-Channel",dom:"Environmental (dog) / Internal (secondary)",removed:"Verbal (except \"Out\")",compass:"T · CC",
mechanic:"Open door slowly, release-turn-snap if they forge, wait one beat at the pause, release with \"Out.\"",
failure:"Releases too early because the dog looked calm for two seconds. Or hesitates on the correction — classic Avoidant move.",
grows:"Dog separating opportunity from permission. Handler's Timing and Correction Confidence.",
teach:"Same principle as kennel, but now what's on the other side is the world. Stand next to the closed door on leash. Open slightly. If they push through, release-turn-snap. Repeat until they wait. Then release with \"Out.\" Every threshold is an opportunity."},
{id:"heel",name:"Heel Protocol",cat:"Progressive",dom:"Internal (dog) / Spatial (dog, secondary)",removed:"Verbal",compass:"CO · CC",
mechanic:"Two-handed grip, 180° turns, 90° turns, knee against leash. Through the core, not the shoulders.",
failure:"Handler compromises the standard when the dog \"has been good enough.\" Left hand grabs the leash to prevent the mistake instead of allowing it.",
grows:"Dog's internal regulation in a passive state. Handler's Consistency and Correction Confidence.",
teach:"Two hands anchor you inside your center of gravity. Prevent strength-based escalation, reduce emotional spillover, create repeatable communication. Hands near belt line. Leash slack folds downward. Corrections travel at 45 degrees, through your core. The mechanics keep you honest."},
{id:"spot",name:"Spot Command",cat:"Integration",dom:"Internal + Environmental (dog)",removed:"Verbal",compass:"CO · IN",
mechanic:"Place command, down-stay, random pressure spikes while handler lives their life.",
failure:"Handler forgets to enforce it. Dog breaks, handler doesn't notice or doesn't want to walk over. The standard dies quietly, not loudly.",
grows:"Dog's self-regulation under real-world pressure. Handler's Intentionality — are you designing the environment or just existing in it?",
teach:"Put your dog in a spot. Throw random pressure spikes — louder voice, movement, doorbell. Go about your business so long as they remain. Every hold through a distraction deepens Commitment Depth. Requires almost no extra time — living your life while your dog practices regulation within it."},
{id:"walkprep",name:"Walk Prep",cat:"Integration",dom:"Environmental + Internal (both)",removed:"Verbal (mostly)",compass:"IN · T",
mechanic:"Run leash drills before stepping outside. Training first, then walk.",
failure:"Handler skips it. \"We're just going for a quick walk.\" That compromise sets up the entire walk to fail.",
grows:"Handler's Intentionality. Dog's ability to transition from indoor state to outdoor state without spiking.",
teach:"Pre-walk routine: a few minutes of leash training — release, turn and snap, turn and kick, right-handed quick pop. Five minutes of precision will do more than thirty minutes of sloppy walking. Training first, then walk."}
];
const HW_STATUS=["Assigned","In Progress","Consistent","Struggling"];

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const tdy=()=>new Date().toISOString().split("T")[0];
const sc=(v,m=5)=>(v/m<=.3?"#A05050":v/m<=.5?"#A09050":v/m<=.7?"#6F745C":"#6F745C");
const cTotal=c=>c.ER+c.T+c.CC+c.CO+c.IN;
const SK="shdt-v5";

const mkClient=()=>({id:uid(),name:"",dog:"",breed:"",age:"",ctx:"",sig:{d:"",b:"",g:""},prof:"",comp:[],sess:[],hw:[],issues:[],notes:""});
const mkComp=cp=>({id:uid(),cp,dt:tdy(),ER:1,T:1,CC:1,CO:1,IN:1});
const mkSess=()=>({id:uid(),dt:tdy(),prof:"",ch:"",focus:"",q:2,stage:"",notes:""});
const mkEval=()=>({id:uid(),dt:tdy(),p1:{feet:"",mouth:"",leash:"",face:"",brk:"",bodyFirst:"",arousal:1,hyp:""},p2:{dir:"",notes:""},sig:{d:"",b:"",g:""},comp:{ER:1,T:1,CC:1,CO:1,IN:1},prof:""});

// ═══════ STATE ═══════
let DATA={c:[]},TAB="clients",AID=null,VW="list",ED=null;

async function load(){
  const dbg=[];
  let found=false;
  
  // Method 1: Try window.storage API
  if(window.storage){
    dbg.push("storage API exists");
    try{
      const r=await window.storage.get(SK,false);
      if(r&&r.value){
        DATA=JSON.parse(r.value);
        if(DATA.c&&DATA.c.length>0){dbg.push("Loaded "+DATA.c.length+" clients from storage");found=true}
      }
    }catch(e){
      dbg.push("storage.get: "+e.message);
      // Try without shared parameter
      try{
        const r2=await window.storage.get(SK);
        if(r2&&r2.value){
          DATA=JSON.parse(r2.value);
          if(DATA.c&&DATA.c.length>0){dbg.push("Loaded "+DATA.c.length+" (no shared param)");found=true}
        }
      }catch(e2){dbg.push("storage.get no-param: "+e2.message)}
    }
  }else{dbg.push("No storage API")}
  
  // Method 2: Try localStorage fallback
  if(!found){
    try{
      const ls=localStorage.getItem(SK);
      if(ls){DATA=JSON.parse(ls);if(DATA.c&&DATA.c.length>0){dbg.push("Loaded "+DATA.c.length+" from localStorage");found=true}}
    }catch(e){dbg.push("localStorage: "+e.message)}
  }
  
  if(!found){DATA={c:[]};dbg.push("No saved data found")}
  
  // Ensure arrays
  if(!DATA.c)DATA.c=[];
  DATA.c.forEach(c=>{if(!c.comp)c.comp=[];if(!c.sess)c.sess=[];if(!c.hw)c.hw=[];if(!c.issues)c.issues=[];if(!c.exAssign)c.exAssign=[];if(!c.sig)c.sig={d:"",b:"",g:""}});
  window._dbg=dbg;
  render();
}
async function save(){
  try{
    const payload=JSON.stringify(DATA);
    const r=await window.storage.set(SK,payload,false);
    window._lastSave=r?"OK":"null result";
    window._saveTime=new Date().toLocaleTimeString();
    window._saveSize=payload.length+" chars";
  }catch(e){
    window._lastSave="SAVE ERROR: "+e.message;
    // Fallback to localStorage
    try{localStorage.setItem(SK,JSON.stringify(DATA));window._lastSave="OK (localStorage fallback)";window._saveTime=new Date().toLocaleTimeString()}catch(e2){window._lastSave="ALL SAVE FAILED: "+e.message+" / "+e2.message}
  }
}
function getCl(){return DATA.c.find(x=>x.id===AID)}
function updCl(c){const i=DATA.c.findIndex(x=>x.id===c.id);if(i>=0)DATA.c[i]=c;else DATA.c.push(c);save()}
function delCl(id){DATA.c=DATA.c.filter(x=>x.id!==id);save()}

// ═══════ HELPERS ═══════
const h=(tag,attrs,ch)=>{const e=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==="style"&&typeof v==="object")Object.assign(e.style,v);else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="className")e.className=v;else if(k==="innerHTML")e.innerHTML=v;else e.setAttribute(k,v)});if(ch!==undefined){if(Array.isArray(ch))ch.forEach(c=>{if(c)e.appendChild(typeof c==="string"?document.createTextNode(c):c)});else if(typeof ch==="string")e.textContent=ch;else if(ch)e.appendChild(ch)}return e};

function badges(items,active,onSelect,color){
  const d=h("div",{className:"badges"});
  items.forEach(it=>{const b=h("button",{className:"badge"+(active===it?" on":""),onClick:()=>onSelect(it)},it);if(active===it&&color){b.style.borderColor=color;b.style.background=color+"20";b.style.color=color}d.appendChild(b)});
  return d;
}

function profileSelect(current,onSelect){
  const wrap=h("div",{className:"select-wrap"});
  const btn=h("button",{className:"select-btn"});
  const label=h("span",{},current||"Select profile…");
  if(!current)label.style.color="#5a5a55";
  const arrow=h("span",{className:"arrow"},"▼");
  btn.appendChild(label);btn.appendChild(arrow);
  const menu=h("div",{className:"select-menu"});
  const profiles=["Reactive","Rigid","Avoidant","Passive","Imp. Reactive","Imp. Rigid","Imp. Avoidant","Imp. Passive","Attuned"];
  // Group headers
  const groups=[{label:"ENTRY",items:["Reactive","Rigid","Avoidant","Passive"]},{label:"IMPROVED",items:["Imp. Reactive","Imp. Rigid","Imp. Avoidant","Imp. Passive"]},{label:"SUMMIT",items:["Attuned"]}];
  groups.forEach(g=>{
    const gh=h("div",{style:{padding:"6px 12px",fontSize:"10px",letterSpacing:"2px",color:"#6F745C",fontFamily:"'Cinzel',serif",background:"#1E1E1E"}},g.label);
    menu.appendChild(gh);
    g.items.forEach(p=>{
      const opt=h("div",{className:"select-opt"+(current===p?" active":""),onClick:(e)=>{e.stopPropagation();onSelect(p);menu.classList.remove("show");arrow.classList.remove("open")}},p);
      menu.appendChild(opt);
    });
  });
  // Clear option
  const clr=h("div",{className:"select-opt",style:{color:"#A05050",fontSize:"11px"},onClick:(e)=>{e.stopPropagation();onSelect("");menu.classList.remove("show");arrow.classList.remove("open")}},"Clear selection");
  menu.appendChild(clr);
  btn.addEventListener("click",(e)=>{e.stopPropagation();const isOpen=menu.classList.contains("show");document.querySelectorAll(".select-menu").forEach(m=>m.classList.remove("show"));document.querySelectorAll(".arrow").forEach(a=>a.classList.remove("open"));if(!isOpen){menu.classList.add("show");arrow.classList.add("open")}});
  document.addEventListener("click",()=>{menu.classList.remove("show");arrow.classList.remove("open")});
  wrap.appendChild(btn);wrap.appendChild(menu);
  return wrap;
}

function scoreRow(label,val,onChange,max=5){
  const r=h("div",{className:"score-row"});
  r.appendChild(h("span",{className:"sl"},label));
  const dots=h("div",{className:"dots"});
  for(let i=1;i<=max;i++){const b=h("button",{onClick:()=>onChange(i)},String(i));b.style.background=i<=val?sc(val,max):"#232321";b.style.color=i<=val?"#000":"#5a5a55";dots.appendChild(b)}
  r.appendChild(dots);
  const sv=h("span",{className:"sv"},String(val));sv.style.color=sc(val,max);r.appendChild(sv);
  return r;
}
function field(label,val,onChange,opts={}){
  const d=h("div",{style:{display:"flex",flexDirection:"column",gap:"3px",...(opts.style||{})}});
  d.appendChild(h("label",{className:"lbl"},label));
  const inp=h("input",{className:"inp",value:val||"",placeholder:opts.ph||""});
  if(opts.type)inp.type=opts.type;
  inp.addEventListener("input",e=>onChange(e.target.value));
  d.appendChild(inp);return d;
}
function tarea(val,onChange,ph){
  const t=h("textarea",{className:"ta",placeholder:ph||""});t.value=val||"";
  t.addEventListener("input",e=>onChange(e.target.value));return t;
}
function sec(title,color,children){
  const s=h("div",{className:"sec"});if(color)s.style.borderLeftColor=color;
  const t=h("div",{className:"sec-t"},title);if(color)t.style.color=color;
  s.appendChild(t);
  if(Array.isArray(children))children.forEach(c=>{if(c)s.appendChild(c)});else if(children)s.appendChild(children);
  return s;
}
function topBar(leftEl,center,rightEl){
  const t=h("div",{className:"top"});t.appendChild(leftEl);
  if(center){const c=h("span",{style:{fontSize:"12px",letterSpacing:"3px",color:"#6F745C",fontFamily:"'Cinzel',serif"}},center);t.appendChild(c)}
  t.appendChild(rightEl);return t;
}
function backBtn(label,onClick){return h("button",{style:{background:"none",border:"none",color:"#a09e96",fontSize:"14px",fontFamily:"inherit"},onClick},label||"← Back")}
function btnEl(text,fill,onClick){const b=h("button",{className:"btn"+(fill?" btn-f":""),onClick},text);return b}

function radarSVG(sig){
  const r=34,cx=48,cy=48,ns="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(ns,"svg");svg.setAttribute("width","96");svg.setAttribute("height","96");
  const angles=[0,1,2,3].map(i=>(i*Math.PI*2)/4-Math.PI/2);
  const gv=ch=>ch===sig.d?1:ch===sig.b?.55:ch===sig.g?.2:.45;
  const gc=ch=>ch===sig.d?"#6F745C":ch===sig.b?"#A09050":ch===sig.g?"#A05050":"#5a5a55";
  [.33,.66,1].forEach(s=>{const p=document.createElementNS(ns,"polygon");p.setAttribute("points",angles.map(a=>`${cx+Math.cos(a)*r*s},${cy+Math.sin(a)*r*s}`).join(" "));p.setAttribute("fill","none");p.setAttribute("stroke","#3a3a35");svg.appendChild(p)});
  angles.forEach(a=>{const l=document.createElementNS(ns,"line");l.setAttribute("x1",cx);l.setAttribute("y1",cy);l.setAttribute("x2",cx+Math.cos(a)*r);l.setAttribute("y2",cy+Math.sin(a)*r);l.setAttribute("stroke","#3a3a35");svg.appendChild(l)});

  // Group exercises by category
  const cats=["Single-Channel","Progressive","Integration"];
  cats.forEach(cat=>{
    const exInCat=EXERCISES.filter(ex=>ex.cat===cat);
    if(exInCat.length===0)return;
    const catLabel=cat==="Single-Channel"?"SINGLE-CHANNEL FOUNDATIONS":cat==="Progressive"?"PROGRESSIVE":"INTEGRATION";

    exInCat.forEach(ex=>{
      // Check if exercise matches client's blind/ghost channel
      const matchesBlind=blindCh&&(ex.dom.includes(blindCh)||ex.removed.includes(blindCh));
      const matchesGhost=ghostCh&&(ex.dom.includes(ghostCh)||ex.removed.includes(ghostCh));
      const highlighted=matchesBlind||matchesGhost;

      // Check if already assigned
      const existing=cl.exAssign.find(a=>a.exId===ex.id);
      const card=h("div",{style:{background:"#282825",border:`1px solid ${highlighted?"#6F745C":"#3a3a35"}`,borderLeft:`3px solid ${highlighted?"#6F745C":"#3a3a35"}`,borderRadius:"8px",padding:"12px 14px",marginBottom:"8px"}});

      // Header row
      const hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"6px",cursor:"pointer"}});
      const nameCol=h("div");
      nameCol.appendChild(h("div",{style:{fontSize:"14px",fontWeight:"600",color:"#F6F4F1"}},ex.name));
      const tags=h("div",{style:{display:"flex",gap:"4px",marginTop:"3px",flexWrap:"wrap"}});
      tags.appendChild(h("span",{style:{fontSize:"9px",padding:"2px 6px",borderRadius:"3px",background:"#232321",color:"#6F745C"}},ex.cat));
      ex.compass.split(" · ").forEach(c=>{tags.appendChild(h("span",{style:{fontSize:"9px",padding:"2px 6px",borderRadius:"3px",background:"#232321",color:"#A09050"}},c))});
      if(highlighted)tags.appendChild(h("span",{style:{fontSize:"9px",padding:"2px 6px",borderRadius:"3px",background:"rgba(111,116,92,.2)",color:"#8a8f74"}},matchesBlind?"Blind match":"Ghost match"));
      nameCol.appendChild(tags);hdr.appendChild(nameCol);

      // Status or assign button
      if(existing){
        const stDiv=h("div",{style:{textAlign:"right",flexShrink:"0"}});
        const stColor=existing.status==="Struggling"?"#A05050":existing.status==="Consistent"?"#6F745C":existing.status==="In Progress"?"#A09050":"#a09e96";
        stDiv.appendChild(h("div",{style:{fontSize:"10px",fontWeight:"600",color:stColor}},existing.status));
        stDiv.appendChild(h("div",{style:{fontSize:"9px",color:"#5a5a55"}},existing.date));
        hdr.appendChild(stDiv);
      }
      card.appendChild(hdr);

      // Expandable detail — use a toggle
      const detailId="exdet-"+ex.id;
      const toggle=h("button",{style:{fontSize:"12px",color:"#a09e96",marginBottom:"6px",padding:"0",transition:"color .2s ease"},onClick:()=>{
        const det=document.getElementById(detailId);
        if(det){
          if(det.style.maxHeight==="0px"||!det.style.maxHeight){
            det.style.maxHeight=det.scrollHeight+"px";det.style.opacity="1";toggle.textContent="▾ Details";toggle.style.color="#6F745C";
          }else{
            det.style.maxHeight="0px";det.style.opacity="0";toggle.textContent="▸ Details";toggle.style.color="#a09e96";
          }
        }
      }},"▸ Details");
      card.appendChild(toggle);

      const detail=h("div",{id:detailId,style:{maxHeight:"0px",opacity:"0",overflow:"hidden",transition:"max-height .3s ease,opacity .25s ease"}});
      // Channel info
      const chInfo=h("div",{style:{marginBottom:"16px"}});
      [["Dominant",ex.dom],["Channel Removed",ex.removed]].forEach(([lb,val])=>{
        const r=h("div",{style:{display:"flex",gap:"6px",marginBottom:"2px"}});
        r.appendChild(h("span",{style:{fontSize:"10px",color:"#5a5a55",width:"90px",flexShrink:"0"}},lb));
        r.appendChild(h("span",{style:{fontSize:"10px",color:lb==="Channel Removed"?"#A05050":"#a09e96"}},val));
        chInfo.appendChild(r);
      });
      detail.appendChild(chInfo);

      // Teaching content
      detail.appendChild(h("div",{style:{fontSize:"12px",color:"#a09e96",lineHeight:"1.5",marginBottom:"8px",borderLeft:"2px solid #3a3a35",paddingLeft:"10px"}},ex.teach));

      // Mechanic, Failure, Grows
      [["PRIMARY MECHANIC",ex.mechanic,"#6F745C"],["FAILURE POINT",ex.failure,"#A05050"],["WHAT GROWS",ex.grows,"#7EAEC4"]].forEach(([lb,val,c])=>{
        const d=h("div",{style:{marginBottom:"6px"}});
        d.appendChild(h("div",{style:{fontSize:"9px",letterSpacing:"1px",color:c,fontFamily:"'Cinzel',serif"}},lb));
        d.appendChild(h("div",{style:{fontSize:"11px",color:"#a09e96",lineHeight:"1.4"}},val));
        detail.appendChild(d);
      });

      // Assignment section
      const assignSec=h("div",{style:{borderTop:"1px solid #3a3a35",paddingTop:"8px",marginTop:"8px"}});
      if(existing){
        // Status dropdown
        assignSec.appendChild(h("div",{style:{fontSize:"10px",color:"#5a5a55",marginBottom:"4px"}},"UPDATE STATUS"));
        const stWrap=h("div",{style:{display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"6px"}});
        HW_STATUS.forEach(st=>{
          const stColor=st==="Struggling"?"#A05050":st==="Consistent"?"#6F745C":st==="In Progress"?"#A09050":"#a09e96";
          const b=h("button",{className:"badge"+(existing.status===st?" on":""),onClick:()=>{
            existing.status=st;existing.lastUpdated=tdy();
            // Struggling trigger
            if(st==="Struggling"){
              if(!cl.issues)cl.issues=[];
              const issueText="Struggling: "+ex.name+" — "+ex.failure;
              if(!cl.issues.find(x=>x.text===issueText)){cl.issues.push({text:issueText,date:tdy()})}
            }
            updCl(cl);render();
          }},st);
          if(existing.status===st){b.style.borderColor=stColor;b.style.background=stColor+"20";b.style.color=stColor}
          stWrap.appendChild(b);
        });
        assignSec.appendChild(stWrap);
        // Client-specific failure note
        assignSec.appendChild(h("div",{style:{fontSize:"10px",color:"#5a5a55",marginBottom:"4px"}},"FAILURE NOTE (this client)"));
        const noteTA=h("textarea",{className:"ta",style:{minHeight:"40px",fontSize:"11px"},placeholder:"What are you seeing with this handler on this exercise?"});
        noteTA.value=existing.note||"";
        noteTA.addEventListener("input",e=>{existing.note=e.target.value});
        noteTA.addEventListener("blur",()=>{updCl(cl)});
        assignSec.appendChild(noteTA);
        // Remove
        assignSec.appendChild(h("button",{style:{fontSize:"10px",color:"#A05050",marginTop:"6px",padding:"4px 0"},onClick:()=>{
          cl.exAssign=cl.exAssign.filter(a=>a.exId!==ex.id);
          // Also remove from homework
          if(cl.hw)cl.hw=cl.hw.filter(x=>!x.text.startsWith(ex.name));
          updCl(cl);render();
        }},"Remove assignment"));
      }else{
        // Assign button
        const assignBtn=h("button",{className:"btn btn-f",style:{width:"100%"},onClick:()=>{
          cl.exAssign.push({exId:ex.id,status:"Assigned",date:tdy(),lastUpdated:tdy(),note:""});
          if(!cl.hw)cl.hw=[];
          cl.hw.push({text:ex.name+" — "+ex.mechanic.split(".")[0]+".",date:tdy()});
          updCl(cl);render();
        }},"Assign to "+cl.name);
        assignSec.appendChild(assignBtn);
      }
      detail.appendChild(assignSec);
      card.appendChild(detail);
      w.appendChild(card);
    });
  });

  // Struggling slowdown reminders based on profile
  const struggling=cl.exAssign.filter(a=>a.status==="Struggling");
  if(struggling.length>0){
    const prof=cl.prof||"";
    const reminders=[];
    if(prof.includes("Reactive"))reminders.push("Reactive handler struggling — slow down. Count to three before every rep. 3-4-5 breathing between exercises. Check internal state before continuing.");
    if(prof.includes("Rigid")||prof.includes("Aversive"))reminders.push("Rigid handler struggling — check if corrections are landing or suppressing. Read the dog's face after every correction. Shutdown is not calm.");
    if(prof.includes("Avoidant"))reminders.push("Avoidant handler struggling — they may be softening the exercise to avoid discomfort. The standard is the standard. Clarity is kindness.");
    if(prof.includes("Passive"))reminders.push("Passive handler struggling — check if they're actually doing the reps or going through the motions. Eyes on the dog. One thing to watch per rep.");
    if(prof==="Attuned")reminders.push("Attuned handler struggling — check for drift. Which channel slipped? Run the self-diagnostic.");
    if(reminders.length===0&&prof)reminders.push("Handler struggling — pull the profile, check the blind channel. Regression usually lives there.");

    const remCard=h("div",{style:{background:"#282825",border:"1px solid #A0505044",borderLeft:"3px solid #A05050",borderRadius:"8px",padding:"12px 14px",marginTop:"16px"}});
    remCard.appendChild(h("div",{style:{fontSize:"10px",letterSpacing:"3px",color:"#A05050",fontWeight:"700",marginBottom:"6px",fontFamily:"'Cinzel',serif"}},"SLOW DOWN — "+struggling.length+" STRUGGLING"));
    struggling.forEach(s=>{const ex=EXERCISES.find(x=>x.id===s.exId);if(ex)remCard.appendChild(h("div",{style:{fontSize:"12px",color:"#F6F4F1",marginBottom:"2px"}},"• "+ex.name))});
    reminders.forEach(r=>{remCard.appendChild(h("div",{style:{fontSize:"11px",color:"#a09e96",lineHeight:"1.5",marginTop:"6px"}},r))});
    w.appendChild(remCard);
  }

  app.appendChild(w);
}

// ── DOSSIER ──
function renderDossier(app){
  const cl=getCl();
  app.appendChild(topBar(backBtn("← Back",()=>{VW="detail";render()}),"CLIENT DOSSIER",h("div")));

  const w=h("div",{style:{padding:"0 16px"}});

  // Client header
  const hd=h("div",{style:{textAlign:"center",padding:"6px 0 16px",borderBottom:"1px solid #3a3a35",marginBottom:"16px"}});
  hd.appendChild(h("div",{style:{fontSize:"20px",fontWeight:"700",fontFamily:"'Cinzel',serif",fontFamily:"'Cinzel',serif"}},cl.name||"Unnamed"));
  const meta=[];if(cl.dog)meta.push(cl.dog);if(cl.breed)meta.push(cl.breed);if(cl.age)meta.push(cl.age);
  if(meta.length)hd.appendChild(h("div",{style:{fontSize:"13px",color:"#a09e96",marginTop:"2px"}},meta.join(" · ")));
  if(cl.prof)hd.appendChild(h("div",{style:{fontSize:"12px",color:"#6F745C",marginTop:"4px"}},cl.prof));
  if(cl.ctx)hd.appendChild(h("div",{style:{fontSize:"14px",color:"#7EAEC4",marginTop:"2px"}},cl.ctx));
  // Signature summary
  if(cl.sig.d||cl.sig.b||cl.sig.g){
    const sigLine=[];
    if(cl.sig.d)sigLine.push("Dom: "+cl.sig.d);if(cl.sig.b)sigLine.push("Blind: "+cl.sig.b);if(cl.sig.g)sigLine.push("Ghost: "+cl.sig.g);
    hd.appendChild(h("div",{style:{fontSize:"14px",color:"#a09e96",marginTop:"4px"}},sigLine.join(" · ")));
  }
  // Latest compass
  if(cl.comp.length>0){const lc=cl.comp[cl.comp.length-1];const t=cTotal(lc);
    hd.appendChild(h("div",{style:{fontSize:"14px",color:sc(t,25),marginTop:"4px"}},"Compass: "+t+"/25 ("+lc.cp+" · "+lc.dt+")"));
  }
  w.appendChild(hd);

  // ── Client Notes ──
  if(cl.notes){
    w.appendChild(sec("CLIENT NOTES","#6F745C",[h("div",{style:{fontSize:"14px",color:"#F6F4F1",whiteSpace:"pre-wrap",lineHeight:"1.6"}},cl.notes)]));
  }

  // ── Homework ──
  if(cl.hw&&cl.hw.length>0){
    const hwKids=(cl.hw||[]).map(hw=>{
      const r=h("div",{style:{padding:"4px 0",borderBottom:"1px solid #232321",display:"flex",justifyContent:"space-between"}});
      r.appendChild(h("span",{style:{fontSize:"13px",color:"#6F745C"}},hw.text));
      r.appendChild(h("span",{style:{fontSize:"10px",color:"#5a5a55"}},hw.date));return r;
    });
    w.appendChild(sec("HOMEWORK · "+cl.hw.length,"#6F745C",hwKids));
  }

  // ── Recurring Issues ──
  if(cl.issues&&cl.issues.length>0){
    const riKids=(cl.issues||[]).map(ri=>{
      const r=h("div",{style:{padding:"4px 0",borderBottom:"1px solid #232321",display:"flex",justifyContent:"space-between"}});
      r.appendChild(h("span",{style:{fontSize:"13px",color:"#A09050"}},ri.text));
      r.appendChild(h("span",{style:{fontSize:"10px",color:"#5a5a55"}},ri.date));return r;
    });
    w.appendChild(sec("RECURRING ISSUES · "+cl.issues.length,"#A09050",riKids));
  }

  // ── Compass History ──
  if(cl.comp.length>0){
    const compKids=cl.comp.map(ch=>{
      const t=cTotal(ch);
      const r=h("div",{style:{padding:"6px 0",borderBottom:"1px solid #232321"}});
      const top=h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}});
      top.appendChild(h("span",{style:{fontSize:"20px",fontWeight:"700",fontFamily:"'Cinzel',serif",fontFamily:"'Cinzel',serif",color:sc(t,25)}},String(t)));
      top.appendChild(h("span",{style:{fontSize:"12px",color:"#a09e96"}},ch.cp+" · "+ch.dt));r.appendChild(top);
      const cats=h("div",{style:{fontSize:"14px",color:"#5a5a55",marginTop:"2px"}});
      cats.textContent="ER "+ch.ER+" · T "+ch.T+" · CC "+ch.CC+" · CO "+ch.CO+" · IN "+ch.IN;
      r.appendChild(cats);return r;
    });
    w.appendChild(sec("COMPASS HISTORY · "+cl.comp.length,"#6F745C",compKids));
  }

  // ── All Sessions (full detail) ──
  const allSess=[...(cl.sess||[])].sort((a,b)=>b.dt.localeCompare(a.dt));
  if(allSess.length>0){
    const sessKids=allSess.map((s,idx)=>{
      const num=cl.sess.sort((a,b)=>a.dt.localeCompare(b.dt)).findIndex(x=>x.id===s.id)+1;
      const card=h("div",{style:{background:"#232321",borderRadius:"6px",padding:"10px 12px",marginBottom:"8px",borderLeft:"3px solid "+(s.q===1?"#A05050":s.q===3?"#6F745C":"#A09050")}});
      // Header row
      const hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}});
      hdr.appendChild(h("span",{style:{fontSize:"20px",fontWeight:"700",fontFamily:"'Cinzel',serif",fontFamily:"'Cinzel',serif",color:"#6F745C"}},"SESSION #"+num));
      const metaR=h("span",{style:{fontSize:"10px",color:"#5a5a55"}});
      const qLabel=s.q===1?"Rough":s.q===3?"Locked In":"Okay";
      metaR.textContent=s.dt+" · "+qLabel;
      hdr.appendChild(metaR);card.appendChild(hdr);
      // Focus
      if(s.focus)card.appendChild(h("div",{style:{fontSize:"14px",color:"#F6F4F1",marginBottom:"4px"}},s.focus));
      // Tags
      const tags=[];if(s.prof)tags.push(s.prof);if(s.ch)tags.push(s.ch);if(s.stage)tags.push(s.stage);
      if(tags.length)card.appendChild(h("div",{style:{fontSize:"14px",color:"#a09e96",marginBottom:"4px"}},tags.join(" · ")));
      // Notes
      if(s.notes)card.appendChild(h("div",{style:{fontSize:"13px",color:"#a09e96",whiteSpace:"pre-wrap",lineHeight:"1.5",borderTop:"1px solid #3a3a35",paddingTop:"6px",marginTop:"4px"}},s.notes));
      return card;
    });
    w.appendChild(sec("ALL SESSIONS · "+allSess.length,"#a09e96",sessKids));
  }else{
    w.appendChild(sec("SESSIONS","#a09e96",[h("div",{style:{fontSize:"13px",color:"#5a5a55"}},"No sessions logged yet.")]));
  }

  app.appendChild(w);
}

// ── STATES ──
function renderStates(app){
  const hdr=h("div",{className:"hdr"});hdr.appendChild(h("div",{className:"sub"},"STEADY HAND RaD™"));
  const t=h("div",{className:"ttl"});t.textContent="FIVE-STATE MAP™";hdr.appendChild(t);app.appendChild(hdr);
  const wrap=h("div",{style:{padding:"8px 16px"}});
  STATES.forEach(s=>{
    const card=h("div",{style:{background:"#282825",border:"1px solid #3a3a35",borderLeft:`3px solid ${s.c}`,borderRadius:"8px",padding:"10px 14px",marginBottom:"8px"}});
    const top=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}});
    top.appendChild(h("span",{style:{fontSize:"20px",fontWeight:"700",fontFamily:"'Cinzel',serif",fontFamily:"'Cinzel',serif",color:s.c}},String(s.n)));
    const info=h("div");info.appendChild(h("div",{style:{fontSize:"14px",fontWeight:"600"}},s.nm));info.appendChild(h("div",{style:{fontSize:"14px",color:s.c}},s.sh));
    top.appendChild(info);card.appendChild(top);
    card.appendChild(h("div",{style:{fontSize:"13px",color:"#a09e96",lineHeight:"1.5",marginBottom:"4px"}},s.desc));
    card.appendChild(h("div",{style:{fontSize:"10px",color:"#5a5a55"}},s.mk));wrap.appendChild(card);
  });
  wrap.appendChild(h("div",{style:{fontSize:"14px",color:"#5a5a55",textAlign:"center",marginTop:"8px"}},"State 3 is the fulcrum. Everything before it is reading. Everything after it is recovery."));
  app.appendChild(wrap);
}

// ── REFERENCE ──
function renderReference(app){
  const hdr=h("div",{className:"hdr"});hdr.appendChild(h("div",{className:"sub"},"STEADY HAND RaD™"));
  hdr.appendChild(h("div",{className:"ttl"},"REFERENCE"));app.appendChild(hdr);
  const wrap=h("div",{style:{padding:"8px 16px"}});
  const rc=(title,color,children)=>{const c=h("div",{style:{background:"#282825",border:"1px solid #3a3a35",borderLeft:"3px solid "+color,borderRadius:"8px",padding:"12px 14px",marginBottom:"8px"}});const t=h("div",{style:{fontSize:"12px",letterSpacing:"3px",textTransform:"uppercase",color,marginBottom:"8px",fontWeight:"700",fontFamily:"'Cinzel',serif"}},title);c.appendChild(t);if(Array.isArray(children))children.forEach(x=>{if(x)c.appendChild(x)});else if(children)c.appendChild(children);return c};

  // Compass
  wrap.appendChild(rc("COMPASS","#6F745C",[
    h("div",{style:{fontSize:"14px",color:"#F6F4F1",lineHeight:"1.5"}},"ER — Emotional Regulation\nT — Timing & Pacing\nCC — Correction Confidence\nCO — Consistency\nIN — Intentionality"),
    h("div",{style:{fontSize:"14px",color:"#5a5a55",marginTop:"6px"}},"Each 1–5. Total /25. Tracked Intake → Day 25 → Day 60 → Day 84.")
  ]));

  // Profiles
  const profCard=rc("PROFILES","#6F745C",[]);
  [["Reactive","Dom: Verbal/Spatial · Blind: Internal · Ghost: Environmental","6–10"],["Rigid","Dom: Spatial · Blind: Timing · Ghost: Internal (attunement)","14–19"],["Avoidant","Dom: Verbal · Blind: Internal · Ghost: Spatial","8–13"],["Passive","Dom: Verbal · Blind: Spatial · Ghost: Environmental","7–11"]].forEach(([p,sig,r])=>{
    const d=h("div",{style:{background:"#232321",borderRadius:"6px",padding:"8px 10px",marginBottom:"6px"}});
    d.appendChild(h("div",{style:{fontSize:"15px",fontWeight:"600",color:"#F6F4F1"}},p+" ("+r+"/25)"));
    d.appendChild(h("div",{style:{fontSize:"13px",color:"#a09e96",marginTop:"2px"}},sig));profCard.appendChild(d);
  });
  profCard.appendChild(h("div",{style:{fontSize:"14px",color:"#5a5a55",marginTop:"4px"}},"Entry → Improved → Attuned"));
  wrap.appendChild(profCard);

  // Channels
  wrap.appendChild(rc("FOUR PRESSURE CHANNELS™","#6F745C",[
    h("div",{style:{fontSize:"14px",color:"#F6F4F1",fontWeight:"600"}},"Spatial · Verbal · Environmental · Internal"),
    h("div",{style:{fontSize:"13px",color:"#a09e96",marginTop:"6px",lineHeight:"1.5"}},"Pressure is not correction. Pressure is not force. Pressure is constant. You are adding to the load or stabilizing it. There is no neutral.")
  ]));

  // Diagnostics
  wrap.appendChild(rc("DIAGNOSTICS","#A09050",[
    h("div",{style:{fontSize:"14px",color:"#F6F4F1",lineHeight:"1.6"}},"Blind = friction when named.\nGhost = blankness when named.\nThe reaction is the diagnostic."),
    h("div",{style:{fontSize:"13px",color:"#a09e96",marginTop:"8px",lineHeight:"1.5"}},"Do not introduce the ghost channel by correcting it. Introduce it. They need vocabulary before reps."),
    h("div",{style:{fontSize:"13px",color:"#a09e96",marginTop:"6px",lineHeight:"1.5"}},"The client never sees the full diagnostic. The diagnostic belongs to the trainer. The direction belongs to both of them.")
  ]));

  // Arc Patterns
  const patCard=rc("ARC PATTERNS","#6F745C",[]);
  [["Recovery ↑ + Check-ins ↑","Stay the course. Depth is building."],["Recovery ↓ + High State ↑","Environment ahead of foundation. Pull back. Run the Reset."],["Compass ↓ + Profile shifting","Handler regression. Check Emotional Spillover. Breathing Reset."],["Flat 3+ sessions","Plateau. Week 5–8 territory. Normal. You're building depth. Hold."],["Recovery ↑ but Check-ins ↓","Compliance without connection. Add enrichment. Relationship work."],["Check-ins ↑ but Recovery ↓","Attention without commitment. Deepen commitment. More proofing."]].forEach(([p,m])=>{
    const d=h("div",{style:{marginBottom:"6px"}});
    d.appendChild(h("div",{style:{fontSize:"20px",fontWeight:"700",fontFamily:"'Cinzel',serif",fontFamily:"'Cinzel',serif",color:"#6F745C"}},p));
    d.appendChild(h("div",{style:{fontSize:"14px",color:"#a09e96",marginTop:"1px"}},m));patCard.appendChild(d);
  });
  wrap.appendChild(patCard);

  app.appendChild(wrap);
}

load();
