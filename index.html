iv><div style={{fontSize:10,color:$.tx,marginTop:2}}>{p.a}</div></div>)}</Se>}{arc.map((s,i)=><button key={i} onClick={()=>{sAI(i);sTab("arcEdit")}} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"8px 6px",background:s.dt?$.cd:"transparent",border:`1px solid ${s.dt?$.bd:$.bd+"44"}`,borderRadius:4,marginBottom:4,cursor:"pointer",textAlign:"left",opacity:s.dt?1:.5}}><span style={{width:22,fontSize:11,fontWeight:700,color:$.bl}}>#{s.s}</span><span style={{flex:1,fontSize:10,color:$.dm}}>{s.dt||"—"}</span>{s.rec!==null&&<span style={{fontSize:9,padding:"2px 4px",borderRadius:2,background:sc(s.rec,3)+"18",color:sc(s.rec,3)}}>R{s.rec}</span>}{s.comp!==null&&<span style={{fontSize:9,padding:"2px 4px",borderRadius:2,background:sc(s.comp,25)+"18",color:sc(s.comp,25)}}>C{s.comp}</span>}{s.tr&&<span style={{fontSize:12}}>{s.tr}</span>}</button>)}</div><Nav/></div>}if(tab==="arcEdit"&&cl&&arcI!==null){const s=cl.arc[arcI],block=BL[Math.floor(arcI/4)];const set=(k,v)=>{const c={...cl};c.arc=[...c.arc];c.arc[arcI]={...c.arc[arcI],[k]:v};saveCl(c)};return<div style={sh}><div ref={sr} style={ct}><Bk onClick={()=>{sAI(null);sTab("arc")}} label="Arc"/><Lb color={$.bl}>SESSION #{s.s} · {block?.l}</Lb><div style={{fontSize:9,color:$.dr,marginTop:2,marginBottom:14}}>{block?.d}</div><In label="Date" value={s.dt} onChange={v=>set("dt",v)} type="date" style={{marginBottom:12}}/><Se title="Recovery" accent={sc(s.rec||0,3)}><div style={{display:"flex",gap:6}}>{[0,1,2,3].map(n=><Cp key={n} active={s.rec===n} color={sc(Math.max(n,.5),3)} onClick={()=>set("rec",n)}>{n}</Cp>)}</div></Se><Se title="Check-ins" accent={$.gn}><In value={s.chk} onChange={v=>set("chk",v===""?null:parseInt(v)||0)} type="number" placeholder="per 10m"/></Se><Se title="Compass"><In value={s.comp} onChange={v=>set("comp",v===""?null:parseInt(v)||0)} type="number" placeholder="/25"/></Se><Se title="High State" accent={ST[(s.hs||1)-1]?.c}><div style={{display:"flex",gap:4}}>{ST.map(st=><Cp key={st.n} active={s.hs===st.n} color={st.c} onClick={()=>set("hs",st.n)}>{st.n}</Cp>)}</div></Se><Se title="Profile"><PfSel value={s.pf} onChange={v=>set("pf",v)}/></Se><Se title="Trend"><div style={{display:"flex",gap:6}}>{["↑","→","↓"].map(t=><Cp key={t} active={s.tr===t} color={t==="↑"?$.gn:t==="→"?$.g:$.rd} onClick={()=>set("tr",t)}>{t}</Cp>)}</div></Se><Ta label="Notes" value={s.nt} onChange={v=>set("nt",v)}/></div><Nav/></div>}if(tab==="tuNew"&&tu&&cl){const t=tu,set=(k,v)=>sTu({...t,[k]:v});return<div style={sh}><div ref={sr} style={ct}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><Bk onClick={()=>{sTu(null);sTab("detail")}}/><Bt accent onClick={()=>{saveCl({...cl,tu:[...(cl.tu||[]),t]});sTu(null);sTab("detail")}}>Save</Bt></div><Lb color={$.or} style={{display:"block",marginBottom:12}}>TUNE-UP</Lb><In label="Date" value={t.date} onChange={v=>set("date",v)} type="date" style={{marginBottom:12}}/>{t.ph.map((p,i)=><div key={i} style={{marginBottom:10,padding:10,background:p.done?$.cd:"transparent",border:`1px solid ${p.done?$.or+"33":$.bd}`,borderRadius:4}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><button onClick={()=>{const ph=[...t.ph];ph[i]={...ph[i],done:!ph[i].done};set("ph",ph)}} style={{width:20,height:20,borderRadius:3,border:`1px solid ${p.done?$.or:$.bd}`,background:p.done?$.or:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:$.bg,fontSize:11,fontWeight:700}}>{p.done?"✓":""}</button><span style={{fontSize:10,color:$.or,fontWeight:700}}>{p.tm}</span><span style={{fontSize:11,color:$.tx,fontWeight:600}}>{p.nm}</span></div><div style={{fontSize:9,color:$.dm,marginLeft:28}}>{p.ac}</div></div>)}<Se title="Compass" accent={$.or}><div style={{display:"flex",gap:10}}><In label="Before" value={t.cb} onChange={v=>set("cb",v===""?null:parseInt(v)||0)} type="number" style={{flex:1}}/><In label="After" value={t.ca} onChange={v=>set("ca",v===""?null:parseInt(v)||0)} type="number" style={{flex:1}}/></div></Se><In label="The Win" value={t.win} onChange={v=>set("win",v)} placeholder="One clear win."/></div><Nav/></div>}if(tab==="resetRun"&&rst&&cl){const r=rst,set=(k,v)=>sRst({...r,[k]:v});return<div style={sh}><div ref={sr} style={ct}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><Bk onClick={()=>{sRst(null);sTab("detail")}}/><Bt accent onClick={()=>{saveCl({...cl,rs:[...(cl.rs||[]),r]});sRst(null);sTab("detail")}}>Save</Bt></div><Lb color={$.rd} style={{display:"block",marginBottom:4}}>RESET PROTOCOL</Lb><div style={{fontSize:10,color:$.dm,marginBottom:16,fontStyle:"italic"}}>Regression isn't failure. It's a boundary test you haven't answered yet.</div>{r.steps.map((s,i)=><div key={i} style={{marginBottom:12,padding:10,background:s.done?$.cd:"transparent",border:`1px solid ${s.done?$.rd+"33":$.bd}`,borderRadius:4}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><button onClick={()=>{const steps=[...r.steps];steps[i]={...steps[i],done:!steps[i].done};set("steps",steps)}} style={{width:22,height:22,borderRadius:3,border:`1px solid ${s.done?$.rd:$.bd}`,background:s.done?$.rd:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:700}}>{s.done?"✓":""}</button><span style={{fontSize:12,fontWeight:700,color:$.tx}}>Step {s.n}: {s.t}</span></div><div style={{fontSize:10,color:$.dm,marginLeft:30,marginBottom:4}}>{s.d}</div><div style={{fontSize:10,color:$.g,marginLeft:30,marginBottom:6,fontStyle:"italic"}}>{s.q}</div><input value={s.ans||""} onChange={e=>{const steps=[...r.steps];steps[i]={...steps[i],ans:e.target.value};set("steps",steps)}} placeholder="Your answer…" style={{width:"calc(100% - 30px)",marginLeft:30,background:$.bg,border:`1px solid ${$.bd}`,borderRadius:3,padding:"5px 7px",color:$.tx,fontSize:11,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/></div>)}<div style={{display:"flex",gap:8,marginTop:8}}><Cp active={r.ok} color={$.gn} onClick={()=>set("ok",true)}>Resolved</Cp><Cp active={!r.ok} color={$.rd} onClick={()=>set("ok",false)}>Book Tune-Up</Cp></div></div><Nav/></div>}if(tab==="diagnose"){const steps=[{t:"1. Find the Dominant",d:"Watch what fires FIRST when the dog breaks.",tl:"They defend it. They lead with it.",c:$.g},{t:"2. Find the Blind",d:"Listen for surprise. Result didn't match expectation.",tl:"Friction when named. They push back.",c:$.or},{t:"3. Find the Ghost",d:"Tell me about a time you used [channel] deliberately.",tl:"Blankness. Curious. No shelf for it.",c:$.rd}];return<div style={sh}><div ref={sr} style={ct}><div style={{padding:"16px 0 8px"}}><Lb color={$.g}>HANDLER INDEX™ DIAGNOSTIC CARD</Lb><div style={{fontSize:10,color:$.dr,marginTop:4,fontStyle:"italic"}}>Dominant → Blind → Ghost.</div></div>{steps.map((st,i)=><div key={i} style={{marginBottom:12,padding:10,background:dS===i?$.cd:"transparent",border:`1px solid ${dS===i?st.c+"33":$.bd}`,borderRadius:4}}><button onClick={()=>sDS(i)} style={{background:"none",border:"none",cursor:"pointer",width:"100%",textAlign:"left",padding:0}}><div style={{fontSize:12,fontWeight:700,color:st.c}}>{st.t}</div><div style={{fontSize:10,color:$.dm,marginTop:3}}>{st.d}</div><div style={{fontSize:9,color:$.dr,marginTop:3,fontStyle:"italic"}}>{st.tl}</div></button>{dS===i&&<div style={{marginTop:10}}><div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>{CH.map(ch=><Cp key={ch} active={dD[["dominant","blind","ghost"][i]]===ch} color={st.c} onClick={()=>sDD({...dD,[["dominant","blind","ghost"][i]]:ch})}>{ch}</Cp>)}</div></div>}</div>)}<Se title="Channel Questions" accent={$.bl}>{CH.map(ch=><div key={ch} style={{marginBottom:10}}><div style={{fontSize:11,fontWeight:700,color:$.tx}}>{ch}</div><div style={{fontSize:10,color:$.g,fontStyle:"italic",marginTop:2}}>"{DQ[ch].a}"</div><div style={{fontSize:9,color:$.dm,marginTop:2}}>{DQ[ch].l}</div></div>)}</Se><Se title="Blind vs Ghost" accent={$.or}><div style={{display:"flex",gap:8}}><div style={{flex:1,padding:8,background:$.bg,borderRadius:4,borderTop:`2px solid ${$.or}`}}><div style={{fontSize:10,fontWeight:700,color:$.or}}>BLIND</div><div style={{fontSize:9,color:$.or,marginTop:3}}>FRICTION</div><div style={{fontSize:8,color:$.dr}}>Correct the channel.</div></div><div style={{flex:1,padding:8,background:$.bg,borderRadius:4,borderTop:`2px solid ${$.rd}`}}><div style={{fontSize:10,fontWeight:700,color:$.rd}}>GHOST</div><div style={{fontSize:9,color:$.rd,marginTop:3}}>BLANKNESS</div><div style={{fontSize:8,color:$.dr}}>Introduce the channel.</div></div></div></Se>{(dD.dominant||dD.blind||dD.ghost)&&<Se title="Current Read"><div style={{display:"flex",gap:10,alignItems:"center"}}><Radar sg={dD} size={80}/><div>{dD.dominant&&<div style={{fontSize:11,color:$.g}}>Dom: {dD.dominant}</div>}{dD.blind&&<div style={{fontSize:11,color:$.or}}>Blind: {dD.blind}</div>}{dD.ghost&&<div style={{fontSize:11,color:$.rd}}>Ghost: {dD.ghost}</div>}</div></div>{cl&&<Bt full onClick={()=>{saveCl({...cl,sg:{dominant:dD.dominant,blind:dD.blind,ghost:dD.ghost}});sTab("detail")}} style={{marginTop:10}}>Apply to {cl.nm}</Bt>}</Se>}</div><Nav/></div>}if(tab==="fiveState")return<div style={sh}><div ref={sr} style={ct}><div style={{padding:"16px 0 8px"}}><Lb color={$.g}>FIVE-STATE AWARENESS MAP™</Lb></div>{ST.map(s=><div key={s.n} style={{marginBottom:10,padding:10,background:$.cd,border:`1px solid ${s.n===3?s.c+"44":$.bd}`,borderRadius:4,borderLeft:`3px solid ${s.c}`}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{fontSize:16,fontWeight:700,color:s.c}}>{s.n}</span><span style={{fontSize:12,fontWeight:600,color:$.tx}}>{s.nm}</span></div><div style={{fontSize:10,color:$.dm,marginBottom:4}}>{s.d}</div><div style={{fontSize:9,color:$.dr}}>{s.s}</div>{s.n===3&&<div style={{fontSize:9,color:s.c,marginTop:6,fontStyle:"italic",fontWeight:600}}>State 3 is the fulcrum. Everything before it is reading. Everything after it is recovery.</div>}</div>)}<div style={{padding:10,background:$.bg,borderRadius:4,border:`1px solid ${$.g}18`,marginTop:8}}><div style={{fontSize:10,color:$.g,fontWeight:600}}>THE PRINCIPLE</div><div style={{fontSize:10,color:$.dm,marginTop:4}}>The dog doesn't need you to be perfect. They need you to be present at State 3.</div></div></div><Nav/></div>;if(tab==="ref")return<div style={sh}><div ref={sr} style={ct}><div style={{padding:"16px 0 12px"}}><Lb color={$.g}>REFERENCE</Lb></div><Se title="Profiles" accent={$.gn}>{Object.entries(PW).map(([p,d])=><div key={p} style={{marginBottom:8,padding:8,background:$.bg,borderRadius:4}}><div style={{fontSize:11,fontWeight:700,color:$.gn}}>{p}</div><div style={{fontSize:9,color:$.dm,marginTop:2}}>{d.w}</div><div style={{fontSize:9,color:$.or,marginTop:2,fontStyle:"italic"}}>"{d.c}"</div></div>)}</Se><Se title="Channels™" accent={$.bl}>{CH.map(ch=><div key={ch} style={{marginBottom:8,padding:8,background:$.bg,borderRadius:4}}><div style={{fontSize:11,fontWeight:700,color:$.bl}}>{ch}</div><div style={{fontSize:9,color:$.g,fontStyle:"italic",marginTop:2}}>"{DQ[ch].a}"</div><div style={{fontSize:9,color:$.dm,marginTop:2}}>{DQ[ch].l}</div></div>)}<div style={{fontSize:9,color:$.dm,marginTop:8,padding:8,background:$.bg,borderRadius:4,borderLeft:`2px solid ${$.g}`}}>You are adding to the pressure load or stabilizing it. There is no neutral.</div></Se><Se title="Compass" accent={$.g}>{COMP.map(cat=><div key={cat.k} style={{marginBottom:6,padding:"6px 8px",background:$.bg,borderRadius:4}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:10,fontWeight:700,color:$.g}}>{cat.k}</span><span style={{fontSize:9,color:$.dm}}>{cat.l}</span></div><div style={{fontSize:8,color:$.dr,marginTop:2}}>1: {cat.lo}</div><div style={{fontSize:8,color:$.dr}}>5: {cat.hi}</div></div>)}</Se><Se title="Tune-Up" accent={$.or}>{TP.map((p,i)=><div key={i} style={{marginBottom:6,padding:"6px 8px",background:$.bg,borderRadius:4}}><div style={{display:"flex",gap:8}}><span style={{fontSize:9,color:$.or,fontWeight:700}}>{p.tm}</span><span style={{fontSize:10,fontWeight:600,color:$.tx}}>{p.nm}</span></div><div style={{fontSize:9,color:$.dm,marginTop:2}}>{p.ac}</div></div>)}</Se><Se title="Patterns" accent={$.or}><div style={{fontSize:9,color:$.dm,marginBottom:8}}>3–4 sessions minimum. Single sessions lie.</div>{PAT.map((p,i)=><div key={i} style={{marginBottom:6,padding:"6px 8px",background:$.bg,borderRadius:4}}><div style={{fontSize:10,fontWeight:700,color:$.or}}>{p.p}</div><div style={{fontSize:9,color:$.dm,marginTop:2}}>{p.m}</div><div style={{fontSize:9,color:$.tx,marginTop:1}}>{p.a}</div></div>)}</Se><div style={{textAlign:"center",padding:"16px 0",color:$.dr,fontSize:8,letterSpacing:2}}>STEADY HAND DOG TRAINING<br/>THE SIGNATURE IS THE MAP. THE COMPASS IS THE PROOF OF MOVEMENT.</div></div><Nav/></div>;return<div style={sh}><div style={ct}><Bt onClick={()=>sTab("clients")}>← Back</Bt></div><Nav/></div>}ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
