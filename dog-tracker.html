<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Steady Hand - Dog Log</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Raleway:wght@300;400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #1E1E1E; }
body { background: #1E1E1E; color: #F6F4F1; font-family: 'Raleway', Georgia, sans-serif; font-size: 15px; min-height: 100vh; overflow-x: hidden; padding-bottom: 92px; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #1E1E1E; }
::-webkit-scrollbar-thumb { background: #6F745C; border-radius: 3px; }

.banner { background: #1E1E1E; border-bottom: 1px solid rgba(200,169,110,0.25); padding: 16px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
.banner-center { display: flex; flex-direction: column; align-items: center; flex: 1; }
.banner-title { font-family: 'Cinzel Decorative', 'Cinzel', Georgia, serif; font-size: 18px; color: #C8A96E; letter-spacing: 0.06em; line-height: 1; margin-bottom: 7px; }
.banner-sub { font-family: 'Cinzel', Georgia, serif; font-size: 14px; color: #6F745C; letter-spacing: 0.28em; text-transform: uppercase; }
.banner-rule { width: 32px; height: 1px; background: linear-gradient(90deg, transparent, #C8A96E, transparent); margin: 0 auto 7px auto; }
.banner-left { width: 40px; }
.banner-right { width: 40px; display: flex; justify-content: flex-end; }
.gear-btn { width: 36px; height: 36px; background: transparent; border: 1px solid rgba(111,116,92,0.35); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s, background 0.2s; color: #6F745C; font-size: 17px; position: relative; }
.gear-btn:hover { border-color: #C8A96E; color: #C8A96E; background: rgba(200,169,110,0.06); }
.sync-dot { position: absolute; top: 3px; right: 3px; width: 7px; height: 7px; border-radius: 50%; background: #6F745C; transition: background 0.25s; }
.sync-dot.ok { background: #7FA86B; box-shadow: 0 0 6px rgba(127,168,107,0.6); }
.sync-dot.saving { background: #C8A96E; animation: pulse 1s infinite; }
.sync-dot.err { background: #B05A4A; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 76px; background: #1E1E1E; border-top: 1px solid rgba(111,116,92,0.35); display: flex; align-items: stretch; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; background: transparent; border: none; cursor: pointer; padding: 14px 4px 10px 4px; position: relative; }
.tab-btn::before { content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 2px; background: #C8A96E; transform: scaleX(0); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
.tab-btn.active::before { transform: scaleX(1); box-shadow: 0 0 14px rgba(200,169,110,0.55); }
.tab-icon { font-size: 20px; color: #6F745C; transition: color 0.25s, transform 0.25s, filter 0.25s; line-height: 1; }
.tab-btn.active .tab-icon { color: #C8A96E; transform: translateY(-1px); filter: drop-shadow(0 0 6px rgba(200,169,110,0.45)); }
.tab-label { font-family: 'Cinzel', Georgia, serif; font-size: 14px; letter-spacing: 0.14em; text-transform: uppercase; color: #6F745C; transition: color 0.25s; }
.tab-btn.active .tab-label { color: #C8A96E; text-shadow: 0 0 8px rgba(200,169,110,0.35); }

main { padding: 22px 20px; max-width: 900px; width: 100%; margin: 0 auto; }
.view { display: none; animation: fadeUp 0.32s cubic-bezier(0.4,0,0.2,1) both; }
.view.active { display: block; }

.drawer-overlay { position: fixed; inset: 0; background: rgba(14,14,10,0.7); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.drawer-overlay.open { opacity: 1; pointer-events: all; }
.drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 300px; max-width: 85vw; background: #1E1E1E; border-left: 1px solid rgba(111,116,92,0.35); z-index: 301; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
.drawer-overlay.open .drawer { transform: translateX(0); }
.drawer-hdr { padding: 22px 20px 16px 20px; border-bottom: 1px solid rgba(111,116,92,0.25); display: flex; align-items: center; justify-content: space-between; }
.drawer-title { font-family: 'Cinzel', Georgia, serif; font-size: 14px; color: #C8A96E; letter-spacing: 0.12em; text-transform: uppercase; }
.drawer-body { padding: 20px; flex: 1; overflow-y: auto; }
.drawer-section-title { font-family: 'Cinzel', Georgia, serif; font-size: 14px; letter-spacing: 0.22em; color: #6F745C; text-transform: uppercase; margin-bottom: 12px; margin-top: 20px; }
.drawer-section-title:first-child { margin-top: 0; }
.drawer-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px 14px; background: rgba(111,116,92,0.07); border: 1px solid rgba(111,116,92,0.25); border-radius: 5px; font-family: 'Cinzel', Georgia, serif; font-size: 14px; color: #F6F4F1; cursor: pointer; transition: border-color 0.2s, background 0.2s; margin-bottom: 8px; letter-spacing: 0.06em; text-align: left; }
.drawer-btn:hover { border-color: #C8A96E; background: rgba(200,169,110,0.08); color: #C8A96E; }
.drawer-btn-icon { font-size: 16px; color: #6F745C; }
.storage-info { background: rgba(111,116,92,0.06); border: 1px solid rgba(111,116,92,0.2); border-left: 2px solid #C8A96E; border-radius: 4px; padding: 12px 14px; font-size: 14px; color: #6F745C; line-height: 1.65; }
.storage-info strong { color: #C8A96E; font-family: 'Cinzel', Georgia, serif; }
.storage-info .sync-line { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.storage-info .sync-mini-dot { width: 8px; height: 8px; border-radius: 50%; background: #6F745C; flex-shrink: 0; }
.storage-info .sync-mini-dot.ok { background: #7FA86B; }
.storage-info .sync-mini-dot.saving { background: #C8A96E; animation: pulse 1s infinite; }
.storage-info .sync-mini-dot.err { background: #B05A4A; }
.user-line { font-size: 14px; color: #6F745C; margin-bottom: 12px; }
.user-line strong { color: #C8A96E; font-family: 'Cinzel', Georgia, serif; letter-spacing: 0.04em; display: block; margin-top: 2px; }

.stat-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
.stat-tile { background: rgba(111,116,92,0.07); border: 1px solid rgba(111,116,92,0.3); border-radius: 6px; padding: 16px; }
.stat-label { font-family:'Cinzel',Georgia,serif; font-size:14px; letter-spacing:0.2em; text-transform:uppercase; color:#6F745C; margin-bottom:8px; }
.stat-val { font-family:'Cinzel',Georgia,serif; font-size:26px; font-weight:700; color:#C8A96E; line-height:1; }
.stat-sub { font-size:14px; color:#6F745C; margin-top:4px; }

.search-bar { margin-bottom: 18px; }
.search-bar input { width: 100%; background: rgba(111,116,92,0.08); border: 1px solid rgba(111,116,92,0.3); border-radius: 6px; padding: 11px 14px; font-family: 'Raleway', Georgia, sans-serif; font-size: 15px; color: #F6F4F1; outline: none; transition: border-color 0.2s; }
.search-bar input:focus { border-color: #C8A96E; }
.search-bar input::placeholder { color: #6F745C; }

.dog-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
@media(min-width:600px){ .dog-grid { grid-template-columns: repeat(2, 1fr); } }
.dog-card { background: rgba(111,116,92,0.07); border: 1px solid rgba(111,116,92,0.3); border-radius: 6px; padding: 16px; cursor: pointer; position: relative; overflow: hidden; transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s; }
.dog-card::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:#C8A96E; transform:scaleX(0); transform-origin:left; transition:transform 0.3s; }
.dog-card:hover { border-color:#C8A96E; transform:translateY(-2px); box-shadow:0 6px 24px rgba(0,0,0,0.4); }
.dog-card:hover::after { transform:scaleX(1); }
.card-name { font-family:'Cinzel',Georgia,serif; font-size:17px; color:#F6F4F1; margin-bottom:4px; }
.card-sub { font-size:14px; color:#6F745C; font-style:italic; margin-bottom:10px; }
.card-handlers { font-size:14px; color:#C8A96E; margin-bottom:8px; font-family: 'Cinzel', Georgia, serif; letter-spacing: 0.04em; }
.card-tags { display:flex; flex-wrap:wrap; gap:6px; }
.tag { font-size:14px; padding:3px 9px; border-radius:3px; font-family:'Cinzel',Georgia,serif; letter-spacing:0.05em; }
.tag-br { background:rgba(111,116,92,0.15); color:#6F745C; border:1px solid rgba(111,116,92,0.35); }
.tag-sex { background:rgba(200,169,110,0.08); color:#C8A96E; border:1px solid rgba(200,169,110,0.28); }

.fab { position: fixed; bottom: 92px; right: 20px; width: 52px; height: 52px; background: rgba(200,169,110,0.12); border: 1px solid #C8A96E; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #C8A96E; cursor: pointer; transition: background 0.2s, transform 0.2s, box-shadow 0.2s; z-index: 99; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
.fab:hover { background: rgba(200,169,110,0.22); transform: scale(1.06); box-shadow: 0 6px 28px rgba(200,169,110,0.15); }

.back-btn { display:inline-flex; align-items:center; gap:7px; font-family:'Cinzel',Georgia,serif; font-size:14px; letter-spacing:0.12em; color:#6F745C; cursor:pointer; margin-bottom:20px; padding:6px 0; border:none; background:transparent; transition:color 0.2s; text-transform:uppercase; }
.back-btn:hover { color:#C8A96E; }

.detail-head { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid rgba(111,116,92,0.3); flex-wrap: wrap; gap: 12px; }
.detail-name { font-family: Cinzel, Georgia, serif; font-size: 22px; color: #F6F4F1; margin-bottom: 4px; }
.detail-meta { font-size: 14px; color: #6F745C; }

.dtab-row { display:flex; gap:0; border-bottom:1px solid rgba(111,116,92,0.3); margin-bottom:20px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.dtab-row::-webkit-scrollbar { display:none; }
.dtab { font-family:'Cinzel',Georgia,serif; font-size:14px; letter-spacing:0.12em; color:#6F745C; background:transparent; border:none; padding:10px 14px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color 0.2s,border-color 0.2s; text-transform:uppercase; white-space:nowrap; }
.dtab:hover { color:#F6F4F1; }
.dtab.active { color:#C8A96E; border-bottom-color:#C8A96E; }

.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
.info-blk { background: rgba(111,116,92,0.05); border: 1px solid rgba(111,116,92,0.2); border-radius: 5px; padding: 12px 14px; }
.info-lbl { font-family:'Cinzel',Georgia,serif; font-size:14px; letter-spacing:0.18em; color:#6F745C; text-transform:uppercase; margin-bottom:5px; }
.info-val { font-size: 15px; color: #F6F4F1; }

.handler-card { background: rgba(111,116,92,0.08); border: 1px solid rgba(111,116,92,0.3); border-radius: 6px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s; }
.handler-card:hover { border-color: #C8A96E; }
.handler-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; flex-wrap: wrap; gap: 6px; }
.handler-name { font-family: 'Cinzel', Georgia, serif; font-size: 15px; color: #F6F4F1; }
.handler-score { font-family:'Cinzel',Georgia,serif; color:#C8A96E; font-size:14px; white-space:nowrap; }
.handler-why { font-size: 14px; color: #6F745C; font-style: italic; font-family: EB Garamond, Georgia, serif; margin-top: 4px; }

.session-entry { background:rgba(111,116,92,0.07); border:1px solid rgba(111,116,92,0.25); border-radius:5px; padding:13px 15px; margin-bottom:9px; }
.session-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; flex-wrap: wrap; gap: 6px; }
.session-date { font-family:'Cinzel',Georgia,serif; font-size:14px; color:#6F745C; letter-spacing:0.1em; }
.session-handler { font-family: 'Cinzel', Georgia, serif; font-size: 14px; color: #C8A96E; letter-spacing: 0.08em; }
.session-text { font-size:14px; color:#F6F4F1; line-height:1.65; }

.overlay { position:fixed; inset:0; background:rgba(14,14,10,0.88); z-index:200; display:flex; align-items:flex-end; justify-content:center; padding:0; opacity:0; pointer-events:none; transition:opacity 0.25s; }
.overlay.open { opacity:1; pointer-events:all; }
.modal { background:#1E1E1E; border:1px solid rgba(200,169,110,0.3); border-radius:14px 14px 0 0; width:100%; max-width:680px; max-height:92vh; overflow-y:auto; transform:translateY(100%); transition:transform 0.38s cubic-bezier(0.4,0,0.2,1); box-shadow:0 -12px 60px rgba(0,0,0,0.6); }
.overlay.open .modal { transform:translateY(0); }
.modal-hdr { display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid rgba(111,116,92,0.3); position:sticky; top:0; background:#1E1E1E; z-index:1; }
.modal-handle { width:36px; height:4px; background:rgba(111,116,92,0.4); border-radius:2px; position:absolute; top:10px; left:50%; transform:translateX(-50%); }
.modal-title { font-family:'Cinzel',Georgia,serif; font-size:14px; color:#C8A96E; letter-spacing:0.1em; }
.modal-body { padding:20px; padding-bottom:32px; }

.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:13px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group.full { grid-column:1/-1; }
.form-label { font-family:'Cinzel',Georgia,serif; font-size:14px; letter-spacing:0.18em; color:#6F745C; text-transform:uppercase; }
.form-input, .form-select, .form-textarea { background:rgba(111,116,92,0.08); border:1px solid rgba(111,116,92,0.3); border-radius:4px; padding:9px 12px; font-family:'Raleway',Georgia,sans-serif; font-size:14px; color:#F6F4F1; outline:none; transition:border-color 0.2s; width:100%; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color:#C8A96E; }
.form-textarea { resize:vertical; min-height:75px; }
.form-select option { background:#1E1E1E; }
.form-section { margin-top:18px; padding-top:15px; border-top:1px solid rgba(111,116,92,0.25); }
.form-section-title { font-family:'Cinzel',Georgia,serif; font-size:14px; letter-spacing:0.18em; color:#C8A96E; text-transform:uppercase; margin-bottom:12px; }

.btn { font-family:'Cinzel',Georgia,serif; font-size:14px; letter-spacing:0.1em; padding:9px 17px; border:1px solid rgba(111,116,92,0.35); border-radius:4px; cursor:pointer; transition:all 0.2s; background:transparent; color:#F6F4F1; display:inline-flex; align-items:center; gap:7px; }
.btn:hover { border-color:#C8A96E; color:#C8A96E; }
.btn-primary { background:rgba(200,169,110,0.1); border-color:rgba(200,169,110,0.5); color:#C8A96E; }
.btn-primary:hover { background:rgba(200,169,110,0.2); border-color:#C8A96E; }
.btn-danger { border-color:rgba(200,100,80,0.25); color:#A06050; }
.btn-danger:hover { background:rgba(200,100,80,0.08); }
.btn-sm { padding:6px 13px; font-size:14px; }
.btn-icon { padding:7px; border:none; background:transparent; color:#6F745C; cursor:pointer; border-radius:4px; transition:color 0.2s; font-size:15px; line-height:1; }
.btn-icon:hover { color:#C8A96E; }

.empty { text-align:center; padding:44px 20px; color:#6F745C; }
.empty-icon { font-size:32px; margin-bottom:12px; opacity:0.3; }
.empty-title { font-family:'Cinzel',Georgia,serif; font-size:14px; color:#6F745C; margin-bottom:5px; }
.empty-sub { font-size:14px; }

.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(30px); background:#1E1E1E; border:1px solid rgba(200,169,110,0.4); border-radius:5px; padding:10px 20px; font-family:'Cinzel',Georgia,serif; font-size:14px; color:#C8A96E; z-index:999; opacity:0; transition:transform 0.3s ease,opacity 0.3s; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

.boot-screen { position:fixed; inset:0; background:#1E1E1E; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; font-family:'Cinzel',Georgia,serif; color:#C8A96E; font-size:14px; letter-spacing:0.18em; text-transform:uppercase; }
.boot-spinner { width:28px; height:28px; border:2px solid rgba(200,169,110,0.2); border-top-color:#C8A96E; border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:18px; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

@media(max-width:480px){
  .form-grid { grid-template-columns:1fr; }
  .info-grid { grid-template-columns:1fr; }
  .banner-title { font-size:16px; }
}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<div class="boot-screen" id="boot-screen">
  <div class="boot-spinner"></div>
  <div id="boot-msg">Loading</div>
</div>

<div class="banner" id="app-banner" style="display:none">
  <div class="banner-left"></div>
  <div class="banner-center">
    <div class="banner-title">Steady Hand</div>
    <div class="banner-rule"></div>
    <div class="banner-sub">Dog Log</div>
  </div>
  <div class="banner-right">
    <button class="gear-btn" onclick="openDrawer()">&#9881;<span class="sync-dot" id="sync-dot"></span></button>
  </div>
</div>

<main id="app-main" style="display:none">

  <div class="view active" id="view-dogs">
    <div class="stat-row">
      <div class="stat-tile"><div class="stat-label">Dogs</div><div class="stat-val" id="s-dogs">0</div><div class="stat-sub">in caseload</div></div>
      <div class="stat-tile"><div class="stat-label">Active Pairings</div><div class="stat-val" id="s-pairs">0</div><div class="stat-sub">handler &#8594; dog</div></div>
    </div>
    <div class="search-bar"><input id="search" placeholder="Search by name, breed, or handler..." oninput="renderDogs()"></div>
    <div id="dog-wrap"></div>
  </div>

  <div class="view" id="view-detail">
    <button class="back-btn" onclick="backToDogs()">&#8592; &nbsp;Dogs</button>
    <div id="detail-content"></div>
  </div>

</main>

<div class="tab-bar" id="tab-bar" style="display:none">
  <button class="tab-btn active" id="tb-dogs" onclick="showView('dogs')"><span class="tab-icon">&#9679;</span><span class="tab-label">Dogs</span></button>
  <button class="tab-btn" id="tb-arc" onclick="goToArc()"><span class="tab-icon">&#9651;</span><span class="tab-label">Arc Tracker</span></button>
  <button class="tab-btn" id="tb-hub" onclick="goToHub()"><span class="tab-icon">&#9632;</span><span class="tab-label">Hub</span></button>
</div>

<div class="fab" id="fab" onclick="openDog(null)" style="display:none">+</div>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-hdr"><div class="drawer-title">Settings</div><button class="btn-icon" onclick="closeDrawer()">&times;</button></div>
    <div class="drawer-body">

      <div class="drawer-section-title">Signed In</div>
      <div class="user-line">Trainer<strong id="user-email">&mdash;</strong></div>

      <div class="drawer-section-title">Data</div>
      <button class="drawer-btn" onclick="exportData()"><span class="drawer-btn-icon">&#8595;</span> Export Backup</button>
      <button class="drawer-btn" onclick="manualPull()"><span class="drawer-btn-icon">&#8634;</span> Pull from Cloud</button>
      <button class="drawer-btn" onclick="doSignOut()"><span class="drawer-btn-icon">&#8594;</span> Sign Out</button>

      <div class="drawer-section-title">Storage</div>
      <div class="storage-info">
        Source of truth: <strong>Supabase</strong>.<br>
        <span style="color:#6F745C">Shared with Arc Tracker</span>
        <div class="sync-line"><span class="sync-mini-dot" id="sync-mini"></span><span id="sync-txt">Checking&hellip;</span></div>
      </div>

      <div class="drawer-section-title">About</div>
      <div class="storage-info"><strong>Steady Hand</strong><br>Dog Log v2<br><span style="color:#6F745C;font-size:14px">Surprise, AZ</span></div>
    </div>
  </div>
</div>

<!-- DOG MODAL -->
<div class="overlay" id="dog-modal"><div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-hdr"><div class="modal-title" id="dog-modal-title">NEW DOG</div><button class="btn-icon" onclick="closeDogModal()">&times;</button></div>
  <div class="modal-body">
    <div class="form-grid">
      <div class="form-group full"><label class="form-label">Name</label><input class="form-input" id="f-name" placeholder="Dog name"></div>
      <div class="form-group"><label class="form-label">Breed</label><input class="form-input" id="f-breed" placeholder="Breed"></div>
      <div class="form-group"><label class="form-label">Age</label><input class="form-input" id="f-age" placeholder="e.g. 2 yrs"></div>

        <select class="form-select" id="f-sex"><option value="">&mdash;</option><option>Male (intact)</option><option>Male (neutered)</option><option>Female (intact)</option><option>Female (spayed)</option></select>

        <select class="form-select" id="f-program"><option value="">&mdash;</option><option>Board &amp; Train</option><option>Day Training</option><option>Private Lessons</option><option>Group Class</option><option>Eval Only</option></select>

<!-- SESSION MODAL -->
<div class="overlay" id="sess-modal"><div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-hdr"><div class="modal-title">LOG SESSION</div><button class="btn-icon" onclick="closeSessModal()">&times;</button></div>
  <div class="modal-body">
    <div class="form-grid">
      <div class="form-group full"><label class="form-label">Handler</label><select class="form-select" id="s-handler"></select></div>
      <div class="form-group"><label class="form-label">Date</label><input class="form-input" id="s-date" type="date"></div>
      <div class="form-group"><label class="form-label">Focus</label><input class="form-input" id="s-focus" placeholder="e.g. Spatial intro"></div>

        <select class="form-select" id="s-channel"><option value="">&mdash;</option><option>Spatial</option><option>Verbal</option><option>Environmental</option><option>Internal</option></select>
      </div>
      <div class="form-group full"><label class="form-label">Notes</label><textarea class="form-textarea" id="s-notes" style="min-height:100px" placeholder="What happened..."></textarea></div>

      <button class="btn btn-sm" onclick="closeSessModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSession()">Save</button>
    </div>
  </div>
</div></div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   SUPABASE - same shared blob as Arc Tracker (app_key='arc_tracker')
   ═══════════════════════════════════════════════════════════════════════ */
var SUPABASE_URL = 'https://sltdnnspznasywppyred.supabase.co';
var SUPABASE_KEY = 'sb_publishable_5w00av0A8YlCdMh4o6_RmQ_f-cYBVc5';
var APP_KEY = 'arc_tracker';

var sb = null;
if (window.supabase && window.supabase.createClient) {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, storage: window.localStorage }
  });
}

var trainerId = null;
var trainerEmail = null;
var _pushTimer = null;
var _pushInFlight = false;

function setSync(state, note) {
  var dot = document.getElementById('sync-dot');
  var mini = document.getElementById('sync-mini');
  var txt = document.getElementById('sync-txt');
  if (dot) { dot.classList.remove('ok','saving','err'); if (state) dot.classList.add(state); }
  if (mini) { mini.classList.remove('ok','saving','err'); if (state) mini.classList.add(state); }
  if (txt) {
    if (state === 'ok') txt.textContent = 'Synced ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    else if (state === 'saving') txt.textContent = 'Saving...';
    else if (state === 'err') txt.textContent = 'Offline - cached locally' + (note ? ' (' + note + ')' : '');
    else txt.textContent = 'Checking...';
  }
}

async function pullFromCloud() {
  if (!sb || !trainerId) return null;
  try {
    var res = await sb.from('app_state').select('data').eq('app_key', APP_KEY).maybeSingle();
    if (res.error) { console.warn('pullFromCloud error', res.error); return null; }
    return (res.data && res.data.data) ? res.data.data : null;
  } catch(e) { console.warn('pullFromCloud exception', e); return null; }
}

async function pushToCloud() {
  if (!sb || !trainerId) return;
  if (_pushInFlight) { schedulePush(); return; }
  _pushInFlight = true;
  setSync('saving');
  try {
    var res = await sb.from('app_state').upsert({
      trainer_id: trainerId,
      app_key: APP_KEY,
      data: DB
    }, { onConflict: 'trainer_id,app_key' });
    _pushInFlight = false;
    if (res.error) { setSync('err', res.error.message); console.warn('push error', res.error); return; }
    setSync('ok');
  } catch(e) { _pushInFlight = false; setSync('err', e.message); console.warn('push exception', e); }
}

function schedulePush() {
  if (_pushTimer) clearTimeout(_pushTimer);
  _pushTimer = setTimeout(pushToCloud, 400);
}

function saveDB() {
  try { localStorage.setItem('shdt-unified', JSON.stringify(DB)); } catch(e){}
  schedulePush();
}

async function manualPull() {
  closeDrawer();
  var cloud = await pullFromCloud();
  if (cloud) {
    DB = normalizeDB(cloud);
    try { localStorage.setItem('shdt-unified', JSON.stringify(DB)); } catch(e){}
    renderAll();
    toast('Pulled from cloud');
    setSync('ok');
  } else {
    toast('Cloud is empty');
  }
}

async function doSignOut() {
  if (!sb) return;
  if (!confirm('Sign out? Your data stays in the cloud.')) return;
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

function goToHub() { window.location.href = 'index.html'; }
function goToArc() { window.location.href = 'arc-tracker.html'; }

/* ═══════════════════════════════════════════════════════════════════════
   DATA
   ═══════════════════════════════════════════════════════════════════════ */
var DB = { handlers: [], dogs: [], pairings: [] };
var editDogId = null;
var detailDogId = null;
var pairEditId = null;
var pairDogId = null;
var sessDogId = null;

function uid() { return Date.now().toString() + Math.floor(Math.random()*1000); }

function normalizeDB(d) {
  if (!d || typeof d !== 'object') d = {};
  if (!Array.isArray(d.handlers)) d.handlers = [];
  if (!Array.isArray(d.dogs))     d.dogs = [];
  if (!Array.isArray(d.pairings)) d.pairings = [];
  d.handlers.forEach(function(h){ if (!Array.isArray(h.sessions)) h.sessions = []; });
  return d;
}

async function loadDB() {
  var cloud = await pullFromCloud();
  if (cloud) {
    DB = normalizeDB(cloud);
    try { localStorage.setItem('shdt-unified', JSON.stringify(DB)); } catch(e){}
  } else {
    try {
      var raw = localStorage.getItem('shdt-unified');
      if (raw) DB = normalizeDB(JSON.parse(raw));
    } catch(e){}
  }
  renderAll();
  setSync('ok');
}

function handlerById(id) { return DB.handlers.find(function(h){return h.id===id;}); }
function dogById(id) { return DB.dogs.find(function(d){return d.id===id;}); }
function pairingById(id) { return DB.pairings.find(function(p){return p.id===id;}); }
function pairingsForDog(did) { return DB.pairings.filter(function(p){return p.dogId===did;}); }
function handlersForDog(did) {
  return pairingsForDog(did).map(function(p){return handlerById(p.handlerId);}).filter(Boolean);
}

function sessionsForDog(did) {
  // Sessions live on handlers. Collect sessions from all handlers paired with this dog.
  var handlerIds = pairingsForDog(did).map(function(p){return p.handlerId;});
  var out = [];
  handlerIds.forEach(function(hid){
    var h = handlerById(hid);
    if (!h || !h.sessions) return;
    h.sessions.forEach(function(s){
      out.push({ session: s, handler: h });
    });
  });
  out.sort(function(a,b){
    var da = a.session.date || ''; var db = b.session.date || '';
    return db.localeCompare(da);
  });
  return out;
}

/* ═══════════════════════════════════════════════════════════════════════
   VIEWS
   ═══════════════════════════════════════════════════════════════════════ */
function showView(name) {
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  var v = document.getElementById('view-'+name); if (v) v.classList.add('active');
  var b = document.getElementById('tb-'+name); if (b) b.classList.add('active');
  document.getElementById('fab').style.display = (name === 'dogs') ? 'flex' : 'none';
  if (name === 'dogs') renderDogs();
}

function backToDogs() {
  detailDogId = null;
  showView('dogs');
  document.getElementById('tb-dogs').classList.add('active');
}

function renderAll() { renderDogs(); if (detailDogId) renderDetail(detailDogId); }

function renderDogs() {
  document.getElementById('s-dogs').textContent = DB.dogs.length;
  document.getElementById('s-pairs').textContent = DB.pairings.length;
  var q = (document.getElementById('search').value || '').toLowerCase().trim();
  var wrap = document.getElementById('dog-wrap');
  if (!DB.dogs.length) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">&#9679;</div><div class="empty-title">No dogs yet</div><div class="empty-sub">Tap + to add</div></div>';
    return;
  }
  var filtered = DB.dogs.slice();
  if (q) {
    filtered = filtered.filter(function(d){
      var hs = handlersForDog(d.id).map(function(h){return h.name||'';}).join(' ').toLowerCase();
      return (d.name||'').toLowerCase().indexOf(q) >= 0
          || (d.breed||'').toLowerCase().indexOf(q) >= 0
          || hs.indexOf(q) >= 0;
    });
  }
  filtered.sort(function(a,b){return (a.name||'').localeCompare(b.name||'');});
  if (!filtered.length) {
    wrap.innerHTML = '<div class="empty"><div class="empty-title">No matches</div></div>';
    return;
  }
  wrap.innerHTML = '<div class="dog-grid">' + filtered.map(dogCardHTML).join('') + '</div>';
}

function dogCardHTML(d) {
  var handlers = handlersForDog(d.id);
  var names = handlers.length ? handlers.map(function(h){return esc(h.name||'');}).join(' &middot; ') : 'No handler attached';
  var s = '<div class="dog-card" onclick="showDetail(\''+d.id+'\')">';
  s += '<div class="card-name">'+esc(d.name||'Dog')+'</div>';
  s += '<div class="card-sub">'+esc(d.breed||'')+(d.age?' &middot; '+esc(d.age):'')+'</div>';
  s += '<div class="card-handlers">'+names+'</div>';
  s += '<div class="card-tags">';
  if (d.sex) s += '<span class="tag tag-sex">'+esc(d.sex)+'</span>';
  if (d.program) s += '<span class="tag tag-br">'+esc(d.program)+'</span>';
  s += '</div></div>';
  return s;
}

function showDetail(id) {
  detailDogId = id;
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  document.getElementById('view-detail').classList.add('active');
  document.getElementById('fab').style.display = 'none';
  renderDetail(id);
  window.scrollTo(0,0);
}

function renderDetail(id) {
  var d = dogById(id); if (!d) { backToDogs(); return; }
  var el = document.getElementById('detail-content');
  var pairings = pairingsForDog(id);
  var sessions = sessionsForDog(id);
  var html = '';

  html += '<div class="detail-head">';
  html += '<div><div class="detail-name">'+esc(d.name||'Dog')+'</div>';
  html += '<div class="detail-meta">'+esc(d.breed||'')+(d.age?' &middot; '+esc(d.age):'')+'</div></div>';
  html += '<div style="display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end">';
  html += '<button class="btn btn-sm" onclick="openDog(\''+id+'\')">Edit</button>';
  html += '<button class="btn btn-sm" onclick="openPair(\''+id+'\',null)">+ Handler</button>';
  html += '<button class="btn btn-primary btn-sm" onclick="openSess(\''+id+'\')">+ Session</button>';
  html += '</div></div>';

  html += '<div class="dtab-row">';
  html += '<button class="dtab active" id="dtab-ov" onclick="switchDTab(\'ov\')">Overview</button>';
  html += '<button class="dtab" id="dtab-hd" onclick="switchDTab(\'hd\')">Handlers ('+pairings.length+')</button>';
  html += '<button class="dtab" id="dtab-se" onclick="switchDTab(\'se\')">Sessions ('+sessions.length+')</button>';
  html += '</div>';

  // Overview
  html += '<div id="dc-ov">';
  html += '<div class="info-grid">';
  html += infoBlk('Breed', d.breed || '&mdash;');
  html += infoBlk('Age', d.age || '&mdash;');
  html += infoBlk('Sex', d.sex || '&mdash;');
  html += infoBlk('Program', d.program || '&mdash;');
  html += '</div>';
  if (d.notes) {
    html += '<div style="margin-top:16px"><div style="font-family:Cinzel,Georgia,serif;font-size:14px;letter-spacing:0.18em;color:#C8A96E;text-transform:uppercase;margin-bottom:8px">Notes</div><div style="font-size:14px;color:#F6F4F1;line-height:1.75">'+esc(d.notes)+'</div></div>';
  }
  html += '</div>';

  // Handlers tab
  html += '<div id="dc-hd" style="display:none">';
  if (!pairings.length) {
    html += '<div class="empty"><div class="empty-title">No handlers attached</div><div class="empty-sub">Tap + Handler to attach</div></div>';
  } else {
    pairings.forEach(function(p){
      var h = handlerById(p.handlerId); if (!h) return;
      html += '<div class="handler-card" onclick="openPair(\''+id+'\',\''+p.id+'\')">';
      html += '<div class="handler-head"><div class="handler-name">'+esc(h.name||'')+'</div>';
      if (p.matchScore) html += '<div class="handler-score">'+esc(p.matchScore)+'/10</div>';
      html += '</div>';
      if (h.profile) html += '<span class="tag tag-sex" style="display:inline-block;margin-bottom:6px">'+esc(h.profile)+'</span>';
      if (p.why) html += '<div class="handler-why">&ldquo;'+esc(p.why)+'&rdquo;</div>';
      html += '</div>';
    });
  }
  html += '</div>';

  // Sessions tab
  html += '<div id="dc-se" style="display:none">';
  if (!sessions.length) {
    html += '<div class="empty"><div class="empty-title">No sessions yet</div><div class="empty-sub">Tap + Session to log one</div></div>';
  } else {
    sessions.forEach(function(item){
      var s = item.session; var h = item.handler;
      html += '<div class="session-entry">';
      html += '<div class="session-head">';
      html += '<div class="session-date">'+(s.date||'')+(s.focus?' &mdash; '+esc(s.focus):'')+'</div>';
      html += '<div class="session-handler">'+esc(h.name||'')+'</div></div>';
      if (s.channel) html += '<span class="tag tag-br" style="display:inline-block;margin-bottom:7px">'+esc(s.channel)+'</span>';
      html += '<div class="session-text">'+esc(s.notes||'')+'</div></div>';
    });
  }
  html += '</div>';

  el.innerHTML = html;
}

function infoBlk(lbl, val) {
  return '<div class="info-blk"><div class="info-lbl">'+lbl+'</div><div class="info-val">'+val+'</div></div>';
}

function switchDTab(name) {
  ['ov','hd','se'].forEach(function(t){
    var btn = document.getElementById('dtab-'+t);
    var cont = document.getElementById('dc-'+t);
    if (!btn || !cont) return;
    if (t===name) { btn.classList.add('active'); cont.style.display='block'; }
    else { btn.classList.remove('active'); cont.style.display='none'; }
  });
}

/* ═══════════════════════════════════════════════════════════════════════
   DOG CRUD
   ═══════════════════════════════════════════════════════════════════════ */
function openDog(id) {
  editDogId = id || null;
  var d = id ? dogById(id) : null;
  document.getElementById('dog-modal-title').textContent = d ? 'EDIT DOG' : 'NEW DOG';
  document.getElementById('btn-del-dog').style.display = d ? 'inline-flex' : 'none';
  document.getElementById('f-name').value = d ? (d.name||'') : '';
  document.getElementById('f-breed').value = d ? (d.breed||'') : '';
  document.getElementById('f-age').value = d ? (d.age||'') : '';
  document.getElementById('f-sex').value = d ? (d.sex||'') : '';
  document.getElementById('f-program').value = d ? (d.program||'') : '';
  document.getElementById('f-notes').value = d ? (d.notes||'') : '';
  document.getElementById('dog-modal').classList.add('open');
}
function closeDogModal() { document.getElementById('dog-modal').classList.remove('open'); editDogId = null; }

function saveDog() {
  var name = document.getElementById('f-name').value.trim();
  if (!name) { toast('Name required'); return; }
  var payload = {
    name: name,
    breed: document.getElementById('f-breed').value.trim(),
    age: document.getElementById('f-age').value.trim(),
    sex: document.getElementById('f-sex').value,
    program: document.getElementById('f-program').value,
    notes: document.getElementById('f-notes').value.trim()
  };
  if (editDogId) {
    var ex = dogById(editDogId);
    if (ex) { for (var k in payload) ex[k] = payload[k]; }
    toast('Dog updated');
  } else {
    payload.id = uid();
    payload.created = new Date().toISOString();
    DB.dogs.push(payload);
    toast('Dog added');
  }
  saveDB(); closeDogModal(); renderAll();
}

function deleteDog() {
  if (!editDogId) return;
  var d = dogById(editDogId);
  if (!confirm('Delete '+(d?d.name:'this dog')+'? All pairings will also be removed.')) return;
  DB.pairings = DB.pairings.filter(function(p){return p.dogId !== editDogId;});
  DB.dogs = DB.dogs.filter(function(x){return x.id !== editDogId;});
  saveDB(); closeDogModal(); backToDogs(); toast('Deleted');
}

/* ═══════════════════════════════════════════════════════════════════════
   PAIRINGS
   ═══════════════════════════════════════════════════════════════════════ */
function openPair(dogId, pairId) {
  pairDogId = dogId;
  pairEditId = pairId;
  var p = pairId ? pairingById(pairId) : null;
  document.getElementById('pair-title').textContent = p ? 'EDIT PAIRING' : 'ATTACH HANDLER';
  document.getElementById('btn-del-pair').style.display = p ? 'inline-flex' : 'none';

  var sel = document.getElementById('p-handler');
  var alreadyAttached = DB.pairings.filter(function(pp){return pp.dogId===dogId && (!p || pp.id!==p.id);}).map(function(pp){return pp.handlerId;});
  var options = '';
  DB.handlers.forEach(function(h){
    if (alreadyAttached.indexOf(h.id) >= 0) return;
    options += '<option value="'+h.id+'">'+esc(h.name||'')+'</option>';
  });
  if (!options) options = '<option value="">No unattached handlers available</option>';
  sel.innerHTML = options;
  if (p) sel.value = p.handlerId;

  document.getElementById('p-score').value = p ? (p.matchScore||'') : '';
  document.getElementById('p-why').value = p ? (p.why||'') : '';
  document.getElementById('p-notes').value = p ? (p.matchNotes||'') : '';
  document.getElementById('p-wins').value = p ? (p.wins||[]).join('\n') : '';
  document.getElementById('p-risks').value = p ? (p.risks||[]).join('\n') : '';
  document.getElementById('pair-modal').classList.add('open');
}

function closePairModal() { document.getElementById('pair-modal').classList.remove('open'); pairEditId=null; pairDogId=null; }

function savePair() {
  if (!pairDogId) return;
  var handlerId = document.getElementById('p-handler').value;
  if (!handlerId) { toast('Handler required'); return; }
  var wins = document.getElementById('p-wins').value.split('\n').map(function(s){return s.trim();}).filter(Boolean);
  var risks = document.getElementById('p-risks').value.split('\n').map(function(s){return s.trim();}).filter(Boolean);
  if (pairEditId) {
    var ex = pairingById(pairEditId);
    if (ex) {
      ex.handlerId = handlerId;
      ex.matchScore = document.getElementById('p-score').value;
      ex.why = document.getElementById('p-why').value.trim();
      ex.matchNotes = document.getElementById('p-notes').value.trim();
      ex.wins = wins; ex.risks = risks;
    }
    toast('Pairing updated');
  } else {
    DB.pairings.push({
      id: uid(), handlerId: handlerId, dogId: pairDogId,
      matchScore: document.getElementById('p-score').value,
      why: document.getElementById('p-why').value.trim(),
      matchNotes: document.getElementById('p-notes').value.trim(),
      wins: wins, risks: risks, created: new Date().toISOString()
    });
    toast('Handler attached');
  }
  saveDB(); closePairModal(); renderAll();
}

function deletePair() {
  if (!pairEditId) return;
  if (!confirm('Unpair this handler? Handler and dog records remain.')) return;
  DB.pairings = DB.pairings.filter(function(p){return p.id !== pairEditId;});
  saveDB(); closePairModal(); renderAll(); toast('Unpaired');
}

/* ═══════════════════════════════════════════════════════════════════════
   SESSIONS (saved to the handler)
   ═══════════════════════════════════════════════════════════════════════ */
function openSess(dogId) {
  sessDogId = dogId;
  var handlers = handlersForDog(dogId);
  if (!handlers.length) { toast('Attach a handler first'); return; }
  var sel = document.getElementById('s-handler');
  sel.innerHTML = handlers.map(function(h){return '<option value="'+h.id+'">'+esc(h.name||'')+'</option>';}).join('');
  document.getElementById('s-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('s-focus').value = '';
  document.getElementById('s-channel').value = '';
  document.getElementById('s-notes').value = '';
  document.getElementById('sess-modal').classList.add('open');
}
function closeSessModal() { document.getElementById('sess-modal').classList.remove('open'); sessDogId = null; }

function saveSession() {
  var hid = document.getElementById('s-handler').value;
  var notes = document.getElementById('s-notes').value.trim();
  if (!notes) { toast('Notes required'); return; }
  var h = handlerById(hid); if (!h) return;
  if (!h.sessions) h.sessions = [];
  h.sessions.push({
    id: uid(),
    date: document.getElementById('s-date').value,
    focus: document.getElementById('s-focus').value.trim(),
    channel: document.getElementById('s-channel').value,
    notes: notes
  });
  saveDB(); closeSessModal(); renderAll(); toast('Session saved');
}

/* ═══════════════════════════════════════════════════════════════════════
   UTILS
   ═══════════════════════════════════════════════════════════════════════ */
function openDrawer() { document.getElementById('drawer-overlay').classList.add('open'); }
function closeDrawer() { document.getElementById('drawer-overlay').classList.remove('open'); }

function exportData() {
  closeDrawer();
  var a = document.createElement('a');
  a.setAttribute('href','data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(DB,null,2)));
  a.setAttribute('download','shdt-doglog-'+new Date().toISOString().split('T')[0]+'.json');
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function esc(s) { if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg) { var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(function(){el.classList.remove('show');},2800); }

/* ═══════════════════════════════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════════════════════════════ */
async function boot() {
  var msg = document.getElementById('boot-msg');
  if (!sb) { msg.textContent = 'SDK failed to load'; return; }
  try {
    var res = await sb.auth.getSession();
    if (!res.data || !res.data.session) {
      window.location.href = 'index.html';
      return;
    }
    trainerId = res.data.session.user.id;
    trainerEmail = res.data.session.user.email;
    var emailEl = document.getElementById('user-email');
    if (emailEl) emailEl.textContent = trainerEmail;

    msg.textContent = 'Loading data...';
    await loadDB();

    document.getElementById('app-banner').style.display = 'flex';
    document.getElementById('app-main').style.display = 'block';
    document.getElementById('tab-bar').style.display = 'flex';
    document.getElementById('fab').style.display = 'flex';
    document.getElementById('boot-screen').style.display = 'none';
  } catch(e) {
    msg.textContent = 'Error: ' + e.message;
    console.error('boot error', e);
  }
}

boot();
</script>
