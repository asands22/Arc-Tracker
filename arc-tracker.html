<style>
:root{--bg:#1E1E1E;--surface:#26261F;--border:#3A3A32;--olive:#6F745C;--cream:#F6F4F1;--muted:#9A9686;--brass:#C8A96E}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--bg);color:var(--cream);font-family:"Raleway",sans-serif;min-height:100vh;font-size:15px}
body{padding:20px 16px 40px}
.wrap{max-width:720px;margin:0 auto}
h1{font-family:"Cinzel",serif;font-size:18px;letter-spacing:.18em;color:var(--brass);text-transform:uppercase;text-align:center;margin-bottom:6px}
.sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:8px}
.sub2{font-size:13px;color:var(--olive);text-align:center;margin-bottom:20px;font-style:italic}

.copy-btn:active,.copy-btn.copied{background:var(--brass);color:var(--bg);transform:scale(.98)}
.copy-btn:disabled{opacity:.5;cursor:wait}
.hint{text-align:center;font-size:14px;color:var(--muted);margin:14px 0 20px;line-height:1.6}
.hint strong{color:var(--brass)}
.meta{display:flex;gap:14px;justify-content:center;font-size:13px;color:var(--muted);margin-bottom:16px;flex-wrap:wrap}
.meta span{background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:4px}
.meta strong{color:var(--brass);font-family:"JetBrains Mono",monospace}
.preview{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;max-height:40vh;overflow:auto;font-family:"JetBrains Mono",monospace;font-size:12px;line-height:1.5;color:var(--muted);white-space:pre;word-break:normal}
.status{text-align:center;font-size:14px;color:var(--olive);margin:12px 0;font-family:"Cinzel",serif;letter-spacing:.12em;text-transform:uppercase}
.status.ready{color:var(--brass)}
.status.error{color:#B05A4A}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--brass);color:var(--bg);padding:14px 24px;border-radius:8px;font-family:"Cinzel",serif;font-size:15px;letter-spacing:.1em;text-transform:uppercase;transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:100}
.toast.show{transform:translateX(-50%) translateY(0)}

<script>
let SRC = "";
let ready = false;

function decodeSource() {
  try {
    const b64 = document.getElementById("src-b64").textContent.trim();
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    SRC = new TextDecoder("utf-8").decode(bytes);
    ready = true;
    const btn = document.getElementById("copyBtn");
    btn.disabled = false;
    btn.textContent = "Copy HTML to Clipboard";
    document.getElementById("status").textContent = "Ready — tap to copy";
    document.getElementById("status").className = "status ready";
    // Show first 2000 chars as preview
    const prev = SRC.slice(0, 2000) + (SRC.length > 2000 ? "\n\n... (" + (SRC.length - 2000) + " more chars)" : "");
    document.getElementById("preview").textContent = prev;
  } catch (e) {
    document.getElementById("status").textContent = "Decode failed: " + e.message;
    document.getElementById("status").className = "status error";
  }
}

async function copyIt() {
  if (!ready) return;
  const btn = document.getElementById("copyBtn");
  const t = document.getElementById("toast");
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(SRC);
    } else {
      const ta = document.createElement("textarea");
      ta.value = SRC;
      ta.style.position = "fixed";
      ta.style.top = "-1000px";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
    btn.classList.add("copied");
    btn.textContent = "Copied";
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1800);
    setTimeout(() => { btn.classList.remove("copied"); btn.textContent = "Copy HTML to Clipboard"; }, 2600);
  } catch (e) {
    alert("Copy failed: " + e.message);
  }
}

// Kick off decode on load
decodeSource();
</script>
