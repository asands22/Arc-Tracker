<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1E1E1E">
<title>SHDT - Supabase Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Raleway:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1E1E1E;
    --surface: #26261F;
    --surface-hi: #2E2E26;
    --border: #3A3A32;
    --border-hi: #4A4A40;
    --olive: #6F745C;
    --olive-hi: #878D70;
    --olive-dim: #6F745C33;
    --cream: #F6F4F1;
    --muted: #9A9686;
    --subtle: #6B685E;
    --brass: #C8A96E;
    --brass-dim: #C8A96E33;
    --success: #7FA86B;
    --error: #B05A4A;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Raleway', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    min-height: 100dvh;
  }
  body {
    padding: 24px 16px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .wrap {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

/* ── HEADER ───────────────────────────────────────────────────── */
.brand {
text-align: center;
padding: 8px 0 4px;
}
.brand-title {
font-family: ‘Cinzel’, serif;
font-size: 20px;
font-weight: 600;
letter-spacing: 0.22em;
color: var(–brass);
text-transform: uppercase;
margin-bottom: 4px;
}
.brand-sub {
font-size: 14px;
color: var(–muted);
letter-spacing: 0.08em;
text-transform: uppercase;
}

/* ── CARD ─────────────────────────────────────────────────────── */
.card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 24px 20px;
animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes slideIn {
from { opacity: 0; transform: translateY(8px); }
to   { opacity: 1; transform: translateY(0); }
}
.card-title {
font-family: ‘Cinzel’, serif;
font-size: 15px;
letter-spacing: 0.18em;
color: var(–brass);
text-transform: uppercase;
margin-bottom: 18px;
padding-bottom: 12px;
border-bottom: 1px solid var(–border);
}

/* ── FORMS ────────────────────────────────────────────────────── */
.field {
margin-bottom: 16px;
}
.label {
display: block;
font-family: ‘Cinzel’, serif;
font-size: 14px;
color: var(–muted);
letter-spacing: 0.14em;
text-transform: uppercase;
margin-bottom: 8px;
}
.input {
width: 100%;
padding: 14px 16px;
background: var(–bg);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–cream);
font-family: ‘Raleway’, sans-serif;
font-size: 16px;
transition: all 0.2s ease;
}
.input:focus {
outline: none;
border-color: var(–olive-hi);
box-shadow: 0 0 0 3px var(–olive-dim);
}
.input::placeholder { color: var(–subtle); }

/* ── BUTTON ──────────────────────────────────────────────────── */
.btn {
display: block;
width: 100%;
padding: 16px 20px;
background: var(–olive);
color: var(–cream);
border: none;
border-radius: 8px;
font-family: ‘Cinzel’, serif;
font-size: 15px;
font-weight: 500;
letter-spacing: 0.2em;
text-transform: uppercase;
cursor: pointer;
transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
box-shadow: 0 4px 14px rgba(111, 116, 92, 0.25);
}
.btn:hover, .btn:active {
background: var(–olive-hi);
transform: translateY(-1px);
box-shadow: 0 6px 18px rgba(111, 116, 92, 0.35);
}
.btn:disabled {
opacity: 0.5;
cursor: not-allowed;
transform: none;
}
.btn.secondary {
background: transparent;
border: 1px solid var(–border-hi);
color: var(–muted);
box-shadow: none;
}
.btn.secondary:hover, .btn.secondary:active {
border-color: var(–brass);
color: var(–brass);
background: var(–brass-dim);
}

/* ── STATUS ───────────────────────────────────────────────────── */
.status {
display: flex;
align-items: flex-start;
gap: 12px;
padding: 14px 16px;
border-radius: 8px;
font-size: 14px;
line-height: 1.6;
margin-top: 12px;
animation: slideIn 0.3s ease;
}
.status-dot {
width: 10px;
height: 10px;
border-radius: 50%;
margin-top: 5px;
flex-shrink: 0;
}
.status.success {
background: rgba(127, 168, 107, 0.12);
border: 1px solid rgba(127, 168, 107, 0.3);
color: var(–success);
}
.status.success .status-dot { background: var(–success); box-shadow: 0 0 8px var(–success); }
.status.error {
background: rgba(176, 90, 74, 0.12);
border: 1px solid rgba(176, 90, 74, 0.3);
color: var(–error);
}
.status.error .status-dot { background: var(–error); }
.status.neutral {
background: var(–olive-dim);
border: 1px solid var(–border);
color: var(–muted);
}
.status.neutral .status-dot { background: var(–muted); }

/* ── DATA DISPLAY ─────────────────────────────────────────────── */
.data-row {
padding: 12px 0;
border-bottom: 1px solid var(–border);
display: flex;
flex-direction: column;
gap: 4px;
}
.data-row:last-child { border-bottom: none; }
.data-key {
font-family: ‘Cinzel’, serif;
font-size: 14px;
letter-spacing: 0.14em;
color: var(–muted);
text-transform: uppercase;
}
.data-value {
font-family: ‘JetBrains Mono’, monospace;
font-size: 14px;
color: var(–cream);
word-break: break-all;
}

/* ── SPINNER ──────────────────────────────────────────────────── */
.spinner {
display: inline-block;
width: 16px;
height: 16px;
border: 2px solid var(–brass-dim);
border-top-color: var(–brass);
border-radius: 50%;
animation: spin 0.7s linear infinite;
vertical-align: -3px;
margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TEST CHECKLIST ───────────────────────────────────────────── */
.test-list {
list-style: none;
padding: 0;
margin: 0;
}
.test-item {
display: flex;
align-items: center;
gap: 12px;
padding: 10px 0;
font-size: 14px;
color: var(–muted);
}
.test-item .tick {
width: 22px;
height: 22px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
font-size: 14px;
font-weight: 700;
transition: all 0.3s ease;
}
.test-item .tick.pending {
background: var(–bg);
border: 1px solid var(–border);
color: var(–subtle);
}
.test-item .tick.pass {
background: var(–success);
color: var(–bg);
box-shadow: 0 0 12px rgba(127, 168, 107, 0.5);
}
.test-item .tick.fail {
background: var(–error);
color: var(–cream);
}
.test-item.passed { color: var(–cream); }

/* ── HIDE / SHOW ──────────────────────────────────────────────── */
.hidden { display: none !important; }

.foot {
text-align: center;
font-size: 14px;
color: var(–subtle);
padding: 16px 0 0;
letter-spacing: 0.06em;
}
</style>

</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="brand-title">Steady Hand</div>
    <div class="brand-sub">Supabase Connection Test</div>
  </div>

<!-- Supabase UMD bundle: exposes window.supabase with createClient() -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// Catch any silent errors and display them on-page
window.addEventListener('error', function(e) {
  var err = e.error || e.message || 'Unknown error';
  var box = document.getElementById('errBox');
  if (box) {
    box.innerHTML = '<div class="status error"><div class="status-dot"></div><div><strong>Script error:</strong><br>' + (err.stack || err.toString()) + '</div></div>';
    box.style.display = 'block';
  }
});
window.addEventListener('unhandledrejection', function(e) {
  var err = e.reason || 'Unknown promise rejection';
  var box = document.getElementById('errBox');
  if (box) {
    box.innerHTML = '<div class="status error"><div class="status-dot"></div><div><strong>Promise error:</strong><br>' + (err.stack || err.toString()) + '</div></div>';
    box.style.display = 'block';
  }
});

// Verify supabase global loaded before we use it
if (typeof window.supabase === 'undefined' || typeof window.supabase.createClient === 'undefined') {
  document.addEventListener('DOMContentLoaded', function() {
    var box = document.getElementById('errBox');
    if (box) {
      box.innerHTML = '<div class="status error"><div class="status-dot"></div><div><strong>Supabase SDK failed to load.</strong><br>The CDN script tag did not execute. Try opening this file in Safari directly instead of the Claude app viewer.</div></div>';
      box.style.display = 'block';
    }
  });
}

var SUPABASE_URL = 'https://sltdnnspznasywppyred.supabase.co';
var SUPABASE_KEY = 'sb_publishable_5w00av0A8YlCdMh4o6_RmQ_f-cYBVc5';

// Guard: only initialise if the global is there
var db = null;
if (window.supabase && window.supabase.createClient) {
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      storage: window.localStorage
    }
  });
}

// ──────────────────────────────────────────────────────────
// UI helpers
// ──────────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }

function showStatus(containerId, kind, message) {
  const container = $(containerId);
  container.innerHTML =
    '<div class="status ' + kind + '">' +
      '<div class="status-dot"></div>' +
      '<div>' + message + '</div>' +
    '</div>';
}

function clearStatus(containerId) { $(containerId).innerHTML = ''; }

function markTest(id, state, note) {
  const item = $(id);
  if (!item) return;
  const tick = item.querySelector('.tick');
  tick.classList.remove('pending', 'pass', 'fail');
  if (state === 'pass')      { tick.classList.add('pass'); tick.textContent = '+'; item.classList.add('passed'); }
  else if (state === 'fail') { tick.classList.add('fail'); tick.textContent = 'x'; item.classList.remove('passed'); }
  else                       { tick.classList.add('pending'); tick.textContent = '-'; item.classList.remove('passed'); }
  if (note) {
    let sub = item.querySelector('.note');
    if (!sub) {
      sub = document.createElement('div');
      sub.className = 'note';
      sub.style.cssText = 'font-size:14px;color:var(--subtle);margin-top:4px';
      item.querySelector('div:last-child').appendChild(document.createElement('br'));
      item.querySelector('div:last-child').appendChild(sub);
    }
    sub.textContent = note;
  }
}

function switchView(view) {
  $('loginView').classList.toggle('hidden', view !== 'login');
  $('authedView').classList.toggle('hidden', view !== 'authed');
}

// ──────────────────────────────────────────────────────────
// Sign in / sign out
// ──────────────────────────────────────────────────────────
window.signIn = async function signIn() {
  if (!db) { showStatus('loginStatus','error','Supabase SDK not loaded. Open this page in Safari (not the Claude app viewer).'); return; }
  const email = $('email').value.trim();
  const password = $('password').value;
  const btn = $('signInBtn');

  if (!email || !password) {
    showStatus('loginStatus', 'error', 'Enter email and password.');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in...';
  clearStatus('loginStatus');

  const { data, error } = await db.auth.signInWithPassword({ email, password });

  btn.disabled = false;
  btn.textContent = 'Sign In';

  if (error) {
    showStatus('loginStatus', 'error', 'Sign in failed: ' + error.message);
    return;
  }

  // Success - switch to authed view and run the tests
  switchView('authed');
  await runTests();
};

window.signOut = async function signOut() {
  await db.auth.signOut();
  switchView('login');
  $('email').value = '';
  $('password').value = '';
  ['test1','test2','test3','test4'].forEach(id => markTest(id, 'pending'));
  $('resultBlock').innerHTML = '';
};

// ──────────────────────────────────────────────────────────
// The actual backbone check
// ──────────────────────────────────────────────────────────
window.runTests = async function runTests() {
  ['test1','test2','test3','test4'].forEach(id => markTest(id, 'pending'));
  $('resultBlock').innerHTML = '';

  // Test 1: session valid
  const { data: sessionData, error: sessionError } = await db.auth.getSession();
  const session = sessionData && sessionData.session;
  if (!session) {
    markTest('test1', 'fail', 'No active session');
    return;
  }
  markTest('test1', 'pass', session.user.email);
  const userId = session.user.id;

  // Test 2: read trainer row
  const { data: trainers, error: trainerError } = await db
    .from('trainers')
    .select('id, email, full_name, company_name, created_at');

  if (trainerError) {
    markTest('test2', 'fail', trainerError.message);
    return;
  }
  if (!trainers || trainers.length === 0) {
    markTest('test2', 'fail', 'No rows returned - RLS may be blocking or trigger failed');
    return;
  }
  markTest('test2', 'pass', trainers.length + ' row(s) visible');

  // Test 3: id match
  const myRow = trainers[0];
  if (myRow.id === userId) {
    markTest('test3', 'pass', 'auth.uid matches trainers.id');
  } else {
    markTest('test3', 'fail', 'Mismatch: ' + myRow.id + ' vs ' + userId);
  }

  // Test 4: RLS on other tables
  const { data: clients, error: clientsError } = await db
    .from('clients')
    .select('id');

  if (clientsError) {
    markTest('test4', 'fail', clientsError.message);
  } else {
    markTest('test4', 'pass', 'clients query returned ' + (clients ? clients.length : 0) + ' rows (expected 0)');
  }

  // Render the trainer row
  const rowHtml =
    '<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:8px">' +
      '<div style="font-family:Cinzel,serif;font-size:14px;color:var(--brass);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:12px">Your Trainer Row</div>' +
      '<div class="data-row"><div class="data-key">id</div><div class="data-value">' + myRow.id + '</div></div>' +
      '<div class="data-row"><div class="data-key">email</div><div class="data-value">' + (myRow.email || '-') + '</div></div>' +
      '<div class="data-row"><div class="data-key">full_name</div><div class="data-value">' + (myRow.full_name || '<em style="color:var(--subtle)">null</em>') + '</div></div>' +
      '<div class="data-row"><div class="data-key">company_name</div><div class="data-value">' + (myRow.company_name || '-') + '</div></div>' +
      '<div class="data-row"><div class="data-key">created_at</div><div class="data-value">' + (myRow.created_at || '-') + '</div></div>' +
    '</div>';
  $('resultBlock').innerHTML = rowHtml;
};

// ──────────────────────────────────────────────────────────
// On load: check for existing session
// ──────────────────────────────────────────────────────────
(async function init() {
  const { data } = await db.auth.getSession();
  if (data && data.session) {
    switchView('authed');
    await runTests();
  } else {
    switchView('login');
  }
})();
</script>
