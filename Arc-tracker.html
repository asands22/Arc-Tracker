<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Arc Tracker - Steady Hand</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0e;--card:#1a1a18;--card2:#222220;--border:#2e2e2a;
  --olive:#6F745C;--cream:#F6F4F1;--gold:#c8a96e;
  --muted:#8a8a7a;--red:#c25c3a;--green:#7aaa72;--text:#e8e4dc;
}
html,body{background:var(--bg);color:var(--text);font-family:'Raleway',sans-serif;min-height:100vh;font-size:14px}
input,textarea,select{
  background:var(--card2);color:var(--text);border:1px solid var(--border);
  border-radius:4px;padding:9px 12px;font-family:'Raleway',sans-serif;font-size:14px;
  outline:none;width:100%;display:block;-webkit-appearance:none;
}
input:focus,textarea:focus,select:focus{border-color:var(--gold)}
select option{background:var(--card)}
textarea{resize:vertical;min-height:70px}
button{cursor:pointer;font-family:'Raleway',sans-serif;border:none;outline:none;font-size:14px;background:none}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:14px 16px}
.card.glow{border-color:var(--gold);box-shadow:0 0 16px rgba(200,169,110,.1)}
.st{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;margin-bottom:12px}
.lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 16px;border-radius:4px;font-size:13px;font-weight:500;transition:all .18s;cursor:pointer;border:1px solid var(--border);color:var(--text);background:var(--border)}
.btn-gold{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.btn-olive{background:var(--olive);color:var(--cream);border-color:var(--olive)}
.btn-ghost{background:transparent;color:var(--muted);border-color:var(--border)}
.btn-danger{background:transparent;color:var(--red);border-color:var(--red)}
.btn-sm{padding:5px 11px;font-size:12px}
.pill{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border);color:var(--muted);background:transparent}
.pill.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.acc-card{background:var(--card);border:1px solid var(--border);border-radius:6px;margin-bottom:10px;overflow:hidden;transition:border-color .25s}
.acc-card.open{border-color:var(--gold)}
.acc-header{cursor:pointer;padding:14px 16px;user-select:none}
.acc-chev{display:inline-block;transition:transform .3s;color:var(--muted);font-size:12px;margin-left:6px;vertical-align:middle}
.acc-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.acc-body.open{max-height:9000px}
.tab-bar{display:flex;border-top:1px solid var(--border);border-bottom:1px solid var(--border);overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:1;padding:10px 6px;font-size:12px;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;font-family:'Raleway',sans-serif;text-align:center;background:none;transition:all .2s}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-pane{display:none;padding:16px 16px 20px}
.tab-pane.active{display:block}
.star{font-size:20px;cursor:pointer;color:var(--border)}
.star.on{color:var(--gold)}
input[type=range]{padding:0;border:none;background:none;width:100%;accent-color:var(--gold);cursor:pointer}
#nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100}
.nb{flex:1;padding:11px 0 9px;color:var(--muted);border-top:2px solid transparent;text-align:center;background:none;border-left:none;border-right:none;border-bottom:none;transition:all .2s}
.nb.active{color:var(--gold);border-top-color:var(--gold)}
.nb-icon{font-size:17px}
.nb-label{font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:.08em;margin-top:2px}
#toast{position:fixed;bottom:80px;right:14px;background:var(--olive);color:var(--cream);font-size:12px;padding:5px 13px;border-radius:20px;pointer-events:none;z-index:200;opacity:0;transition:opacity .3s}
#toast.show{opacity:1}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.row{display:flex;align-items:center}
.jb{justify-content:space-between}
.wrap{flex-wrap:wrap}
.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}
.mt10{margin-top:10px}.mt12{margin-top:12px}
.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}
.badge{font-size:11px;padding:2px 7px;border-radius:8px;background:var(--border);color:var(--muted);margin-left:4px}
.pbar{height:3px;background:var(--border);border-radius:2px}
.pbar-fill{height:100%;border-radius:2px;transition:width .4s}
.stat-card{text-align:center;padding:11px 8px;cursor:pointer;transition:border-color .2s}
.stat-card.active{border-color:var(--gold) !important}
.state-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.eval-opt{padding:9px 13px;border-radius:4px;border:1px solid var(--border);font-size:13px;cursor:pointer;text-align:left;color:var(--muted);background:transparent;width:100%;display:block;margin-bottom:6px;font-family:'Raleway',sans-serif}
.eval-opt.sel{border-color:var(--gold);color:var(--gold);background:rgba(200,169,110,.08)}
.eval-result{border-left:3px solid var(--gold);padding:12px 14px;background:rgba(200,169,110,.06);border-radius:0 4px 4px 0}
</style>
</head>
<body>

<div style="background:var(--card);border-bottom:1px solid var(--border);padding:13px 16px 11px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50">
  <div>
    <div style="font-family:'Cinzel',serif;font-size:16px;color:var(--cream);letter-spacing:.12em">STEADY HAND</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.18em;margin-top:1px">HANDLER INDEX ARC TRACKER</div>
  </div>
  <div class="row gap8">
    <button class="btn btn-ghost btn-sm" onclick="exportData()">Export</button>
    <label style="display:inline-flex;cursor:pointer">
      <button class="btn btn-ghost btn-sm" type="button" onclick="this.closest('label').querySelector('input').click()">Import</button>
      <input type="file" accept=".json" onchange="importData(event)" style="display:none;width:1px;opacity:0">
    </label>
  </div>
</div>

<div id="toast">Saved</div>

<div id="page-clients" class="page" style="padding:14px 14px 90px;max-width:640px;margin:0 auto">
  <div class="row gap8 mb12">
    <input id="search" placeholder="Search handlers or dogs" oninput="renderClients()" style="flex:1">
    <button class="btn btn-gold" onclick="addClient()">+ New</button>
  </div>
  <div id="stats-strip" class="g3 mb12" style="display:none"></div>
  <div id="client-list"></div>
</div>

<div id="page-eval" class="page" style="display:none;padding:14px 14px 90px;max-width:640px;margin:0 auto"></div>
<div id="page-diagnose" class="page" style="display:none;padding:14px 14px 90px;max-width:640px;margin:0 auto"></div>
<div id="page-reference" class="page" style="display:none;padding:14px 14px 90px;max-width:640px;margin:0 auto"></div>

<div id="nav">
  <button class="nb active" onclick="showPage('clients',this)">
    <div class="nb-icon">&#9425;</div>
    <div class="nb-label">Clients</div>
  </button>
  <button class="nb" onclick="showPage('eval',this)">
    <div class="nb-icon">&#9672;</div>
    <div class="nb-label">Eval</div>
  </button>
  <button class="nb" onclick="showPage('diagnose',this)">
    <div class="nb-icon">&#9678;</div>
    <div class="nb-label">Diagnose</div>
  </button>
  <button class="nb" onclick="showPage('reference',this)">
    <div class="nb-icon">&#8801;</div>
    <div class="nb-label">Reference</div>
  </button>
</div>

<script>
var CH = ["Spatial","Verbal","Environmental","Internal"];

var COMPASS = [
  {key:"ER", label:"Emotional Regulation", low:"Frustration leaking",    high:"Neutral regardless"},
  {key:"T",  label:"Timing and Pacing",     low:"Late or early",           high:"Pre-decision tension"},
  {key:"CC", label:"Correction Confidence", low:"Hesitating/apologizing", high:"Clean, proportionate"},
  {key:"CO", label:"Consistency",           low:"Rules shift with state",  high:"Same boundary, every time"},
  {key:"IN", label:"Intentionality",        low:"Going through motions",   high:"Every action has purpose"}
];

var CMAX = COMPASS.length * 5;
var CHECKPOINTS = ["Intake","Day 25","Day 60","Day 84"];
var PROFILES = ["Reactive","Rigid","Avoidant","Passive","Imp. Reactive","Imp. Rigid","Imp. Avoidant","Imp. Passive","Attuned"];

var PNOTES = {
  "Reactive":      "High ER volatility. Lead with Spatial channel stability before verbal work.",
  "Rigid":         "Low CO flexibility. Introduce Environmental variation carefully. Don't disrupt the structure - redirect it.",
  "Avoidant":      "Ghost channel dominant in self-awareness. Introduce vocabulary before reps.",
  "Passive":       "Low IN and CC. Accountability framing required. The dog is doing all the work.",
  "Imp. Reactive": "Reactive profile with Attuned flashes. Protect the glimpses.",
  "Imp. Rigid":    "Rigid profile with emerging flexibility. Don't over-praise the bend.",
  "Imp. Avoidant": "Avoidant profile with growing vocabulary. Ghost channel named but not yet integrated.",
  "Imp. Passive":  "Passive profile activating. Watch for CC jumps - they can overcorrect.",
  "Attuned":       "All channels load-bearing. Compass scores consistent across states. The dog confirms it."
};

var EXERCISES = [
  {id:"e1", name:"Attention Threshold Walk",   ch:"Spatial",       desc:"Handler maintains spatial position while dog self-regulates to threshold distance. No verbal cues."},
  {id:"e2", name:"One-Word Rule",               ch:"Verbal",        desc:"Handler allowed one word per 30 seconds. Tracks verbal load vs dog compliance rate."},
  {id:"e3", name:"Environmental Exposure Set",  ch:"Environmental", desc:"Controlled introduction to novel stimuli. Handler reads dog state before advancing."},
  {id:"e4", name:"Silent Correction Drill",     ch:"Internal",      desc:"Handler corrects without verbal or spatial escalation. Internal regulation only."},
  {id:"e5", name:"Boundary Hold",               ch:"Spatial",       desc:"Static boundary drill. Handler holds position regardless of dog pressure. Measures ER under load."},
  {id:"e6", name:"Recovery Window Tracking",    ch:"Internal",      desc:"Track time from peak arousal to baseline. Handler role: stabilize, not escalate."},
  {id:"e7", name:"Parallel Walk",               ch:"Spatial",       desc:"Side-by-side movement drill. Handler reads dog proximity tension without verbal interference."},
  {id:"e8", name:"Threshold Decision Point",    ch:"Environmental", desc:"Handler identifies and names the environmental trigger before the dog hits threshold."}
];

var FIVE_STATES = [
  {s:"1 - Baseline",       c:"#6F745C", d:"Dog is calm, collected, responsive. Handler is the anchor."},
  {s:"2 - Alert",          c:"#c8a96e", d:"Heightened attention. Orienting response. Not yet overloaded."},
  {s:"3 - Engaged",        c:"#d4894a", d:"Active arousal. Dog is in the work or in the distraction."},
  {s:"4 - Threshold",      c:"#c25c3a", d:"Tipping point. Handler decisions here determine the next 10 minutes."},
  {s:"5 - Over Threshold", c:"#8b2020", d:"Cortisol load is running the show. Management only. No training."}
];

var AXIOMS = [
  "The dog was always the mirror.",
  "You are adding to the pressure load or stabilizing it. There is no neutral.",
  "Pressure is constant. Pressure is not correction. Pressure is not force.",
  "The Signature is the map. The Compass is the proof of movement.",
  "Blind = friction when named. Ghost = blankness when named. The reaction is the diagnostic.",
  "Do not introduce the ghost channel by correcting it. Introduce it. They need vocabulary before reps.",
  "Handler profiles are diagnostic snapshots, not permanent labels.",
  "The Four Pressure Channels are NOT a reframe of the four quadrants. Never conflate them."
];

var CH_DESC = {
  Spatial:       "Physical position, proximity, and movement. Dominant = uses body as primary tool. Blind = moves unconsciously, doesn't read the dog's spatial response. Ghost = can't feel how their position is loading pressure.",
  Verbal:        "Word choice, tone, frequency, and timing. Dominant = narrates constantly, praise-heavy. Blind = keeps talking through escalation. Ghost = unaware that their voice is a pressure channel.",
  Environmental: "Awareness of the training environment - distractions, surfaces, thresholds. Dominant = reads context before entering. Blind = environment keeps hijacking the session. Ghost = the dog's environment is invisible to them.",
  Internal:      "The handler's internal state - regulation, intention, presence. Dominant = internal state drives every rep. Blind = dysregulation leaks without awareness. Ghost = no concept that internal state affects the dog."
};

var EVAL_Q = [
  {id:"q1", phase:1, q:"When your dog pulls toward something, your first instinct is to:", opts:["Say 'no' or their name","Tighten the leash / step in front","Redirect with food or toy","Take a breath and wait"], ch:["Verbal","Spatial","Environmental","Internal"]},
  {id:"q2", phase:1, q:"When you enter a new environment with your dog, you:", opts:["Start talking to them immediately","Scan the space and adjust your position","Watch what your dog is watching","Focus on keeping your own breathing steady"], ch:["Verbal","Environmental","Environmental","Internal"]},
  {id:"q3", phase:1, q:"After a correction, you typically:", opts:["Explain what you wanted verbally","Move away or change direction","Look for environmental reasons","Check your own emotional state first"], ch:["Verbal","Spatial","Environmental","Internal"]},
  {id:"q4", phase:1, q:"Your dog is distracted. You:", opts:["Call their name or use a cue","Step closer or use your body","Remove the distraction or increase distance","Wait until you're regulated before asking"], ch:["Verbal","Spatial","Environmental","Internal"]},
  {id:"q5", phase:2, q:"How aware are you of how much you talk during training?", opts:["Very aware - I consciously limit it","Somewhat - I notice after the fact","Not very - I don't track it","I hadn't thought about it"], ch:["Verbal","Verbal","Verbal","Verbal"], blind:[false,true,false,true]},
  {id:"q6", phase:2, q:"If someone pointed out that your body position is adding pressure to your dog, you'd:", opts:["Feel frustrated - I'm doing my best","Immediately want to understand how","Dismiss it - I can't see that","Feel curious but uncertain what to change"], ch:["Spatial","Spatial","Spatial","Spatial"], blind:[true,false,true,false]},
  {id:"q7", phase:2, q:"When your dog is at threshold, your awareness of the environment is:", opts:["High - I read it before we enter","Medium - I notice mid-session","Low - I'm focused on the dog not the space","I focus inward on staying calm"], ch:["Environmental","Environmental","Environmental","Internal"], blind:[false,false,true,false]},
  {id:"q8", phase:2, q:"When you're frustrated during training, your dog:", opts:["Usually gets more reactive","Usually shuts down","Seems unaffected - or I haven't noticed","I manage my state before it gets there"], ch:["Internal","Internal","Internal","Internal"], blind:[false,false,true,false]}
];

// STORAGE - dual mode: window.storage (Claude) or localStorage (browser)
var SK = "shdt-arc-v9";
var DB = {clients: []};
var saveTimer = null;

function hasWS() {
  try { return !!(window.storage && typeof window.storage.get === "function"); }
  catch(e) { return false; }
}

function loadDB() {
  try {
    if (hasWS()) {
      window.storage.get(SK).then(function(r) {
        if (r && r.value) { try { DB = JSON.parse(r.value); } catch(e) {} }
        renderClients();
      }).catch(function() { renderClients(); });
    } else {
      try {
        var raw = localStorage.getItem(SK);
        if (raw) DB = JSON.parse(raw);
      } catch(e) {}
      renderClients();
    }
  } catch(e) { renderClients(); }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    try {
      var data = JSON.stringify(DB);
      if (hasWS()) {
        window.storage.set(SK, data).catch(function() {});
      } else {
        localStorage.setItem(SK, data);
      }
    } catch(e) {}
    var t = document.getElementById("toast");
    if (t) { t.classList.add("show"); setTimeout(function() { t.classList.remove("show"); }, 1500); }
  }, 600);
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function today() { return new Date().toISOString().slice(0,10); }
function ct(c) { return COMPASS.reduce(function(a,x) { return a + (c[x.key]||0); }, 0); }
function esc(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function pcol(p) { return p>=70 ? "var(--green)" : p>=40 ? "var(--gold)" : "var(--red)"; }

function ring(score, max, sz) {
  var r = sz/2-4, cx = sz/2;
  var circ = 2*Math.PI*r;
  var p = score/max;
  var fill = p*circ;
  var cl = pcol(Math.round(p*100));
  return '<svg width="'+sz+'" height="'+sz+'" style="flex-shrink:0">'
    + '<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" fill="none" stroke="var(--border)" stroke-width="3"/>'
    + '<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" fill="none" stroke="'+cl+'" stroke-width="3"'
    + ' stroke-dasharray="'+fill.toFixed(1)+' '+circ.toFixed(1)+'"'
    + ' stroke-dashoffset="'+(circ/4).toFixed(1)+'" stroke-linecap="round"/>'
    + '<text x="'+cx+'" y="'+(cx+4)+'" text-anchor="middle" style="fill:'+cl+';font-size:'+(sz>40?12:10)+'px;font-family:var(--fm)">'
    + score+'</text></svg>';
}

function spark(scores) {
  if (scores.length < 2) return "";
  var W=110, H=30, pd=4;
  var totals = scores.map(ct);
  var mn = Math.min.apply(null,totals);
  var mx = Math.max.apply(null,totals);
  if (mx===mn) mx = mn+1;
  var pts = totals.map(function(v,i) {
    var x = pd + (i/(totals.length-1))*(W-pd*2);
    var y = H - pd - ((v-mn)/(mx-mn))*(H-pd*2);
    return x.toFixed(1)+","+y.toFixed(1);
  }).join(" ");
  var dots = totals.map(function(v,i) {
    var x = pd + (i/(totals.length-1))*(W-pd*2);
    var y = H - pd - ((v-mn)/(mx-mn))*(H-pd*2);
    return '<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="2.5" fill="var(--gold)"/>';
  }).join("");
  return '<svg width="'+W+'" height="'+H+'"><polyline points="'+pts+'" fill="none" stroke="var(--gold)" stroke-width="1.5" stroke-linejoin="round"/>'+dots+'</svg>';
}

function newClient() {
  return {
    id: uid(), created: today(),
    name:"", dog:"", breed:"", age:"",
    signature: {dominant:"", blind:"", ghost:""},
    profile:"", compass:[], sessions:[], issues:[], notes:""
  };
}

function gc(id) {
  for (var i=0; i<DB.clients.length; i++) {
    if (DB.clients[i].id===id) return DB.clients[i];
  }
  return null;
}

function sc(c) {
  var i = DB.clients.findIndex(function(x) { return x.id===c.id; });
  if (i>=0) DB.clients[i]=c; else DB.clients.push(c);
  scheduleSave();
}

// NAV
function showPage(name, btn) {
  var pages = document.querySelectorAll(".page");
  for (var i=0; i<pages.length; i++) pages[i].style.display="none";
  var btns = document.querySelectorAll(".nb");
  for (var i=0; i<btns.length; i++) btns[i].classList.remove("active");
  document.getElementById("page-"+name).style.display="block";
  if (btn) btn.classList.add("active");
  if (name==="eval")      buildEvalPage();
  if (name==="diagnose")  buildDiagnosePage();
  if (name==="reference") buildReferencePage();
}

// CLIENT LIST
var openCards = {};
var activeTab = {};
var activeFilter = "all";

function addClient() {
  var c = newClient();
  DB.clients.push(c);
  scheduleSave();
  renderClients();
}

function deleteClient(id) {
  if (!confirm("Delete this client?")) return;
  DB.clients = DB.clients.filter(function(c) { return c.id!==id; });
  delete openCards[id];
  delete activeTab[id];
  scheduleSave();
  renderClients();
}

function setFilter(key) {
  activeFilter = (activeFilter===key) ? "all" : key;
  renderClients();
}

function renderClients() {
  var searchEl = document.getElementById("search");
  var q = searchEl ? searchEl.value.toLowerCase() : "";
  var attuned = DB.clients.filter(function(c) { return c.profile==="Attuned"; }).length;
  var flagged  = DB.clients.filter(function(c) { return !c.signature.dominant||!c.signature.blind||!c.signature.ghost||c.compass.length===0; });
  var strip = document.getElementById("stats-strip");

  if (DB.clients.length > 0) {
    strip.style.display="grid";
    var stats = [
      {key:"all",     label:"Clients", val:DB.clients.length, color:"var(--gold)"},
      {key:"attuned", label:"Attuned", val:attuned,           color:"var(--green)"},
      {key:"flags",   label:"Flags",   val:flagged.length,    color:flagged.length>0?"var(--red)":"var(--muted)"}
    ];
    strip.innerHTML = stats.map(function(s) {
      return '<div class="card stat-card'+(activeFilter===s.key?" active":"")+'" onclick="setFilter(\''+s.key+\')">'
        + '<div style="font-family:\'JetBrains Mono\',monospace;font-size:22px;color:'+s.color+'">'+s.val+'</div>'
        + '<div class="lbl" style="margin:3px 0 0">'+s.label+'</div>'
        + (activeFilter===s.key ? '<div style="width:16px;height:2px;background:var(--gold);border-radius:2px;margin:5px auto 0"></div>' : '')
        + '</div>';
    }).join("");
  } else {
    strip.style.display="none";
  }

  var pool = DB.clients;
  if (activeFilter==="attuned") pool = DB.clients.filter(function(c) { return c.profile==="Attuned"; });
  if (activeFilter==="flags")   pool = flagged;

  var filtered = pool.filter(function(c) {
    if (!q) return true;
    return c.name.toLowerCase().indexOf(q)>=0 || c.dog.toLowerCase().indexOf(q)>=0;
  });

  var list = document.getElementById("client-list");
  if (filtered.length===0) {
    var msg = DB.clients.length===0 ? "No clients yet. Add your first handler."
              : activeFilter!=="all" ? "No clients match this filter." : "No results.";
    list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:50px 0;font-size:13px">'+msg+'</div>';
    return;
  }

  list.innerHTML = filtered.map(buildAccCard).join("");

  filtered.forEach(function(c) {
    if (openCards[c.id]) {
      var body = document.getElementById("body-"+c.id);
      var chev = document.getElementById("chev-"+c.id);
      var card = document.getElementById("acc-"+c.id);
      if (body) body.classList.add("open");
      if (chev) chev.style.transform="rotate(180deg)";
      if (card) card.classList.add("open");

function toggleAcc(id) {
  var el   = document.getElementById("acc-"+id);
  var body = document.getElementById("body-"+id);
  var chev = document.getElementById("chev-"+id);
  if (!body||!chev) return;
  if (body.classList.contains("open")) {
    body.classList.remove("open");
    chev.style.transform="";
    el.classList.remove("open");
    openCards[id]=false;
  } else {
    body.classList.add("open");
    chev.style.transform="rotate(180deg)";
    el.classList.add("open");
    openCards[id]=true;
    if (!activeTab[id]) activeTab[id]="overview";
    renderTab(id, activeTab[id]);
  }
}

function switchTab(id, tab) {
  activeTab[id]=tab;
  var tbtns = document.querySelectorAll('[data-tg="'+id+'"]');
  for (var i=0; i<tbtns.length; i++) {
    tbtns[i].classList.toggle("active", tbtns[i].dataset.tab===tab);
  }
  var panes = document.querySelectorAll('[data-pg="'+id+'"]');
  for (var i=0; i<panes.length; i++) {
    panes[i].classList.toggle("active", panes[i].dataset.pane===tab);
  }
  renderTab(id, tab);
}

function renderTab(id, tab) {
  var pane = document.querySelector('[data-pg="'+id+'"][data-pane="'+tab+'"]');
  if (!pane) return;
  var c = gc(id);
  if (!c) return;
  if (tab==="overview") pane.innerHTML = tOverview(c);
  if (tab==="compass")  pane.innerHTML = tCompass(c);
  if (tab==="sessions") pane.innerHTML = tSessions(c);
  if (tab==="issues")   pane.innerHTML = tIssues(c);
  if (tab==="dossier")  pane.innerHTML = tDossier(c);
}

channel: ch,
notes: document.getElementById(“sfn-”+cid).value,
homework: document.getElementById(“sfh-”+cid).value
});
sc(c);
renderTab(cid,“sessions”);
refreshHdr(c);
}

function delSess(cid, sid) {
if (!confirm(“Delete this session?”)) return;
var c = gc(cid); if (!c) return;
c.sessions = c.sessions.filter(function(s) { return s.id!==sid; });
sc(c);
renderTab(cid,“sessions”);
refreshHdr(c);
}

// ISSUES TAB
function tIssues(c) {
var rows = c.issues.slice().reverse().map(function(i) {
return ‘<div class="card mb10">’
+ ‘<div class="row jb gap8" style="align-items:flex-start">’
+ ‘<div><div style="font-size:10px;color:var(--muted);margin-bottom:4px">’+i.date+’</div>’
+ ‘<div style="font-size:13px;line-height:1.65">’+esc(i.text)+’</div></div>’
+ ‘<button class="btn btn-danger btn-sm" onclick="delIssue(\''+c.id+'\',\''+i.id+'\')">x</button>’
+ ‘</div></div>’;
}).join(””);

return ‘<div class="card mb10"><div class="st">Log Recurring Issue</div>’
+ ‘<textarea id="ii-'+c.id+'" placeholder="Pattern you are tracking" rows="2" style="margin-bottom:10px"></textarea>’
+ ‘<button class="btn btn-olive btn-sm" onclick="addIssue(\''+c.id+'\')">Add Issue</button></div>’
+ (rows||’<div style="text-align:center;color:var(--muted);font-size:12px;padding:20px 0">No issues logged yet.</div>’);
}

function addIssue(cid) {
var inp = document.getElementById(“ii-”+cid);
var text = inp ? inp.value.trim() : “”;
if (!text) return;
var c = gc(cid); if (!c) return;
c.issues.push({id:uid(), date:today(), text:text});
sc(c);
renderTab(cid,“issues”);
}

function delIssue(cid, iid) {
if (!confirm(“Delete?”)) return;
var c = gc(cid); if (!c) return;
c.issues = c.issues.filter(function(i) { return i.id!==iid; });
sc(c);
renderTab(cid,“issues”);
}

// DOSSIER TAB
function tDossier(c) {
var sig    = c.signature;
var latest = c.compass[c.compass.length-1];
var lastS  = c.sessions[c.sessions.length-1];
var flags  = [];
if (!sig.dominant) flags.push(“Dominant channel unset”);
if (!sig.blind)    flags.push(“Blind channel unset”);
if (!sig.ghost)    flags.push(“Ghost channel unset”);
if (c.compass.length===0) flags.push(“No compass scored”);
if (!c.profile)    flags.push(“Profile unassigned”);

var sigRows = [[“Dominant”,sig.dominant,“var(–gold)”],[“Blind”,sig.blind,“var(–red)”],[“Ghost”,sig.ghost,“var(–muted)”]].map(function(x) {
return ‘<div class="row jb mb8"><span class="lbl" style="margin:0;width:80px">’+x[0]+’</span>’
+ ‘<span style=“font-size:13px;color:’+(x[1]?x[2]:“var(–border)”)+’”>’+( x[1]||“Not set”)+’</span></div>’;
}).join(””);

var sessRows = c.sessions.slice().reverse().slice(0,5).map(function(s) {
return ‘<div style="padding:7px 0;border-bottom:1px solid var(--border);font-size:12px">’
+ ‘<div class="row jb"><span style="color:var(--gold);font-family:\'Cinzel\',serif;font-size:11px">Session #’+s.num+’</span>’
+ ‘<span style="color:var(--muted)">’+s.date+’</span></div>’
+ (s.focus ? ‘<div style="color:var(--muted);margin-top:3px">’+esc(s.focus)+’</div>’ : “”)
+ ‘</div>’;
}).join(””);

return ‘<div class="card mb10"><div class="st">Client Dossier</div>’
+ ‘<div class="row jb mb12"><div>’
+ ‘<div style="font-family:\'Cinzel\',serif;font-size:18px;color:var(--cream)">’+(esc(c.name)||“Unnamed Handler”)+’</div>’
+ ‘<div style="font-size:12px;color:var(--muted);margin-top:3px">’+(esc(c.dog)||”–”)+(c.breed?” - “+esc(c.breed):””)+(c.age?” - Age “+esc(c.age):””)+’</div>’
+ ‘</div>’
+ (c.profile ? ‘<span style="font-size:12px;background:var(--olive);color:var(--cream);padding:4px 12px;border-radius:12px;align-self:flex-start">’+c.profile+’</span>’ : “”)
+ ‘</div>’
+ (latest ? ‘<div class="row gap10 mb12">’+ring(ct(latest),CMAX,50)+’<div><div class="lbl">Compass - ‘+latest.checkpoint+’</div><div style="font-family:\'JetBrains Mono\',monospace;font-size:18px;color:var(--gold)">’+ct(latest)+’<span style="font-size:11px;color:var(--muted)">/’+CMAX+’</span></div></div>’+(c.compass.length>1?spark(c.compass):””)+’</div>’ : “”)
+ ‘</div>’
+ ‘<div class="card mb10"><div class="st">Signature</div>’+sigRows+’</div>’
+ (c.sessions.length>0 ? ‘<div class="card mb10"><div class="st">Session History</div><div class="row jb mb10"><span style="font-size:12px;color:var(--muted)">’+c.sessions.length+’ sessions total</span>’+(lastS?’<span style="font-size:12px;color:var(--muted)">Last: ‘+lastS.date+’</span>’:””)+’ </div>’+sessRows+’</div>’ : “”)
+ (flags.length>0
? ‘<div class="card mb10" style="border-color:rgba(194,92,58,.3)"><div class="st" style="color:var(--red)">Attention Flags</div>’+flags.map(function(f){return’<div style="font-size:12px;color:var(--red);margin-bottom:5px">- ‘+f+’</div>’;}).join(””)+’</div>’
: ‘<div class="card mb10" style="border-color:rgba(122,170,114,.3)"><div style="font-size:12px;color:var(--green)">Client fully assessed.</div></div>’)
+ (c.notes ? ‘<div class="card"><div class="st">Field Notes</div><div style="font-size:13px;color:var(--muted);line-height:1.7">’+esc(c.notes)+’</div></div>’ : “”);
}

// EVAL PAGE
var evalAns = {};
var evalCid = “”;

function buildEvalPage() {
var p = document.getElementById(“page-eval”);
var opts = DB.clients.map(function(c) {
return ‘<option value="'+c.id+'">’+(esc(c.name)||“Unnamed”)+” / “+(esc(c.dog)||“No dog”)+’</option>’;
}).join(””);
p.innerHTML = ‘<div style="font-family:\'Cinzel\',serif;font-size:13px;color:var(--gold);letter-spacing:.16em;text-transform:uppercase;padding:16px 0 14px">Handler Index Eval</div>’
+ (DB.clients.length>0 ? ‘<div class="card mb12"><div class="lbl">Attach to Client (optional)</div><select id="eval-sel" onchange="evalCid=this.value"><option value="">Standalone eval</option>’+opts+’</select></div>’ : “”)
+ ‘<div id="eval-body"></div>’;
resetEval();
}

function resetEval() {
evalAns={};
document.getElementById(“eval-body”).innerHTML = buildEvalBody();
}

function buildEvalBody() {
var p1 = EVAL_Q.filter(function(q){return q.phase===1;});
var p2 = EVAL_Q.filter(function(q){return q.phase===2;});
return ‘<div class="card mb10"><div class="st">Phase 1 - Channel Identification</div>’
+ ‘<div style="font-size:12px;color:var(--muted);line-height:1.65;margin-bottom:14px">Select the response that most accurately reflects your first instinct. Not what you know you should do - what you actually do.</div>’
+ p1.map(bEvalQ).join(””)+’</div>’
+ ‘<div class="card mb10"><div class="st">Phase 2 - Blind and Ghost Detection</div>’
+ ‘<div style="font-size:12px;color:var(--muted);line-height:1.65;margin-bottom:14px">These questions reveal which channels operate below your awareness threshold.</div>’
+ p2.map(bEvalQ).join(””)+’</div>’
+ ‘<div class="row gap8" style="justify-content:flex-end">’
+ ‘<button class="btn btn-ghost btn-sm" onclick="resetEval()">Reset</button>’
+ ‘<button class="btn btn-gold" onclick="scoreEval()">Score Eval</button>’
+ ‘</div><div id="eval-result" style="margin-top:12px"></div>’;
}

function bEvalQ(q) {
var opts = q.opts.map(function(opt,i) {
return ‘<button class="eval-opt" id="eo-'+q.id+'-'+i+'" onclick="selEval(\''+q.id+'\','+i+')">’+opt+’</button>’;
}).join(””);
return ‘<div class="mb14">’
+ ‘<div style="font-size:13px;line-height:1.65;color:var(--text);margin-bottom:10px">’
+ ‘<span style="font-family:\'JetBrains Mono\',monospace;font-size:10px;color:var(--gold)">Q’+q.id.slice(1)+’ </span>’
+ q.q+’</div>’+opts+’</div>’;
}

function selEval(qid, idx) {
var btns = document.querySelectorAll(’[id^=“eo-’+qid+’-”]’);
for (var i=0; i<btns.length; i++) btns[i].classList.remove(“sel”);
var el = document.getElementById(“eo-”+qid+”-”+idx);
if (el) el.classList.add(“sel”);
evalAns[qid]=idx;
}

function scoreEval() {
if (Object.keys(evalAns).length < EVAL_Q.length) {
alert(“Please answer all “+EVAL_Q.length+” questions.”);
return;
}
var chC = {Spatial:0,Verbal:0,Environmental:0,Internal:0};
var bF  = {Spatial:0,Verbal:0,Environmental:0,Internal:0};
EVAL_Q.forEach(function(q) {
var idx = evalAns[q.id];
var ch  = q.ch[idx];
if (ch) chC[ch]=(chC[ch]||0)+1;
if (q.blind&&q.blind[idx]) bF[ch]=(bF[ch]||0)+1;
});
var sorted = Object.keys(chC).sort(function(a,b){return chC[b]-chC[a];});
var dominant = sorted[0];
var bfSorted = Object.keys(bF).sort(function(a,b){return bF[b]-bF[a];});
var blind    = (bF[bfSorted[0]]>0) ? bfSorted[0] : sorted[sorted.length-1];
var ghost    = sorted.filter(function(c){return c!==dominant&&c!==blind;}).pop() || sorted[sorted.length-1];

var res = document.getElementById(“eval-result”);
res.innerHTML = ‘<div class="eval-result">’
+ ‘<div class="st">Eval Result</div>’
+ ‘<div class="row gap10 wrap mb12">’
+ [[“Dominant”,dominant,“var(–gold)”],[“Blind”,blind,“var(–red)”],[“Ghost”,ghost,“var(–muted)”]].map(function(x) {
return ‘<div style="flex:1;min-width:80px"><div class="lbl">’+x[0]+’</div><div style="font-size:15px;font-family:\'Cinzel\',serif;color:'+x[2]+'">’+x[1]+’</div></div>’;
}).join(””)
+ ‘</div>’
+ ‘<div style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:14px">’
+ ‘<strong style="color:var(--text)">Dominant - ‘+dominant+’:</strong> Your strongest channel. Load-bearing whether you intend it or not.<br><br>’
+ ‘<strong style="color:var(--text)">Blind - ‘+blind+’:</strong> Active but outside your awareness. The dog is responding to it. You are not reading that response yet.<br><br>’
+ ‘<strong style="color:var(--text)">Ghost - ‘+ghost+’:</strong> Present in the environment but invisible to you. Introduce vocabulary before reps.’
+ ‘</div>’
+ (evalCid ? ‘<button class="btn btn-gold btn-sm" onclick="applyEval(\''+dominant+'\',\''+blind+'\',\''+ghost+'\')">Apply to Client</button>’ : “”)
+ ‘</div>’;
}

function applyEval(d, b, g) {
var sel = document.getElementById(“eval-sel”);
var cid = sel ? sel.value : evalCid;
if (!cid) { alert(“Select a client first.”); return; }
var c = gc(cid); if (!c) return;
c.signature={dominant:d,blind:b,ghost:g};
sc(c);
renderClients();
alert(“Signature applied to “+(c.name||“client”)+”.”);
}

// DIAGNOSE PAGE
function buildDiagnosePage() {
var p = document.getElementById(“page-diagnose”);
var flagged  = DB.clients.filter(function(c){return !c.signature.dominant||!c.signature.blind||!c.signature.ghost||c.compass.length===0||!c.profile;});
var byP = {};
PROFILES.forEach(function(pr){byP[pr]=DB.clients.filter(function(c){return c.profile===pr;}).length;});
var totalS = DB.clients.reduce(function(a,c){return a+c.sessions.length;},0);
var scores = DB.clients.filter(function(c){return c.compass.length>0;}).map(function(c){return ct(c.compass[c.compass.length-1]);});
var avg = scores.length ? Math.round(scores.reduce(function(a,b){return a+b;},0)/scores.length) : null;

var statCards = [[“Sessions”,totalS,“var(–gold)”],[“Avg Score”,avg!==null?avg:”–”,“var(–olive)”],[“Flags”,flagged.length,flagged.length>0?“var(–red)”:“var(–green)”]].map(function(x) {
return ‘<div class="card" style="text-align:center;padding:11px 8px"><div style="font-family:\'JetBrains Mono\',monospace;font-size:20px;color:'+x[2]+'">’+x[1]+’</div><div class="lbl" style="margin:3px 0 0">’+x[0]+’</div></div>’;
}).join(””);

var distRows = PROFILES.map(function(pr) {
var n = byP[pr]; if (!n) return “”;
var pt = n/Math.max(DB.clients.length,1);
return ‘<div class="mb10"><div class="row jb mb6" style="font-size:12px">’
+ ‘<span style=“color:’+(pr===“Attuned”?“var(–green)”:“var(–gold)”)+’”>’+pr+’</span>’
+ ‘<span style="font-family:\'JetBrains Mono\',monospace;color:var(--muted)">’+n+’</span></div>’
+ ‘<div class="pbar"><div class=“pbar-fill” style=“width:’+(pt*100)+’%;background:’+(pr===“Attuned”?“var(–green)”:“var(–olive)”)+’”></div></div></div>’;
}).join(””) || ‘<div style="font-size:12px;color:var(--muted)">No profiles assigned yet.</div>’;

var stateRows = FIVE_STATES.map(function(x) {
return ‘<div class="row gap10 mb10">’
+ ‘<div class="state-dot" style="background:'+x.c+';margin-top:3px"></div>’
+ ‘<div><div style="font-family:\'Cinzel\',serif;font-size:12px;color:var(--cream);margin-bottom:3px">’+x.s+’</div>’
+ ‘<div style="font-size:12px;color:var(--muted);line-height:1.6">’+x.d+’</div></div></div>’;
}).join(””);

var flagRows = flagged.length>0 ? flagged.map(function(c) {
var miss=[];
if(!c.signature.dominant)miss.push(“Dominant”);
if(!c.signature.blind)miss.push(“Blind”);
if(!c.signature.ghost)miss.push(“Ghost”);
if(c.compass.length===0)miss.push(“No compass”);
if(!c.profile)miss.push(“No profile”);
return ‘<div class="card mb10" style="background:var(--bg)">’
+ ‘<div class="row jb mb6">’
+ ‘<span style="font-family:\'Cinzel\',serif;font-size:13px;color:var(--cream)">’+(esc(c.name)||“Unnamed”)+’</span>’
+ ‘<span style="font-size:11px;color:var(--muted)">’+(esc(c.dog)||”–”)+’</span></div>’
+ ‘<div style="font-size:11px;color:var(--red)">’+miss.join(” - “)+’</div></div>’;
}).join(””) : “”;

p.innerHTML = ‘<div style="font-family:\'Cinzel\',serif;font-size:13px;color:var(--gold);letter-spacing:.16em;text-transform:uppercase;padding:16px 0 14px">Diagnostics</div>’
+ ‘<div class="g3 mb12">’+statCards+’</div>’
+ ‘<div class="card mb12"><div class="st">Profile Distribution</div>’+distRows+’</div>’
+ ‘<div class="card mb12"><div class="st">Five-State Map</div>’+stateRows+’</div>’
+ (flagged.length>0
? ‘<div class="card"><div class="st">Attention Flags</div>’+flagRows+’</div>’
: ‘<div class="card" style="border-color:rgba(122,170,114,.3)"><div style="font-size:13px;color:var(--green)">All clients fully assessed.</div></div>’);
}

// REFERENCE PAGE
var refSec = “channels”;
function buildReferencePage() {
var p = document.getElementById(“page-reference”);
var secs = [“channels”,“compass”,“profiles”,“exercises”,“states”,“axioms”];
var navBtns = secs.map(function(s) {
return ‘<button class=“pill’+(s===refSec?” active”:””)+’” onclick=“switchRef('’+s+’',this)”>’+s.charAt(0).toUpperCase()+s.slice(1)+’</button>’;
}).join(””);
p.innerHTML = ‘<div style="font-family:\'Cinzel\',serif;font-size:13px;color:var(--gold);letter-spacing:.16em;text-transform:uppercase;padding:16px 0 14px">Reference</div>’
+ ‘<div class="row gap6 wrap mb12" id="ref-nav">’+navBtns+’</div>’
+ ‘<div id="ref-body"></div>’;
buildRef(refSec);
}

function switchRef(key, btn) {
refSec=key;
var pills = document.querySelectorAll(”#ref-nav .pill”);
for (var i=0; i<pills.length; i++) pills[i].classList.remove(“active”);
btn.classList.add(“active”);
buildRef(key);
}

function buildRef(key) {
var b = document.getElementById(“ref-body”); if (!b) return;
var html = “”;
if (key===“channels”) {
html = CH.map(function(ch) {
return ‘<div class="card mb10"><div style="font-family:\'Cinzel\',serif;font-size:13px;color:var(--gold);margin-bottom:8px">’+ch+’</div>’
+ ‘<div style="font-size:12px;color:var(--muted);line-height:1.7">’+CH_DESC[ch]+’</div></div>’;
}).join(””);
} else if (key===“compass”) {
html = COMPASS.map(function(x) {
return ‘<div class="card mb10"><div class="row gap8 mb8">’
+ ‘<span style="font-family:\'JetBrains Mono\',monospace;color:var(--gold);width:26px">’+x.key+’</span>’
+ ‘<span style="font-family:\'Cinzel\',serif;font-size:13px;color:var(--cream)">’+x.label+’</span></div>’
+ ‘<div class="row jb" style="font-size:11px;color:var(--muted)"><span>1 = ‘+x.low+’</span><span>’+x.high+’ = 5</span></div></div>’;
}).join(””);
} else if (key===“profiles”) {
html = PROFILES.map(function(pr) {
return ‘<div class="card mb10"><div style=“font-family:'Cinzel',serif;font-size:13px;color:’+(pr===“Attuned”?“var(–green)”:“var(–gold)”)+’;margin-bottom:7px”>’+pr+’</div>’
+ ‘<div style="font-size:12px;color:var(--muted);line-height:1.7">’+PNOTES[pr]+’</div></div>’;
}).join(””);
} else if (key===“exercises”) {
html = EXERCISES.map(function(e) {
return ‘<div class="card mb10"><div class="row jb mb8">’
+ ‘<span style="font-family:\'Cinzel\',serif;font-size:13px;color:var(--cream)">’+e.name+’</span>’
+ ‘<span style="font-size:11px;background:rgba(111,116,92,.2);color:var(--olive);padding:2px 8px;border-radius:10px">’+e.ch+’</span></div>’
+ ‘<div style="font-size:12px;color:var(--muted);line-height:1.7">’+e.desc+’</div></div>’;
}).join(””);
} else if (key===“states”) {
html = FIVE_STATES.map(function(x) {
return ‘<div class="card mb10"><div class="row gap10 mb6">’
+ ‘<div class="state-dot" style="background:'+x.c+';margin-top:2px"></div>’
+ ‘<span style="font-family:\'Cinzel\',serif;font-size:13px;color:var(--cream)">’+x.s+’</span></div>’
+ ‘<div style="font-size:12px;color:var(--muted);line-height:1.7">’+x.d+’</div></div>’;
}).join(””);
} else if (key===“axioms”) {
html = AXIOMS.map(function(a) {
return ‘<div class="card mb10"><div style="font-size:12px;color:var(--text);line-height:1.85;font-style:italic">”’+a+’”</div></div>’;
}).join(””);
}
b.innerHTML = html;
}

// EXPORT / IMPORT
function exportData() {
var a = document.createElement(“a”);
var data = encodeURIComponent(JSON.stringify(DB, null, 2));
a.setAttribute(“href”, “data:application/json;charset=utf-8,”+data);
a.setAttribute(“download”, “shdt-arc-”+today()+”.json”);
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
}

function importData(e) {
var file = e.target.files[0]; if (!file) return;
var r = new FileReader();
r.onload = function(ev) {
try {
DB = JSON.parse(ev.target.result);
scheduleSave();
renderClients();
alert(“Import successful.”);
} catch(e) { alert(“Invalid file.”); }
};
r.readAsText(file);
e.target.value=””;
}

// BOOT
loadDB();
</script>
